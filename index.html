async function _syncTable(table, records, toFn) {
  if (!_supa || !records?.length) return;
  const rows = records.map(toFn).filter(Boolean);
  const { error: uErr } = await _supa.from(table).upsert(rows, { onConflict: 'id' });
  if (uErr) { console.error('[DB] upsert', table, uErr.message); throw new Error(uErr.message); }
}

async function _deleteFromTable(table, id) {
  if (!_supa || !id) return;
  const { error } = await _supa.from(table).delete().eq('id', id);
  if (error) console.error('[DB] delete', table, id, error.message);
}

const DB = {
  ready: false,
  async loadAll() {
    if (!_supa) throw new Error('Supabase non disponibile');
    const [eR,tR,mR,pR,fR,rR,gR,nR,sR,stR,nsR,nsvR,nwR] = await Promise.all([
      _supa.from('employees').select('*'),
      _supa.from('timbrature').select('*'),
      _supa.from('malattie').select('*'),
      _supa.from('permessi').select('*'),
      _supa.from('ferie').select('*'),
      _supa.from('reperibilita').select('*'),
      _supa.from('gestioni_telefoniche').select('*'),
      _supa.from('notifiche').select('*').order('timestamp', { ascending: false }).limit(500),
      _supa.from('settings').select('*').eq('id', 1).maybeSingle(),
      _supa.from('straordinari').select('*'),
      _supa.from('note_spese').select('*'),
      _supa.from('note_spese_voci').select('*'),
      _supa.from('news').select('*').order('timestamp', { ascending: false }),
    ]);
    if (eR.error) throw new Error('Connessione Supabase fallita: ' + eR.error.message);
    return {
      employees:            (eR.data||[]).map(_E.from).filter(Boolean),
      timbrature:           (tR.data||[]).map(_T.from).filter(Boolean),
      malattie:             (mR.data||[]).map(_M.from).filter(Boolean),
      permessi:             (pR.data||[]).map(_P.from).filter(Boolean),
      ferie:                (fR.data||[]).map(_F.from).filter(Boolean),
      reperibilita:         (rR.data||[]).map(_R.from).filter(Boolean),
      gestioni_telefoniche: (gR.data||[]).map(_G.from).filter(Boolean),
      notifiche:            (nR.data||[]).map(_N.from).filter(Boolean),
      settings:             sR.data ? _S.from(sR.data) : {},
      straordinari:         (stR.data||[]).map(_ST.from).filter(Boolean),
      note_spese:           (nsR.data||[]).map(_NS.from).filter(Boolean),
      note_spese_voci:      (nsvR.data||[]).map(_NSV.from).filter(Boolean),
      news:                 (nwR.data||[]).map(_NW.from).filter(Boolean),
    };
  },
  async sync(key, data) {
    if (!_supa) return;
    switch(key) {
      case 'hr_employees':         return _syncTable('employees',            data, _E.to);
      case 'timbrature':           return _syncTable('timbrature',           data, _T.to);
      case 'malattie':             return _syncTable('malattie',             data, _M.to);
      case 'permessi':             return _syncTable('permessi',             data, _P.to);
      case 'ferie':                return _syncTable('ferie',                data, _F.to);
      case 'reperibilita':         return _syncTable('reperibilita',         data, _R.to);
      case 'gestioni_telefoniche': return _syncTable('gestioni_telefoniche', data, _G.to);
      case 'notifiche':            return _syncTable('notifiche',            data, _N.to);
      case 'straordinari':         return _syncTable('straordinari',         data, _ST.to);
      case 'note_spese':           return _syncTable('note_spese',           data, _NS.to);
      case 'note_spese_voci':      return _syncTable('note_spese_voci',      data, _NSV.to);
      case 'news':                 return _syncTable('news',                 data, _NW.to);
      case 'hr_settings': {
        if (!data) return;
        const { error } = await _supa.from('settings').update(_S.to(data)).eq('id', 1);
        if (error) { console.error('[DB] settings update error:', error.message); throw error; }
        break;
      }
    }
  },
};

async function hashPassword(plain) {
  const enc = new TextEncoder().encode(plain);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

  if (ruolo === RUOLI.RESPONSABILE)   return SF.PENDING_DIR;  // 1 step: diretto al direttore
  return SF.PENDING_RESP; // dipendenti: 2 step (resp → direttore)
};

const puoApprovare = (feria, approvatoreId, approvatoreRuolo, employees) => {
  if (feria.employeeId === approvatoreId) return false;
  const emp = employees.find(e => e.id === feria.employeeId);
  if (!emp) return false;
  if (feria.status === SF.PENDING_RESP) {
    if (approvatoreRuolo === RUOLI.RESPONSABILE || approvatoreRuolo === RUOLI.DIRETTORE)
      return emp.responsabileId === approvatoreId;
    if (approvatoreRuolo === RUOLI.AMMINISTRATORE)
      return !emp.responsabileId;
    return false;
  }
  if (feria.status === SF.PENDING_DIR) {
    return approvatoreRuolo === RUOLI.DIRETTORE || approvatoreRuolo === RUOLI.AMMINISTRATORE;
  }
  return false;
};

const feriaInStorico = (feria, userId, userRuolo, employees) => {
  const emp = employees.find(e => e.id === feria.employeeId);
  if (!emp) return false;
  if (userRuolo === RUOLI.MASTER)
    return feria.status !== SF.PENDING_RESP; // stesso del amministratore: vede tutto tranne i pending iniziali
  if (userRuolo === RUOLI.AMMINISTRATORE)
    return feria.status !== SF.PENDING_RESP;
  if (userRuolo === RUOLI.DIRETTORE)
    return [SF.PENDING_DIR, SF.APPROVATO, SF.RIFIUTATO, SF.ANNULLATA].includes(feria.status);
  if (userRuolo === RUOLI.RESPONSABILE) {
    if (emp.responsabileId !== userId) return false;
    return (feria.status === SF.PENDING_DIR && feria.approvatoRespId === userId)
        || feria.status === SF.APPROVATO
        || feria.status === SF.RIFIUTATO
        || feria.status === SF.ANNULLATA;
  }
  return false;
};

const permessoStepIniziale = (ruolo) => {
  if (ruolo === RUOLI.AMMINISTRATORE) return SP.APPROVATO;
  if (ruolo === RUOLI.DIRETTORE)      return SP.APPROVATO;
  if (ruolo === RUOLI.RESPONSABILE)   return SP.PENDING_DIR; // step1 saltato
  return SP.PENDING; // dipendenti normali
};

  const min = totalMin % 60;

  if (min === 0) return `${hrs}h`;
  return `${hrs}h ${min}min`;
};

const calcGiorniLavorativi = (dataInizio, dataFine) => {
  let count = 0;
  let cur = new Date(dataInizio + 'T00:00:00');
  const end = new Date(dataFine + 'T00:00:00');
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
};

const loadEmployees = () => {
  const storedVersion = loadData('hr_data_version', 0);
  if (storedVersion !== DATA_VERSION) {
    saveData('hr_employees', INITIAL_EMPLOYEES);
    saveData('hr_data_version', DATA_VERSION);
    return INITIAL_EMPLOYEES;
  }
  const saved = loadData('hr_employees', INITIAL_EMPLOYEES);
  return saved;
};

function DateInput({ label, value, onChange, required, className }) {
  const formatted = value ? new Date(value + 'T00:00:00').toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' }) : '';
  return (
    <div className={className}>
      {label && (
        <label className="block text-xs font-medium text-slate-500 mb-1">
          {label} {required && <span className="text-red-500">*</span>}
        </label>
      )}
      <input type="date" value={value} onChange={onChange}
        className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      {value && formatted === 'Invalid Date' && (
        <p className="text-xs text-red-500 font-medium mt-1">Data non valida</p>
      )}
    </div>
  );
}

function Login({ employees, onLogin, forcedLogoutMsg, onClearMsg }) {
  const [loginVal, setLoginVal] = useState('');
  const [passVal,  setPassVal]  = useState('');
  const [error,    setError]    = useState('');
  const [showReset, setShowReset] = useState(false);
  const [resetLogin, setResetLogin] = useState('');
  const [resetMsg, setResetMsg] = useState('');

  const inputCls = 'w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500';

  const handleLogin = () => {
    setError('');
    if (employees.length === 0) { setError('⏳ Dati ancora in caricamento, riprova tra qualche secondo.'); return; }
    const emp = employees.find(e => e.login === loginVal.trim());
    if (!emp) { setError('Credenziali non valide.'); return; }
    if (emp.accessoDisabilitato) { setError('Il tuo accesso è stato disabilitato. Contatta il Master.'); return; }
    hashPassword(passVal).then(hash => {
      if (emp.password !== hash) { setError('Credenziali non valide.'); return; }
      onLogin(emp.id);
    }).catch(err => {
      setError('Errore autenticazione: ' + (err?.message || 'crypto non disponibile. Usa HTTPS.'));
    });
  };

  if (showReset) return (
    <div className="min-h-screen flex items-center justify-center p-4"
         style={{background:'linear-gradient(135deg,#0f1f3d 0%,#1e3a6e 60%,#0f1f3d 100%)'}}>
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8">
        <button onClick={()=>{setShowReset(false);setResetMsg('');setResetLogin('');}} className="text-slate-400 hover:text-slate-600 text-sm mb-6 inline-block">← Torna al login</button>
        <h2 className="text-xl font-bold text-slate-800 mb-2" style={{fontFamily:'Syne,sans-serif'}}>Reset password</h2>
        <p className="text-slate-400 text-sm mb-6">Inserisci la tua login. Il Master riceverà una notifica per approvare il reset.</p>
        <input type="text" placeholder="La tua login" value={resetLogin} onChange={e=>setResetLogin(e.target.value)}
          className={inputCls + ' mb-4'}/>
        {resetMsg && <p className={`text-sm mb-4 rounded-xl px-3 py-2 ${resetMsg.includes('inviata') ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}`}>{resetMsg}</p>}
        {!resetMsg.includes('inviata') && (
          <ResetRequestButton resetLogin={resetLogin} setResetMsg={setResetMsg} />
        )}
      </div>
    </div>
  );

function ResetRequestButton({ resetLogin, setResetMsg }) {
  return (
    <button onClick={() => {
      const employees = (() => { try { const s = localStorage.getItem('hr_employees'); return s ? JSON.parse(s) : []; } catch { return []; } })();
      const emp = employees.find(e => e.login === resetLogin.trim());
      if (!emp) { setResetMsg('Utente non trovato.'); return; }
      if (emp.richiestaReset) { setResetMsg('Richiesta già inviata. Attendi l\'approvazione del Master.'); return; }
      const updEmp = employees.map(e => e.id===emp.id ? {...e, richiestaReset:true} : e);
      try { localStorage.setItem('hr_employees', JSON.stringify(updEmp)); } catch {}
      if (typeof DB !== 'undefined') DB.sync('hr_employees', updEmp).catch(()=>{});
      const masterIds = updEmp.filter(e=>[RUOLI.MASTER, RUOLI.AMMINISTRATORE].includes(e.ruolo)).map(e=>e.id);
      if (masterIds.length > 0) {
        const notifiche = (() => { try { const s = localStorage.getItem('notifiche'); return s ? JSON.parse(s) : []; } catch { return []; } })();
        const nuova = {
          id: String(Date.now()) + Math.random(),
          tipo: 'reset',
          testo: `${emp.nome} ${emp.cognome} ha richiesto il reset della password`,
          destinatari: masterIds,
          empId: emp.id,
          timestamp: Date.now(),
          lette: []
        };
        const updNotifiche = [...notifiche, nuova];
        try { localStorage.setItem('notifiche', JSON.stringify(updNotifiche)); } catch {}
        if (typeof DB !== 'undefined') DB.sync('notifiche', updNotifiche).catch(()=>{});
      }
      setResetMsg('Richiesta inviata! Il Master riceverà una notifica e approverà il reset.');
    }}
      className="w-full py-3 rounded-2xl font-semibold text-sm bg-blue-900 hover:bg-blue-800 text-white transition-all">
      Invia richiesta reset
    </button>
  );
}

function ChangePassword({ user, onSave, isFirstAccess }) {
  const [p1, setP1] = useState('');
  const [p2, setP2] = useState('');
  const [err, setErr] = useState('');

  const inputCls = 'w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500';

  const validate = () => {
    if (p1.length < 8)        return 'La password deve essere di almeno 8 caratteri.';
    if (!/[A-Z]/.test(p1))    return 'Deve contenere almeno una lettera maiuscola.';
    if (!/[0-9]/.test(p1))    return 'Deve contenere almeno un numero.';
    if (p1 !== p2)             return 'Le due password non coincidono.';
    return '';
  };

  const handleSave = () => {
    const e = validate();
    if (e) { setErr(e); return; }
    onSave(p1);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4"
         style={{background:'linear-gradient(135deg,#0f1f3d 0%,#1e3a6e 60%,#0f1f3d 100%)'}}>
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500 text-white text-3xl mb-4">🔑</div>
          <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>
            {isFirstAccess ? 'Benvenuto!' : 'Nuova password'}
          </h2>
          <p className="text-slate-400 text-sm mt-2">
            {isFirstAccess
              ? `Ciao ${user.nome}! Per motivi di sicurezza devi impostare una nuova password prima di accedere.`
              : 'Il Master ha approvato il reset. Imposta la tua nuova password.'}
          </p>
        </div>
        <div className="space-y-3 mb-4">
          <PasswordInput placeholder="Nuova password" value={p1}
            onChange={e=>{setP1(e.target.value);setErr('');}}
            onClearError={()=>setErr('')}
            autoComplete="new-password"
            className={inputCls}/>
          <PasswordInput placeholder="Conferma password" value={p2}
            onChange={e=>{setP2(e.target.value);setErr('');}}
            onClearError={()=>setErr('')}
            onKeyDown={e=>e.key==='Enter'&&handleSave()}
            autoComplete="new-password"
            className={inputCls}/>
        </div>
        <p className="text-slate-400 text-xs mb-4">Min. 8 caratteri, almeno una maiuscola e un numero.</p>
        {err && <p className="text-red-500 text-sm mb-4 bg-red-50 rounded-xl px-3 py-2">{err}</p>}
        <button onClick={handleSave}
          className="w-full py-3 rounded-2xl font-semibold text-sm bg-blue-900 hover:bg-blue-800 text-white transition-all">
          Imposta password e accedi
        </button>
      </div>
    </div>
  );
}

function MobileTopBar({ user, view, setView, onLogout, resetRequests, notifiche, userId, onBell }) {
  const r = user.ruolo;
  const isDashboard = view === 'dashboard';
  const unread = (notifiche||[]).filter(n =>
    (canManage(r) || n.destinatari.includes(userId)) && !n.lette.includes(userId)
  ).length;
  return (
    <div className="lg:hidden flex items-center justify-between px-4 py-3 shadow-sm sticky top-0 z-20" style={{background:'#0f1f3d'}}>
      <div className="flex items-center gap-2">
        {!isDashboard ? (
          <button onClick={()=>setView('dashboard')} className="text-white mr-1 p-1">
            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
          </button>
        ) : null}
        <span className="text-white font-bold text-base" style={{fontFamily:'Syne,sans-serif'}}>HR Manager</span>

          <span className="text-xl">🔔</span>
          {unread > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full min-w-[16px] h-4 flex items-center justify-center px-0.5 leading-none">{unread > 99 ? '99+' : unread}</span>}

function EmployeeForm({ emp, employees, onSave, onBack, currentUserRole, settings }) {
  const isEdit = !!emp;
  const isAdmin = currentUserRole === RUOLI.AMMINISTRATORE;
  const isMaster = currentUserRole === RUOLI.MASTER;
  const centriDiCosto = settings?.centriDiCosto || [{id:'1',numero:'100',testo:'Sanitario'}];
  const autoList = settings?.autoList || [];
  const turni = settings?.turni || [{id:'default',nome:'Turno Standard'}];
  const [form, setForm] = useState(emp || { nome:'', cognome:'', registro:'', dataInizio:'', cf:'', telefono:'', email:'', responsabileId:'', ruolo:'dipendente', login:'', password:'', primoAccesso:true, accessoDisabilitato:false, richiestaReset:false, richiedeNuovaPassword:false, reperibile:false, straordinario:false, centroDiCostoId:'1', cittaDiLavoro:'', autoId:'', tipologiaAuto:'', provenienzaAuto:'', turnoId:'default' });
  const [errors, setErrors] = useState({});
  const [showPwd, setShowPwd] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.nome.trim())     e.nome     = 'Obbligatorio';
    if (!form.cognome.trim())  e.cognome  = 'Obbligatorio';
    if (!form.registro.trim()) e.registro = 'Obbligatorio';
    if (!form.cf.trim())       e.cf       = 'Obbligatorio';
    if (!form.email.trim())    e.email    = 'Obbligatorio';
    if (!form.login.trim())    e.login    = 'Obbligatorio';
    if (!isEdit && !form.password.trim()) e.password = 'Obbligatorio per nuovo dipendente';
    if (!isEdit && form.password && form.password.length < 6) e.password = 'Min. 6 caratteri';
    const dup = employees.find(e => e.login===form.login.trim() && e.id!==emp?.id);
    if (dup) e.login = 'Username già in uso';
    return e;
  };

  const handleSubmit = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    const saved = { ...form, id: emp?.id || String(Date.now()) };
    if (isEdit && !form.password) delete saved.password; // non sovrascrivere se vuoto in modifica
    onSave(saved);
  };

  const others = employees.filter(e => e.id !== emp?.id);

  return (
    <div className="p-8">
      <button onClick={onBack} className="text-slate-400 hover:text-slate-600 text-sm mb-6 inline-block">← Indietro</button>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h2 className="text-xl font-bold text-slate-800 mb-6" style={{fontFamily:'Syne,sans-serif'}}>
          {isEdit ? '✏️ Modifica dipendente' : '➕ Nuovo dipendente'}
        </h2>

        {}
        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Dati anagrafici</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <EmpField label="Nome *"             name="nome"      form={form} setForm={setForm} errors={errors} />
          <EmpField label="Cognome *"          name="cognome"   form={form} setForm={setForm} errors={errors} />
          <EmpField label="Codice Dipendente *" name="registro"  form={form} setForm={setForm} errors={errors} />
          <EmpField label="Codice Fiscale *"   name="cf"        form={form} setForm={setForm} errors={errors} />
          <EmpField label="Data inizio lavoro" name="dataInizio" type="date" form={form} setForm={setForm} errors={errors} />
          <EmpField label="Telefono"           name="telefono"  form={form} setForm={setForm} errors={errors} />
          <EmpField label="Email *"            name="email"     type="email" form={form} setForm={setForm} errors={errors} />
          <EmpField label="Città di lavoro"    name="cittaDiLavoro" placeholder="es. Milano" form={form} setForm={setForm} errors={errors} />
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Centro di costo</label>
            <select value={form.centroDiCostoId||''} onChange={e => setForm({...form, centroDiCostoId:e.target.value||null})}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">— Nessuno —</option>
              {centriDiCosto.map(c => <option key={c.id} value={c.id}>{c.numero} - {c.testo}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Auto aziendale</label>
            <select value={form.autoId||''} onChange={e => setForm({...form, autoId:e.target.value||null})}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">— Nessuna —</option>
              {autoList.map(a => <option key={a.id} value={a.id}>{a.modello} / {a.targa}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Turno</label>
            <select value={form.turnoId||'default'} onChange={e => setForm({...form, turnoId:e.target.value})}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              {turni.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Ruolo *</label>
            {isAdmin ? (
              <select value={form.ruolo} onChange={e => setForm({...form, ruolo:e.target.value})}
                className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                {Object.entries(ROLE_LABELS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            ) : (
              <div className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-100 flex items-center gap-2">
                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${ROLE_COLORS[form.ruolo]}`}>{ROLE_LABELS[form.ruolo]}</span>
                <span className="text-xs text-slate-400 italic">{isEdit ? 'Contatta l\'amministratore per modificare il ruolo' : 'Nuovi dipendenti vengono registrati come Dipendente'}</span>
              </div>
            )}
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Responsabile</label>
            <select value={form.responsabileId||''} onChange={e => setForm({...form, responsabileId:e.target.value||null})}
              className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">— Nessuno —</option>
              {others.map(e => <option key={e.id} value={e.id}>{e.nome} {e.cognome} ({ROLE_LABELS[e.ruolo]})</option>)}
            </select>
          </div>
        </div>

        {}
        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Credenziali di accesso</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-slate-50 rounded-2xl p-4 border border-slate-200" autoComplete="off">
          <EmpField label="Username *" name="login" placeholder="es. mario.rossi" form={form} setForm={setForm} errors={errors} autoComplete="username" />
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">{isEdit ? "Nuova password (lascia vuoto per non cambiare)" : "Password iniziale *"}</label>
            <div className="relative">
              <input type={showPwd ? 'text' : 'password'} placeholder={isEdit ? "••••••••" : "Min. 6 caratteri"} value={form['password']||''} onChange={e => setForm(prev => ({...prev, password:e.target.value}))}
                autoComplete="new-password"
                className={`w-full border rounded-xl px-4 py-2.5 pr-10 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors['password']?'border-red-400':'border-slate-200'}`}/>
              <button type="button" onClick={()=>setShowPwd(p=>!p)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                <Icon name={showPwd ? 'eye-off' : 'eye'} size={16} />
              </button>
            </div>
            {errors['password'] && <p className="text-red-400 text-xs mt-1">{errors['password']}</p>}
          </div>
          {!isEdit && <p className="text-xs text-slate-400 col-span-2">Il dipendente dovrà cambiare la password al primo accesso.</p>}
        </div>

        <div className="flex gap-3">
          <button onClick={handleSubmit} className="bg-blue-900 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-800 transition-colors">
            {isEdit ? 'Salva modifiche' : 'Crea dipendente'}
          </button>
          <button onClick={onBack} className="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-200 transition-colors">
            Annulla
          </button>
        </div>
      </div>
    </div>
  );
}

function getTurnoEmp(emp, settings) {
  const turni = settings?.turni || [];
  const turnoId = emp?.turnoId || 'default';
  if (turnoId !== 'default') {
    const t = turni.find(t => t.id === turnoId);
    if (t) return t;
  }
  return {
    inizioTurno:      settings?.inizioTurno      || '08:30',
    inizioPausa:      settings?.inizioPausa      || '12:30',
    finePausa:        settings?.finePausa        || '13:00',
    fineTurno:        settings?.fineTurno        || '17:00',
    tolleranzaMinuti: settings?.tolleranzaMinuti ?? 15,
  };
}

function Timbratura({ user, timbrature, setTimbrature, onTimbratura, onStraordinario, settings, straordinari }) {
  const [now, setNow]         = useState(new Date());
  const [gpsStatus, setGps]   = useState('idle');
  const [gpsInfo, setGpsInfo] = useState(null);
  const [showNoteModal, setShowNoteModal] = useState(false);
  const [notaStr, setNotaStr] = useState({ mattina:'', sera:'' });
  const [pendingExit, setPendingExit] = useState(null); // {ora, gps, straMattinaMin, straSeraMin}

  useEffect(() => { const t = setInterval(()=>setNow(new Date()), 1000); return ()=>clearInterval(t); }, []);

  const td          = todayStr();
  const myToday     = timbrature.find(t => t.employeeId===user.id && t.data===td);
  const myHistory   = [...timbrature.filter(t=>t.employeeId===user.id)].sort((a,b)=>b.timestamp-a.timestamp).slice(0,12);
  const gpsRequired = !!user.gpsObbligatorio;
  const canStraord  = !!user.straordinario;

  const turnoUtente = getTurnoEmp(user, settings);
  const inizioTurno = turnoUtente.inizioTurno;
  const fineTurno   = turnoUtente.fineTurno;
  const tolleranza  = turnoUtente.tolleranzaMinuti;

  const toMin = (hhmm) => {
    if (!hhmm) return 0;
    const match = String(hhmm).match(/(\d{1,2})[:\.](\d{2})/);
    if (!match) return 0;
    const h = parseInt(match[1], 10);
    const m = parseInt(match[2], 10);
    return h * 60 + m;
  };

  const getOraStr = () => {
    const t = new Date();
    return `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  };

  const inizioMin = toMin(inizioTurno);
  const fineMin   = toMin(fineTurno);

  const calcolaStraMattina = (oraHHMM) => {
    const min = toMin(oraHHMM);
    const soglia = inizioMin - tolleranza;
    if (min < soglia) return inizioMin - min; // minuti di anticipo oltre la tolleranza
    return 0;
  };
  const calcolaStraFine = (oraHHMM) => {
    const min = toMin(oraHHMM);
    const soglia = fineMin + tolleranza;
    if (min > soglia) return min - fineMin; // minuti in più oltre la tolleranza
    return 0;
  };

  const getAddress = async (lat, lon) => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=it`);
      const d = await res.json();
      return d.display_name || null;
    } catch { return null; }
  };

  const saveEntrata = (gps) => {
    const oraStr = getOraStr();
    const entry = {
      id: String(Date.now()), employeeId: user.id, data: td,
      ora: oraStr, oraUscita: null,
      timestamp: Date.now(), gps: gps || null
    };
    const upd = [...timbrature, entry];
    setTimbrature(upd); saveData('timbrature', upd);
    if (onTimbratura) onTimbratura(user, oraStr, gps || null);
    if (canStraord) {
      const strMin = calcolaStraMattina(oraStr);
      if (strMin > 0) {
        setNotaStr({ mattina:'', sera:'' });
        setPendingExit({ tipo:'mattina', oraStr, gps, straMattinaMin: strMin, straSeraMin: 0 });
        setShowNoteModal(true);
      }
    }
  };

  const saveUscita = (gps) => {
    const oraStr = getOraStr();
    if (!canStraord) {
      const upd = timbrature.map(t => t.id===myToday.id ? {...t, oraUscita: oraStr} : t);
      setTimbrature(upd); saveData('timbrature', upd);
      return;
    }
    const straMattinaGiaRegistrata = (straordinari||[]).some(s => s.employeeId===user.id && s.data===td && s.tipo==='mattina');
    const straMattina = straMattinaGiaRegistrata ? 0 : calcolaStraMattina(myToday.ora);
    const straSera    = calcolaStraFine(oraStr);
    if (straMattina > 0 || straSera > 0) {
      setNotaStr({ mattina:'', sera:'' });
      setPendingExit({ tipo: straMattina>0 && straSera>0 ? 'entrambi' : straMattina>0 ? 'mattina_uscita' : 'sera',
        oraStr, gps, straMattinaMin: straMattina, straSeraMin: straSera });
      setShowNoteModal(true);
    } else {
      const upd = timbrature.map(t => t.id===myToday.id ? {...t, oraUscita: oraStr} : t);
      setTimbrature(upd); saveData('timbrature', upd);
    }
  };

  const handleConfermaNota = () => {
    if (!pendingExit) return;
    const { tipo, oraStr, gps, straMattinaMin, straSeraMin } = pendingExit;
    if ((tipo==='mattina' || tipo==='mattina_uscita' || tipo==='entrambi') && straMattinaMin>0 && !notaStr.mattina.trim()) return;
    if ((tipo==='sera' || tipo==='entrambi') && straSeraMin>0 && !notaStr.sera.trim()) return;

    if (tipo !== 'mattina') {
      const upd = timbrature.map(t => t.id===myToday.id ? {...t, oraUscita: oraStr} : t);
      setTimbrature(upd); saveData('timbrature', upd);
    }

    if (straMattinaMin > 0 && (tipo==='mattina' || tipo==='mattina_uscita' || tipo==='entrambi')) {
      if (onStraordinario) onStraordinario(user, td, 'mattina', straMattinaMin, notaStr.mattina.trim());
    }
    if (straSeraMin > 0 && (tipo==='sera' || tipo==='entrambi')) {
      if (onStraordinario) onStraordinario(user, td, 'sera', straSeraMin, notaStr.sera.trim());
    }
    setShowNoteModal(false); setPendingExit(null); setNotaStr({mattina:'',sera:''});
  };

  const handleGpsAndAction = (action) => {
    if (gpsStatus==='loading') return;
    if (!navigator.geolocation) {
      if (gpsRequired) { setGps('denied'); return; }
      action(null); return;
    }
    setGps('loading');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lon, accuracy } = pos.coords;
        const address = await getAddress(lat, lon);
        const gps = { lat: lat.toFixed(6), lon: lon.toFixed(6), accuracy: Math.round(accuracy), address };
        setGpsInfo(gps); setGps('ok');
        action(gps);
      },
      err => {
        const isDenied = err.code === 1;
        setGps(isDenied ? 'denied' : 'error');
        if (gpsRequired) return;
        action(null);
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  const handleTimbra    = () => handleGpsAndAction(saveEntrata);
  const handleTimbraUsc = () => handleGpsAndAction(saveUscita);
  const mapsUrl = (gps) => gps ? `https://www.google.com/maps?q=${gps.lat},${gps.lon}` : null;

  const fmtMin = (m) => m >= 60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m} min`;

  return (
    <div className="p-4 lg:p-8">
      <h2 className="text-2xl font-bold text-slate-800 mb-6" style={{fontFamily:'Syne,sans-serif'}}>Timbratura</h2>

      {}
      {showNoteModal && pendingExit && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
            <h3 className="text-lg font-bold text-slate-800 mb-1" style={{fontFamily:'Syne,sans-serif'}}>⏰ Straordinario rilevato</h3>
            <p className="text-slate-500 text-sm mb-4">È richiesta una nota obbligatoria per ogni straordinario registrato.</p>
            {pendingExit.straMattinaMin > 0 && (pendingExit.tipo==='mattina'||pendingExit.tipo==='mattina_uscita'||pendingExit.tipo==='entrambi') && (
              <div className="mb-4">
                <label className="block text-xs font-semibold text-orange-600 uppercase tracking-wide mb-1">
                  🌅 Straordinario mattina — {fmtMin(pendingExit.straMattinaMin)} <span className="text-red-500">*</span>
                </label>
                <textarea rows={2} value={notaStr.mattina} onChange={e=>setNotaStr(p=>({...p,mattina:e.target.value}))}
                  placeholder="Motivo dello straordinario mattutino…"
                  className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"/>
                {!notaStr.mattina.trim() && <p className="text-red-400 text-xs mt-1">Nota obbligatoria</p>}
              </div>
            )}
            {pendingExit.straSeraMin > 0 && (pendingExit.tipo==='sera'||pendingExit.tipo==='entrambi') && (
              <div className="mb-4">
                <label className="block text-xs font-semibold text-orange-600 uppercase tracking-wide mb-1">
                  🌆 Straordinario sera — {fmtMin(pendingExit.straSeraMin)} <span className="text-red-500">*</span>
                </label>
                <textarea rows={2} value={notaStr.sera} onChange={e=>setNotaStr(p=>({...p,sera:e.target.value}))}
                  placeholder="Motivo dello straordinario serale…"
                  className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"/>
                {!notaStr.sera.trim() && <p className="text-red-400 text-xs mt-1">Nota obbligatoria</p>}
              </div>
            )}
            <p className="text-xs text-red-400 mb-2"><span className="font-semibold">*</span> campo obbligatorio</p>
            <div className="flex gap-3 mt-2">
              <button onClick={handleConfermaNota}
                disabled={
                  (pendingExit.straMattinaMin>0 && (pendingExit.tipo==='mattina'||pendingExit.tipo==='mattina_uscita'||pendingExit.tipo==='entrambi') && !notaStr.mattina.trim()) ||
                  (pendingExit.straSeraMin>0 && (pendingExit.tipo==='sera'||pendingExit.tipo==='entrambi') && !notaStr.sera.trim())
                }
                className="flex-1 bg-orange-500 hover:bg-orange-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">
                Conferma straordinario
              </button>
            </div>
          </div>
        </div>
      )}

      {gpsRequired && (
        <div className="mb-5 bg-sky-50 border border-sky-200 rounded-2xl px-5 py-3 flex items-center gap-3 text-sm text-sky-700">
          <span className="text-xl">📍</span>
          <span><strong>GPS obbligatorio</strong> — la timbratura non verrà accettata senza posizione attiva.</span>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {}
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 flex flex-col items-center text-center">
          <p className="text-slate-400 text-sm capitalize mb-2">
            {now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
          </p>
          <p className="text-7xl font-bold text-slate-800 mb-1 tracking-tight" style={{fontFamily:'Syne,sans-serif'}}>
            {now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
          </p>
          <p className="text-slate-300 text-2xl mb-6">:{String(now.getSeconds()).padStart(2,'0')}</p>

          {}
          {canStraord && (
            <div className="w-full mb-4 bg-orange-50 border border-orange-200 rounded-xl px-4 py-2 text-xs text-orange-700 text-left">
              ⏰ Turno base: <strong>{inizioTurno}</strong> — Pausa pranzo 30 minuti — Fine turno base: <strong>{fineTurno}</strong> · Tolleranza: <strong>{tolleranza} min</strong>
            </div>
          )}

          {!myToday ? (
            <div className="w-full space-y-3">
              <button onClick={handleTimbra} disabled={gpsStatus==='loading'}
                className="w-full bg-blue-900 hover:bg-blue-800 disabled:bg-slate-300 text-white text-base font-bold px-12 py-4 rounded-2xl transition-all hover:scale-105 active:scale-95 shadow-lg">
                {gpsStatus==='loading' ? 'Rilevamento GPS…' : 'Timbra entrata'}
              </button>
              <p className="text-slate-400 text-xs">
                {gpsRequired ? '⚠️ Il GPS è obbligatorio per la tua timbratura' : 'La posizione GPS verrà rilevata automaticamente'}
              </p>
              {(gpsStatus==='denied' || gpsStatus==='error') && gpsRequired && (
                <div className="bg-red-50 border border-red-300 rounded-2xl p-4 text-left">
                  <p className="text-red-700 font-semibold text-sm mb-1">🚫 Timbratura rifiutata</p>
                  <p className="text-red-600 text-xs">
                    {gpsStatus==='denied'
                      ? 'Hai negato l\'accesso alla posizione. Abilita il GPS nelle impostazioni del browser e riprova.'
                      : 'Impossibile rilevare la posizione GPS. Controlla che il GPS sia attivo e riprova.'}
                  </p>
                </div>
              )}
              {(gpsStatus==='denied' || gpsStatus==='error') && !gpsRequired && (
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
                  ⚠️ GPS non disponibile. Timbratura registrata senza posizione.
                </div>
              )}
            </div>
          ) : (
            <div className="w-full space-y-3">
              <div className="bg-slate-50 border border-slate-200 rounded-2xl p-5">
                <p className="text-slate-700 font-semibold flex items-center gap-2"><Icon name="check" size={16} color="#1e3a6e"/> Entrata registrata</p>
                <p className="text-slate-800 text-3xl font-bold mt-1" style={{fontFamily:'Syne,sans-serif'}}>{myToday.ora}</p>
              </div>
              {myToday.oraUscita ? (
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                  <p className="text-slate-600 font-semibold text-sm">🏁 Uscita registrata: <span className="font-bold text-slate-800">{myToday.oraUscita}</span></p>
                </div>
              ) : canStraord ? (
                <button onClick={handleTimbraUsc} disabled={gpsStatus==='loading'}
                  className="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-slate-300 text-white text-base font-bold px-12 py-4 rounded-2xl transition-all hover:scale-105 active:scale-95 shadow-lg">
                  {gpsStatus==='loading' ? '📡 Rilevamento GPS…' : '🏁 Timbra uscita'}
                </button>
              ) : null}
              {myToday.gps ? (
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-left">
                  <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">📍 Posizione registrata</p>
                  {myToday.gps.address && <p className="text-slate-700 text-xs mb-2 leading-relaxed">{myToday.gps.address}</p>}

                          ? <a href={mapsUrl(t.gps)} target="_blank" rel="noopener noreferrer" className="text-emerald-500 text-xs hover:underline">📍 GPS</a>

                      </div>

                ))}
              </div>
          }
        </div>
      </div>
    </div>
  );
}

                            <td className="py-1.5 text-right font-semibold text-violet-700">{a>0?fmtDurata(a):'—'}</td>
                          </tr>
                        );
                      })}
                      <tr className="border-t-2 border-violet-200">
                        <td className="pt-2 pr-3 font-bold text-slate-700">PERMESSI TOTALI</td>
                        <td className="pt-2 pr-2 text-right font-bold text-violet-600">{totMese>0?fmtDurata(totMese):'—'}</td>
                        <td className="pt-2 text-right font-bold text-violet-700">{totAnno>0?fmtDurata(totAnno):'—'}</td>
                      </tr>
                    </tbody>
                  </table>
                  <p className="text-xs text-slate-400 italic leading-relaxed">Attenzione, i permessi riportati non tengono conto dei permessi maturati ogni mese ma solo di quelli effettivamente presi nel mese e nell&apos;anno.</p>
                </div>
              );
            })()}

            {}
            <div className="bg-white rounded-2xl p-4 border border-sky-100 shadow-sm">
              <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Icon name="plane" size={13} color="#0ea5e9" /> Ferie</p>
              {statBox('Ferie mese (gg)', (ferie||[]).filter(f=>f.employeeId===user.id&&f.status===SF.APPROVATO&&f.dataInizio.startsWith(mStrFull)).reduce((s,f)=>s+f.giorniLavorativi,0)+' gg', 'text-sky-500')}
              {statBox('Ferie anno (gg)', (ferieGiorniAnno + iniFerieAnno)+' gg', 'text-sky-600')}
              <p className="text-xs text-slate-400 italic leading-relaxed mt-3">Attenzione, le ferie riportate non tengono conto delle ferie maturate ogni mese ma solo di quelle effettivamente prese nel mese e nell&apos;anno.</p>
            </div>

            {}
            <div className={`rounded-2xl p-4 shadow-sm border ${user.straordinario ? 'bg-white border-orange-100' : 'bg-slate-100 border-slate-200'}`}>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Icon name="trending" size={13} color="#f97316" /> Straordinari</p>
              {user.straordinario ? (<>
                {statBox('Straordinari mese', straMinMese>0?fmtMin(straMinMese):'—', 'text-orange-600')}
                {statBox('Straordinari anno', (straMinAnno+iniStraAnno)>0?fmtMin(straMinAnno+iniStraAnno):'—', 'text-orange-700')}
              </>) : (
                <p className="text-xs text-slate-400 italic">Non abilitato</p>
              )}
            </div>

            {}
            <div className={`rounded-2xl p-4 shadow-sm border sm:col-span-2 xl:col-span-4 ${user.reperibile ? 'bg-white border-purple-100' : 'bg-slate-100 border-slate-200'}`}>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Icon name="phone" size={13} color="#a855f7" /> Reperibilità</p>
              {user.reperibile ? (
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                  {statBox('Giorni rep. mese', repMeseCount, 'text-purple-600')}
                  {statBox('Giorni rep. anno', repAnnoCount + iniRepAnno, 'text-purple-700')}
                  {statBox('Gestioni tel. mese', gestMeseCount, 'text-indigo-600')}
                  {statBox('Gestioni tel. anno', gestAnnoCount + iniGestTelAnno, 'text-indigo-700')}
                </div>
              ) : (
                <p className="text-xs text-slate-400 italic">Non abilitato</p>
              )}
            </div>

          </div>
        );
      })()}

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
        <div className="grid grid-cols-7 gap-1 mb-2">
          {DAYS_LONG.map(d => (
            <div key={d} className="text-center text-xs font-semibold text-slate-400 py-1">{d}</div>
          ))}
        </div>
        {(() => {
          const firstDow = new Date(year, month-1, 1).getDay();
          const allCells = [...Array(firstDow).fill(null), ...days];
          const weeks = [];
          for (let i=0; i<allCells.length; i+=7) weeks.push(allCells.slice(i,i+7));
          return weeks.map((week, wi) => (
            <div key={wi} className="grid grid-cols-7 gap-1 mb-1">
              {week.map((d, di) => {
                if (!d) return <div key={di}/>;
                const t = presenceMap[d.str];
                const isM = !t && malattiaMap[d.str];
                const pArr = permessiMap[d.str];
                const isF = ferieMap[d.str];
                const isToday = d.str===today;
                const hasStra = straMapMie[d.str];
                let bg = 'bg-slate-50 text-slate-300';
                if (isF)                              bg = 'bg-sky-500 text-white';
                else if (t)                           bg = 'bg-emerald-500 text-white';
                else if (isM)                         bg = 'bg-amber-400 text-white';
                else if (!d.isFuture && !d.isWeekend) bg = 'bg-red-100 text-red-500';
                else if (!d.isFuture && d.isWeekend)  bg = 'bg-slate-200 text-slate-400';
                const isRepOwn    = repOwnMap[d.str];
                const isRepOthers = repOthersMap[d.str];
                const repBorder   = isRepOwn ? 'border-b-[6px] border-purple-500' : isRepOthers ? 'border-b-[6px] border-slate-400' : '';
                const repTitle    = isRepOwn ? ' · 📡 Reperibilità tua' : isRepOthers ? ` · 📡 Reperibilità: ${(repOthersMap[d.str]||[]).map(e=>e.nome+' '+e.cognome[0]+'.').join(', ')}` : '';
                return (
                  <div key={di} title={(isF ? 'Ferie' : t ? `Entrata: ${t.ora}` : isM ? 'Malattia' : pArr ? `Permesso: ${pArr.map(p=>p.oraInizio+'-'+p.oraFine).join(', ')}` : d.isFuture ? '' : 'Assente')+repTitle+(gestMap[d.str]?` · 📞 ${gestMap[d.str].length} gest.: ${gestMap[d.str].map(g=>g.cliente).join(', ')}`:'' )+(hasStra?' · ⌚ Straordinario':'')}
                    className={`relative rounded-xl p-1 text-center transition-all ${bg} ${repBorder} ${isToday ? 'ring-2 ring-blue-500 ring-offset-1' : ''}`}>
                    <p className="text-xs font-bold">{d.num}</p>
                    {isF && <p style={{fontSize:10}} className="font-bold leading-tight">F</p>}
                    {!isF && t  && <p style={{fontSize:9}} className="font-semibold leading-tight">{t.ora}</p>}
                    {!isF && isM && <p style={{fontSize:9}} className="font-semibold leading-tight">M</p>}
                    {!isF && !t && !isM && !d.isFuture && <p style={{fontSize:9}} className="leading-tight opacity-60">{d.isWeekend ? '—' : '✗'}</p>}
                    {!isF && pArr && <p style={{fontSize:8}} className={`font-bold leading-tight ${t||isM?'text-violet-200':'text-violet-500'}`}>🕐</p>}
                    {isRepOwn && <p style={{fontSize:8}} className="font-bold leading-tight text-purple-200">R</p>}
                    {gestMap[d.str] && <p style={{fontSize:8}} className="font-bold leading-tight text-indigo-200">📞{gestMap[d.str].length>1?gestMap[d.str].length:''}</p>}
                    {hasStra && <span className="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-orange-500 border border-white flex items-center justify-center" style={{fontSize:6,color:'white',fontWeight:'bold'}}>S</span>}
                  </div>
                );
              })}
            </div>
          ));
        })()}
        <div className="flex items-center gap-4 mt-4 pt-4 border-t border-slate-100 text-xs text-slate-400 flex-wrap">
          <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-emerald-500 inline-block"></span>Presente</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-sky-500 inline-block"></span>Ferie (F)</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-amber-400 inline-block"></span>Malattia</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-red-100 border border-red-200 inline-block"></span>Assente</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-slate-100 inline-block"></span>Weekend / Futuro</span>
          <span className="flex items-center gap-1.5"><Icon name="clipboard" size={12} color="#8b5cf6" /> Permesso orario</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-1 bg-purple-500 inline-block rounded"></span>Reperibilità tua</span>
          <span className="flex items-center gap-1.5"><span className="w-3 h-1 bg-slate-400 inline-block rounded"></span>Reperibilità collega</span>
          {user.reperibile && <span className="flex items-center gap-1.5"><Icon name="phone" size={12} color="#6366f1" /> Gestione telefonica</span>}
          {user.straordinario && <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-orange-500 inline-block"></span>S Straordinario</span>}
        </div>
      </div>
    </div>
  );
}
