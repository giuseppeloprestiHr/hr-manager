function generaFileRilpre(anno, mese, employees, timbrature, permessi, ferie, malattie, settings) {
  const pad2      = n => String(n).padStart(2, '0');
  const padRight  = (s, n) => (s || '').substring(0, n).padEnd(n, ' ');
  const codAzienda = (settings.rilpreCodiceAzienda || '').padStart(4, '0');
  const codFiliale = (settings.rilpreCodiceFiliale || '').padStart(2, '0');
  const toMin = hhmm => { const [h,m] = hhmm.split(':').map(Number); return h*60+m; };
  const netMinutes = (ora, oraUscita, emp) => {
    const turno = getTurnoEmp(emp, settings);
    const entry = toMin(ora), exit = toMin(oraUscita), gross = exit - entry;
    const ps = toMin(turno.inizioPausa), pe = toMin(turno.finePausa);
    return gross - Math.max(0, Math.min(exit, pe) - Math.max(entry, ps));
  };
  const minToHhcc = totalMin => {
    const h = Math.floor(totalMin / 60), m = totalMin % 60;
    return String(h * 100 + Math.round(m * 100 / 60)).padStart(4, '0');
  };
  const oreToHhcc = ore => minToHhcc(Math.round(ore * 60));

  const CODICE_FALLBACK = { FE:'ferie', ML:'malattia', RO:'rol', EO:'ex_festivita',
    PP:'permessi_personali', H7:'legge_104', DS:'donazione_sangue',
    PA:'congedo_parentale', CM:'congedo_parentale', AQ:'allattamento', ST:'straordinari' };
  const TIP_MAP = {};
  (settings.rilpreGiustificativi || []).forEach(g => {
    const tip = g.tipologia || CODICE_FALLBACK[g.codice];
    if (tip && g.codice) TIP_MAP[tip] = g.codice;
  });
  if (!TIP_MAP['permessi_studio'] && TIP_MAP['permessi_personali'])
    TIP_MAP['permessi_studio'] = TIP_MAP['permessi_personali'];
  const COD_FERIE    = TIP_MAP['ferie']    || 'FE';
  const COD_MALATTIA = TIP_MAP['malattia'] || 'ML';

  const lastDay        = new Date(anno, mese, 0).getDate();
  const dataInizioStr  = `${pad2(1)}${pad2(mese)}${String(anno).slice(-2)}`;
  const dataFineStr    = `${pad2(lastDay)}${pad2(mese)}${String(anno).slice(-2)}`;
  const meseStr        = `${anno}-${pad2(mese)}`;

  const timbIdx = {};
  (timbrature || []).forEach(t => { if (t.data.startsWith(meseStr)) timbIdx[`${t.employeeId}_${t.data}`] = t; });
  const permIdx = {};
  (permessi || []).filter(p => p.status === 'approvato' && p.data.startsWith(meseStr)).forEach(p => {
    const k = `${p.employeeId}_${p.data}`; if (!permIdx[k]) permIdx[k] = []; permIdx[k].push(p);
  });
  const ferieByEmp = {}, malByEmp = {};
  (ferie || []).filter(f => f.status === 'approvato').forEach(f => { if (!ferieByEmp[f.employeeId]) ferieByEmp[f.employeeId]=[]; ferieByEmp[f.employeeId].push(f); });
  (malattie || []).forEach(m => { if (!malByEmp[m.employeeId]) malByEmp[m.employeeId]=[]; malByEmp[m.employeeId].push(m); });

  const inRange = (dateStr, list) => {
    const d = new Date(dateStr + 'T00:00:00');
    return list.some(r => d >= new Date(r.dataInizio+'T00:00:00') && d <= new Date(r.dataFine+'T00:00:00'));
  };

  const dipendenti = (employees || []).filter(e => !e.accessoDisabilitato);
  let out = '';

  dipendenti.forEach(emp => {
    const codDip = (emp.registro || '').replace(/\D/g, '').padStart(9, '0').slice(-9);
    let rec = codAzienda + codFiliale + codDip
            + padRight((emp.cognome || '').toUpperCase(), 34)
            + padRight((emp.nome    || '').toUpperCase(), 34)
            + dataInizioStr + dataFineStr;

    for (let day = 1; day <= 31; day++) {
      let oreOrd = '0000', giust = [];
      if (day <= lastDay) {
        const ds   = `${anno}-${pad2(mese)}-${pad2(day)}`;
        const timb = timbIdx[`${emp.id}_${ds}`];
        if (timb && timb.oraUscita) oreOrd = minToHhcc(netMinutes(timb.ora, timb.oraUscita, emp));

        if (inRange(ds, malByEmp[emp.id]   || [])) giust.push([COD_MALATTIA, '0800']);
        else if (inRange(ds, ferieByEmp[emp.id] || [])) giust.push([COD_FERIE, '0800']);
        (permIdx[`${emp.id}_${ds}`] || []).forEach(p => {
          giust.push([TIP_MAP[p.tipologia] || '????', oreToHhcc(p.orePermesso)]);
        });
      }
      rec += oreOrd;
      for (let i = 0; i < 6; i++) {
        rec += i < giust.length ? giust[i][0].padEnd(4,' ') + giust[i][1] : '    0000';
      }
    }
    out += rec;
  });
  return out;
}

function parseFileRilpre(content) {
  const HEADER = 95, DAY_LEN = 52, RECORD_LEN = HEADER + 31 * DAY_LEN;
  const hhccToStr = v => {
    if (!v) return null;
    const h = Math.floor(v / 100), cc = v % 100;
    const m = Math.round(cc * 60 / 100);
    return m > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`;
  };
  const raw = content.replace(/[\r\n]/g, '');
  if (raw.length % RECORD_LEN !== 0) return { error: `Lunghezza file non multiplo di ${RECORD_LEN} (${raw.length} char, resto ${raw.length % RECORD_LEN})` };
  const records = [];
  for (let pos = 0; pos + RECORD_LEN <= raw.length; pos += RECORD_LEN) {
    const rec = raw.substring(pos, pos + RECORD_LEN);
    const codAzienda = rec.substring(0, 4).trim();
    const codFiliale = rec.substring(4, 6).trim();
    const codDip     = rec.substring(6, 15).trim();
    const cognome    = rec.substring(15, 49).trim();
    const nome       = rec.substring(49, 83).trim();
    const diStr      = rec.substring(83, 89); // DDMMYY
    const dfStr      = rec.substring(89, 95);
    const mese       = parseInt(diStr.substring(2, 4));
    const anno       = 2000 + parseInt(diStr.substring(4, 6));
    const lastDay    = new Date(anno, mese, 0).getDate();
    const days = [];
    for (let d = 0; d < 31; d++) {
      const base = HEADER + d * DAY_LEN;
      const oreOrd = parseInt(rec.substring(base, base + 4)) || 0;
      const giust = [];
      for (let g = 0; g < 6; g++) {
        const gBase = base + 4 + g * 8;
        const codice = rec.substring(gBase, gBase + 4).trim();
        const ore    = parseInt(rec.substring(gBase + 4, gBase + 8)) || 0;
        if (codice && ore > 0) giust.push({ codice, ore });
      }
      days.push({ day: d + 1, inRange: d + 1 <= lastDay, oreOrd, giust });
    }
    records.push({ codAzienda, codFiliale, codDip, cognome, nome, mese, anno, lastDay, days });
  }
  return { records };
}

      {}
      {showSection('man-ops') && <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

              const reqBy = employees.find(e=>e.id===op.requestedBy);

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error: String(error) }; }
  componentDidCatch(error, info) { console.error('HR Manager crash:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f1f3d',padding:'2rem'}}>
          <div style={{background:'white',borderRadius:'1.5rem',padding:'2rem',maxWidth:'400px',width:'100%'}}>
            <div style={{fontSize:'2rem',marginBottom:'1rem'}}>⚠️</div>
            <h2 style={{fontWeight:'bold',fontSize:'1.1rem',marginBottom:'0.5rem',color:'#1e293b'}}>Errore applicazione</h2>
            <p style={{fontSize:'0.85rem',color:'#64748b',marginBottom:'1rem'}}>Si è verificato un errore imprevisto. Dettaglio tecnico:</p>
            <pre style={{background:'#f1f5f9',padding:'0.75rem',borderRadius:'0.5rem',fontSize:'0.7rem',whiteSpace:'pre-wrap',wordBreak:'break-all',color:'#dc2626',marginBottom:'1.5rem'}}>{this.state.error}</pre>
            <button onClick={()=>window.location.reload()}
              style={{width:'100%',padding:'0.75rem',borderRadius:'1rem',background:'#1e3a6e',color:'white',fontWeight:'600',fontSize:'0.875rem',border:'none',cursor:'pointer'}}>
              🔄 Ricarica applicazione
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function GestioneTelefonica({ user, reperibilita, gestioniTelefoniche, setGestioniTelefoniche, onNuovaGestione }) {
  const n = new Date();
  const [month, setMonth] = React.useState(n.getMonth()+1);
  const [year,  setYear]  = React.useState(n.getFullYear());
  const [selectedDay, setSelectedDay] = React.useState(null); // YYYY-MM-DD
  const [form, setForm] = React.useState({ cliente:'', note:'' });
  const [formError, setFormError] = React.useState('');
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const today  = todayStr();
  const mStr   = `${year}-${String(month).padStart(2,'0')}`;

  const repDays = new Set(
    (reperibilita||[]).filter(r=>r.employeeId===user.id && r.pubblicata).map(r=>r.data)
  );

  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length: daysInMonth}, (_,i) => {
    const d   = String(i+1).padStart(2,'0');
    const m   = String(month).padStart(2,'0');
    const str = `${year}-${m}-${d}`;
    const dow = new Date(year, month-1, i+1).getDay();
    return { num:i+1, str, dow, isWeekend: dow===0||dow===6, isFuture: str>today };
  });

  const gestMap = {};
  (gestioniTelefoniche||[]).filter(g=>g.employeeId===user.id).forEach(g => {
    if (!gestMap[g.data]) gestMap[g.data] = [];
    gestMap[g.data].push(g);
  });

  const gestMese = (gestioniTelefoniche||[]).filter(g=>g.employeeId===user.id&&g.data.startsWith(mStr)).length;

  const selectedGest = selectedDay ? (gestMap[selectedDay]||[]) : [];

  const handleSalva = () => {
    if (!form.cliente.trim()) { setFormError('Inserisci il nome del cliente'); return; }
    setFormError('');
    const now = new Date();
    const ora = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const ng = { id: String(Date.now())+Math.random(), employeeId: user.id, data: selectedDay, ora, cliente: form.cliente.trim(), note: form.note.trim(), timestamp: Date.now() };
    setGestioniTelefoniche(prev => { const upd=[...prev,ng]; saveData('gestioni_telefoniche',upd); return upd; });
    onNuovaGestione && onNuovaGestione(ng);
    setForm({ cliente:'', note:'' });
  };

  const handleElimina = (id) => {
    if (!confirm('Eliminare questa gestione telefonica?')) return;
    setGestioniTelefoniche(prev => { const upd=prev.filter(g=>g.id!==id); saveData('gestioni_telefoniche',upd); return upd; });
  };

  return (
    <div className="p-4 lg:p-8">
      {}
      <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
        <div>
          <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2" style={{fontFamily:'Syne,sans-serif'}}><Icon name="phone" size={22} color="#6366f1" /> Gestioni telefoniche</h2>
          <p className="text-slate-600 text-sm mt-1">Registra le chiamate ricevute durante la reperibilità</p>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <button onClick={()=>{ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }} className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">‹</button>
            <span className="px-3 text-sm font-semibold text-slate-700 whitespace-nowrap">{MONTHS[month-1]} {year}</span>
            <button onClick={()=>{ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }} className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">›</button>
          </div>
        </div>
      </div>

      {}
      <div className="grid grid-cols-2 gap-4 mb-6">
        <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
          <p className="text-slate-400 text-xs font-medium mb-1">Gestioni {MONTHS[month-1]}</p>
          <p className="text-3xl font-bold text-indigo-600" style={{fontFamily:'Syne,sans-serif'}}>{gestMese}</p>
        </div>
        <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
          <p className="text-slate-400 text-xs font-medium mb-1">Turni reperibilità nel mese</p>
          <p className="text-3xl font-bold text-red-500" style={{fontFamily:'Syne,sans-serif'}}>{[...repDays].filter(d=>d.startsWith(mStr)).length}</p>
        </div>
      </div>

      <div className="flex flex-col lg:flex-row gap-6">
        {}
        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <p className="font-semibold text-slate-700 text-sm mb-4">Seleziona un giorno per registrare una gestione</p>
          <div className="grid grid-cols-7 gap-1 mb-2">
            {DAYS.map(d => <div key={d} className="text-center text-xs font-semibold text-slate-400 py-1">{d}</div>)}
          </div>
          {(() => {
            const firstDow = new Date(year, month-1, 1).getDay();
            const allCells = [...Array(firstDow).fill(null), ...days];
            const weeks = [];
            for (let i=0; i<allCells.length; i+=7) weeks.push(allCells.slice(i,i+7));
            return weeks.map((week, wi) => (
              <div key={wi} className="grid grid-cols-7 gap-1 mb-1">
                {week.map((d, di) => {
                  if (!d) return <div key={di}/>;
                  const hasRep = repDays.has(d.str);
                  const nGest  = gestMap[d.str]?.length || 0;
                  const isSelected = selectedDay === d.str;
                  const isToday = d.str === today;
                  if (!hasRep) return (
                    <div key={di} className={`rounded-xl p-1 text-center ${d.isWeekend?'bg-slate-100 text-slate-300':'bg-slate-50 text-slate-200'}`}>
                      <p className="text-xs font-bold">{d.num}</p>
                    </div>
                  );
                  return (
                    <button key={di} onClick={()=>{ setSelectedDay(d.str); setForm({cliente:'',note:''}); setFormError(''); }}
                      className={`rounded-xl p-1 text-center transition-all relative border-b-[4px] ${isSelected ? 'bg-indigo-600 border-indigo-800 text-white ring-2 ring-indigo-400 ring-offset-1' : 'bg-red-500 border-red-700 hover:bg-red-600 text-white'} ${isToday?'ring-2 ring-blue-400 ring-offset-1':''}`}>
                      <p className="text-xs font-bold">{d.num}</p>
                      {nGest > 0 && <p style={{fontSize:9}} className="font-bold flex items-center justify-center gap-0.5"><Icon name="phone" size={8} color="currentColor" />{nGest}</p>}
                    </button>
                  );
                })}
              </div>
            ));
          })()}
          <div className="flex gap-3 mt-4 pt-4 border-t border-slate-100 text-xs text-slate-400 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-4 h-4 rounded-md bg-red-500 border-b-2 border-red-700 inline-block"></span>Reperibilità</span>
            <span className="flex items-center gap-1.5"><span className="w-4 h-4 rounded-md bg-indigo-600 inline-block"></span>Selezionato</span>
            <span className="flex items-center gap-1.5"><Icon name="phone" size={12} color="#6366f1" /> = gestioni registrate</span>
          </div>
        </div>

        {}
        {selectedDay ? (
          <div className="w-full lg:w-80 flex flex-col gap-4">
            {}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
              <p className="font-semibold text-slate-700 text-sm mb-3">📋 {fmtData(selectedDay)}</p>
              {selectedGest.length === 0 ? (
                <p className="text-slate-400 text-sm text-center py-4">Nessuna gestione registrata</p>
              ) : (
                <div className="space-y-3 max-h-60 overflow-y-auto">
                  {selectedGest.map((g,i) => (
                    <div key={g.id} className="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-3 relative">
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-xs font-bold text-indigo-600">#{i+1} · {g.ora}</span>
                        <button onClick={()=>handleElimina(g.id)} className="text-slate-300 hover:text-red-500 text-xs">✕</button>
                      </div>
                      <p className="font-semibold text-slate-800 text-sm">👤 {g.cliente}</p>
                      {g.note && <p className="text-slate-500 text-xs mt-1">📝 {g.note}</p>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {}
            {!selectedDay || selectedDay <= today ? (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                <p className="font-semibold text-slate-700 text-sm mb-3">➕ Nuova gestione</p>
                <div className="space-y-3">
                  <div>
                    <label className="text-xs text-slate-400 font-medium block mb-1">Cliente *</label>
                    <input type="text" placeholder="Nome cliente o azienda"
                      value={form.cliente} onChange={e=>setForm(f=>({...f,cliente:e.target.value}))}
                      className="w-full px-3 py-2 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                  </div>
                  <div>
                    <label className="text-xs text-slate-400 font-medium block mb-1">Note</label>
                    <textarea placeholder="Descrizione, problema, soluzione…"
                      value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
                      rows={3}
                      className="w-full px-3 py-2 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"/>
                  </div>
                  {formError && <p className="text-red-500 text-xs">{formError}</p>}
                  <button onClick={handleSalva}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors">
                    💾 Salva gestione
                  </button>
                </div>
              </div>
            ) : (
              <div className="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center text-slate-400 text-sm">
                Non è possibile inserire gestioni per giorni futuri.
              </div>
            )}
          </div>
        ) : (
          <div className="w-full lg:w-80 bg-slate-50 border border-slate-200 rounded-2xl p-8 text-center text-slate-400 flex items-center justify-center">
            <div>
              <div className="flex justify-center mb-2"><Icon name="phone" size={36} color="#6366f1" /></div>
              <p className="text-sm font-medium">Seleziona un giorno di reperibilità dal calendario</p>
            </div>
          </div>
        )}
      </div>

      {}
      {(()=>{
        const mFirst = `${year}-${String(month).padStart(2,'0')}-01`;
        const storico = (gestioniTelefoniche||[])
          .filter(g => g.employeeId===user.id && g.data < mFirst)
          .sort((a,b) => b.data.localeCompare(a.data));
        if (!storico.length) return null;
        const byMonth = {};
        storico.forEach(g => { const k=g.data.substring(0,7); if(!byMonth[k])byMonth[k]=[]; byMonth[k].push(g); });
        const sortedM = Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
        return (
          <div className="mt-8">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 flex items-center gap-2">
              <Icon name="clock" size={13} color="#94a3b8"/>Storico gestioni telefoniche
            </p>
            <div className="space-y-4">
              {sortedM.map(mk => {
                const [yy,mm] = mk.split('-');
                return (
                  <div key={mk} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-100 flex items-center justify-between">
                      <p className="text-sm font-bold text-slate-700">{MONTHS[parseInt(mm)-1]} {yy}</p>
                      <span className="text-xs text-indigo-600 font-semibold bg-indigo-50 px-2 py-0.5 rounded-full">{byMonth[mk].length} gestioni</span>
                    </div>
                    <div className="divide-y divide-slate-50">
                      {byMonth[mk].map(g => (
                        <div key={g.id} className="px-4 py-2.5 flex items-start gap-3">
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-xs text-slate-400 font-medium whitespace-nowrap">{fmtData(g.data)} · {g.ora}</span>
                              <span className="font-semibold text-slate-800 text-sm">👤 {g.cliente}</span>
                            </div>
                            {g.note && <p className="text-slate-400 text-xs mt-0.5 truncate">📝 {g.note}</p>}
                          </div>
                          <button onClick={()=>handleElimina(g.id)} className="text-slate-300 hover:text-red-500 transition-colors text-xs shrink-0 mt-0.5">✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function Reperibilita({ user, employees, reperibilita, setReperibilita, malattie, ferie, gestioniTelefoniche, onPubblica, onNotificaModifica }) {
  const n = new Date();
  const [month, setMonth] = React.useState(n.getMonth()+1);
  const [year,  setYear]  = React.useState(n.getFullYear());
  const [confirm, setConfirm] = React.useState(null);
  const [pubConfirm, setPubConfirm] = React.useState(false);
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const today  = todayStr();
  const mStr   = `${year}-${String(month).padStart(2,'0')}`;

  const teamEmps = employees.filter(e => (e.responsabileId === user.id || e.id === user.id) && e.reperibile && !e.accessoDisabilitato);

  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length: daysInMonth}, (_,i) => {
    const d   = String(i+1).padStart(2,'0');
    const m   = String(month).padStart(2,'0');
    const str = `${year}-${m}-${d}`;
    const dow = new Date(year, month-1, i+1).getDay();
    return { num:i+1, str, dow, isWeekend: dow===0||dow===6 };
  });

  const haBozze = (reperibilita||[]).some(r => r.data.startsWith(mStr) && !r.pubblicata);

  const repMap = {};
  (reperibilita||[]).forEach(r => { repMap[`${r.employeeId}_${r.data}`] = r; });

  const ferieMap = {};
  (ferie||[]).filter(f=>f.status=== SF.APPROVATO).forEach(f => {
    let cur = new Date(f.dataInizio+'T00:00:00');
    const end = new Date(f.dataFine+'T00:00:00');
    while (cur <= end) { ferieMap[`${f.employeeId}_${localDateStr(cur)}`] = true; cur.setDate(cur.getDate()+1); }
  });

  const malattiaMap = {};
  (malattie||[]).forEach(m => {
    const fine = m.dataFine || m.dataInizio;
    let cur = new Date(m.dataInizio+'T00:00:00');
    const end = new Date(fine+'T00:00:00');
    while (cur <= end) { malattiaMap[`${m.employeeId}_${localDateStr(cur)}`] = true; cur.setDate(cur.getDate()+1); }
  });

  const gestMap = {};
  (gestioniTelefoniche||[]).forEach(g => {
    const k = `${g.employeeId}_${g.data}`;
    if (!gestMap[k]) gestMap[k] = [];
    gestMap[k].push(g);
  });

  const [gestPanel, setGestPanel] = React.useState(null); // {emp, day, lista:[]}

  const handleCella = (emp, day) => {
    const key = `${emp.id}_${day.str}`;
    const existing = repMap[key];
    if (existing) {
      setConfirm({ empId: emp.id, empName:`${emp.nome} ${emp.cognome}`, data: day.str, action:'remove', wasPubblicata: existing.pubblicata });
    } else {
      if (ferieMap[key]) { alert(`⚠️ ${emp.nome} ${emp.cognome} è in ferie il ${fmtData(day.str)}. Non è possibile assegnare la reperibilità.`); return; }
      if (malattiaMap[key]) { alert(`⚠️ ${emp.nome} ${emp.cognome} è in malattia il ${fmtData(day.str)}. Non è possibile assegnare la reperibilità.`); return; }
      const nr = { id: String(Date.now())+Math.random(), employeeId: emp.id, data: day.str, responsabileId: user.id, pubblicata: false, timestamp: Date.now() };
      setReperibilita(prev => { const upd=[...prev,nr]; saveData('reperibilita',upd); return upd; });
    }
  };

  const eseguiConferma = () => {
    if (!confirm) return;
    const { empId, data, action, wasPubblicata } = confirm;
    setReperibilita(prev => {
      let upd;
      if (action === 'add') {
        const nr = { id: String(Date.now())+Math.random(), employeeId: empId, data, responsabileId: user.id, pubblicata: false, timestamp: Date.now() };
        upd = [...prev, nr];
      } else {
        upd = prev.filter(r => !(r.employeeId === empId && r.data === data));
        if (wasPubblicata) onNotificaModifica && onNotificaModifica(empId, data, 'rimossa');
      }
      saveData('reperibilita', upd);
      return upd;
    });
    setConfirm(null);
  };

  const eseguiPubblica = () => { onPubblica && onPubblica(mStr); setPubConfirm(false); };

  const bozzaCount = (reperibilita||[]).filter(r=>r.data.startsWith(mStr)&&!r.pubblicata).length;
  const pubCount   = (reperibilita||[]).filter(r=>r.data.startsWith(mStr)&&r.pubblicata).length;

  return (
    <div className="p-4 lg:p-8">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
        <div>
          <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Reperibilità</h2>
          <p className="text-slate-600 text-sm mt-1">Assegna i turni di reperibilità al tuo team</p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="flex items-center gap-1 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <button onClick={()=>{ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }} className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">‹</button>
            <span className="px-3 text-sm font-semibold text-slate-700 whitespace-nowrap">{MONTHS[month-1]} {year}</span>
            <button onClick={()=>{ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }} className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">›</button>
          </div>
          {haBozze && (
            <button onClick={()=>setPubConfirm(true)}
              className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors shadow-sm flex items-center gap-2">
              📢 Pubblica {MONTHS[month-1]}
              <span className="bg-white text-red-600 rounded-full text-xs font-bold px-1.5">{bozzaCount}</span>
            </button>
          )}
        </div>
      </div>

      <div className="flex gap-3 mb-5 flex-wrap">
        {pubCount > 0 && <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-2 text-sm text-red-700 font-medium">🔴 {pubCount} turni pubblicati</div>}
        {bozzaCount > 0 && <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2 text-sm text-amber-700 font-medium">✏️ {bozzaCount} turni in bozza (non ancora notificati)</div>}
        {bozzaCount === 0 && pubCount === 0 && <div className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm text-slate-400">Nessun turno assegnato per {MONTHS[month-1]} {year}</div>}
      </div>

      {teamEmps.length === 0 ? (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-10 text-center text-slate-400">
          <p className="text-4xl mb-3">🔴</p>
          <p className="font-semibold">Nessun dipendente abilitato alla reperibilità nel tuo team.</p>
          <p className="text-sm mt-2">Abilita il flag "Reperibilità" nella scheda di ogni dipendente.</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="overflow-x-auto">
            <table className="border-collapse" style={{minWidth: `${200 + daysInMonth * 36}px`}}>
              <thead>
                <tr className="bg-slate-800 text-white text-xs">
                  <th className="px-4 py-3 text-left font-semibold sticky left-0 bg-slate-800 z-10 min-w-36">Dipendente</th>
                  {days.map(d => (
                    <th key={d.str} className={`text-center py-2 font-semibold ${d.isWeekend?'bg-slate-600':''}`} style={{width:34}}>
                      <div className="text-xs opacity-70">{DAYS[d.dow]}</div>
                      <div>{d.num}</div>
                    </th>
                  ))}
                  <th className="px-3 py-3 text-center font-semibold">Rep.</th>
                  <th className="px-3 py-3 text-center font-semibold">📞</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {teamEmps.map(emp => {
                  const turniMese = days.filter(d=>repMap[`${emp.id}_${d.str}`]).length;
                  const gestMese  = (gestioniTelefoniche||[]).filter(g=>g.employeeId===emp.id&&g.data.startsWith(mStr)).length;
                  return (
                    <tr key={emp.id} className="hover:bg-slate-50/50 transition-colors">
                      <td className="px-4 py-2 sticky left-0 bg-white z-10 border-r border-slate-100">
                        <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 font-bold text-xs flex items-center justify-center shrink-0">{emp.nome[0]}{emp.cognome[0]}</div>
                          <div>
                            <p className="font-semibold text-slate-800 text-sm leading-tight">{emp.cognome} {emp.nome}</p>
                            <span className={`text-xs px-1.5 rounded-full ${ROLE_COLORS[emp.ruolo]}`}>{ROLE_LABELS[emp.ruolo]}</span>
                          </div>
                        </div>
                      </td>
                      {days.map(d => {
                        const key = `${emp.id}_${d.str}`;
                        const rec = repMap[key];
                        const inFerie    = ferieMap[key];
                        const inMalattia = malattiaMap[key];
                        const gestKey = `${emp.id}_${d.str}`;
                        const gestArr = gestMap[gestKey];
                        const gestTitle = gestArr ? ` · 📞 ${gestArr.length} gest.: ${gestArr.map(g=>g.cliente+(g.note?` (${g.note})`:'') ).join(' | ')}` : '';
                        if (inFerie)    return <td key={d.str} className={`text-center py-1 ${d.isWeekend?'bg-slate-100':''}`}><div className="mx-auto rounded-md flex items-center justify-center bg-sky-200" style={{width:28,height:28}} title={`${emp.nome}: ferie`}><span style={{fontSize:9}} className="font-bold text-sky-700">F</span></div></td>;
                        if (inMalattia) return <td key={d.str} className={`text-center py-1 ${d.isWeekend?'bg-slate-100':''}`}><div className="mx-auto rounded-md flex items-center justify-center bg-amber-200" style={{width:28,height:28}} title={`${emp.nome}: malattia`}><span style={{fontSize:9}} className="font-bold text-amber-700">M</span></div></td>;
                        return (
                          <td key={d.str} className={`text-center py-1 ${d.isWeekend?'bg-slate-100/60':''}`}>
                            <div className="relative inline-block">
                              <button onClick={() => handleCella(emp, d)}
                                title={(rec ? `Rimuovi reperibilità ${emp.nome} ${fmtData(d.str)}` : `Assegna reperibilità ${emp.nome} ${fmtData(d.str)}`)+gestTitle}
                                className={`mx-auto rounded-md flex items-center justify-center transition-all border-b-[6px] ${rec ? rec.pubblicata ? 'bg-red-500 border-red-700 hover:bg-red-600 text-white' : 'bg-red-200 border-red-400 hover:bg-red-300 text-red-800' : d.isWeekend ? 'bg-slate-200 border-slate-200 hover:bg-red-100 hover:border-red-300 text-slate-400' : 'bg-slate-100 border-slate-100 hover:bg-red-100 hover:border-red-300 text-slate-300'}`}
                                style={{width:28,height:28}}>
                                {rec && <span style={{fontSize:10}} className="font-bold">{rec.pubblicata ? 'R' : 'r'}</span>}
                              </button>
                              {gestArr && (
                                <button onClick={()=>setGestPanel({emp, day:d, lista:gestArr})}
                                  title={`📞 ${gestArr.length} gestione${gestArr.length>1?'i':''} telefonica${gestArr.length>1?'he':''}`}
                                  className="absolute -top-2 -right-2 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold z-10 hover:bg-indigo-700 transition-colors"
                                  style={{width:16, height:16, fontSize:9, lineHeight:1}}>
                                  {gestArr.length}
                                </button>
                              )}
                            </div>
                          </td>
                        );
                      })}
                      <td className="px-3 py-2 text-center">
                        <span className={`text-sm font-bold px-2 py-0.5 rounded-lg ${turniMese>0?'text-red-600 bg-red-50':'text-slate-300'}`}>{turniMese||'—'}</span>
                      </td>
                      <td className="px-3 py-2 text-center">
                        <span className={`text-sm font-bold px-2 py-0.5 rounded-lg ${gestMese>0?'text-indigo-600 bg-indigo-50':'text-slate-300'}`}>{gestMese||'—'}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="flex items-center gap-4 px-5 py-4 border-t border-slate-100 text-xs text-slate-500 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-5 h-5 rounded-md bg-red-500 border-b-4 border-red-700 inline-flex items-center justify-center text-white font-bold" style={{fontSize:9}}>R</span>Pubblicato</span>
            <span className="flex items-center gap-1.5"><span className="w-5 h-5 rounded-md bg-red-200 border-b-4 border-red-400 inline-flex items-center justify-center text-red-800 font-bold" style={{fontSize:9}}>r</span>Bozza</span>
            <span className="flex items-center gap-1.5"><span className="w-5 h-5 rounded-md bg-sky-200 inline-flex items-center justify-center text-sky-700 font-bold" style={{fontSize:9}}>F</span>Ferie</span>
            <span className="flex items-center gap-1.5"><span className="w-5 h-5 rounded-md bg-amber-200 inline-flex items-center justify-center text-amber-700 font-bold" style={{fontSize:9}}>M</span>Malattia</span>
            <span className="flex items-center gap-1.5"><span className="w-4 h-4 rounded-full bg-indigo-600 inline-flex items-center justify-center text-white font-bold" style={{fontSize:9}}>N</span>Gestioni telefoniche del giorno</span>
            <span className="ml-auto text-slate-400 hidden sm:block">Clicca su una cella per aggiungere/rimuovere</span>
          </div>
        </div>
      )}

      {confirm && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
            <p className="text-lg font-bold text-slate-800 mb-2">Rimuovi reperibilità</p>
            <p className="text-slate-500 text-sm mb-4">Rimuovere <strong>{confirm.empName}</strong> dalla reperibilità del <strong>{fmtData(confirm.data)}</strong>?
              {confirm.wasPubblicata && <span className="text-red-600 text-xs mt-1 block font-medium">⚠️ Il dipendente riceverà una notifica di cancellazione.</span>}
            </p>
            <div className="flex gap-3 justify-end">
              <button onClick={()=>setConfirm(null)} className="px-4 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 transition-colors">Annulla</button>
              <button onClick={eseguiConferma} className="px-4 py-2 rounded-xl text-white text-sm font-semibold bg-slate-700 hover:bg-slate-800 transition-colors">Rimuovi</button>
            </div>
          </div>
        </div>
      )}

      {pubConfirm && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
            <p className="text-lg font-bold text-slate-800 mb-2">📢 Pubblica turni di {MONTHS[month-1]}</p>
            <p className="text-slate-500 text-sm mb-4">Verranno pubblicati <strong>{bozzaCount} turni</strong> e i dipendenti coinvolti riceveranno una notifica.<br/><span className="text-amber-600 text-xs mt-1 block">I singoli turni possono comunque essere rimossi in seguito.</span></p>
            <div className="flex gap-3 justify-end">
              <button onClick={()=>setPubConfirm(false)} className="px-4 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 transition-colors">Annulla</button>
              <button onClick={eseguiPubblica} className="px-4 py-2 rounded-xl text-white text-sm font-semibold bg-red-600 hover:bg-red-700 transition-colors">Pubblica e notifica</button>
            </div>
          </div>
        </div>
      )}

      {}
      {gestPanel && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
            <div className="flex items-center justify-between mb-4">
              <div>
                <p className="text-lg font-bold text-slate-800 flex items-center gap-2"><Icon name="phone" size={16} color="#6366f1" /> Gestioni telefoniche</p>
                <p className="text-sm text-slate-400">{gestPanel.emp.nome} {gestPanel.emp.cognome} · {fmtData(gestPanel.day.str)}</p>
              </div>
              <button onClick={()=>setGestPanel(null)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">×</button>
            </div>
            <div className="space-y-3 max-h-80 overflow-y-auto">
              {gestPanel.lista.map((g,i) => (
                <div key={g.id} className="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-3">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-xs font-bold text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded-full">#{i+1}</span>
                    <span className="text-xs text-slate-400">{g.ora}</span>
                  </div>
                  <p className="font-semibold text-slate-800 text-sm">👤 {g.cliente}</p>
                  {g.note && <p className="text-slate-500 text-xs mt-1">📝 {g.note}</p>}
                </div>
              ))}
            </div>
            <button onClick={()=>setGestPanel(null)} className="mt-4 w-full px-4 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 transition-colors">Chiudi</button>
          </div>
        </div>
      )}

      {}
      {(()=>{
        const mFirst = `${year}-${String(month).padStart(2,'0')}-01`;
        const teamIds = new Set(teamEmps.map(e=>e.id));
        const storico = (reperibilita||[])
          .filter(r => teamIds.has(r.employeeId) && r.data < mFirst)
          .sort((a,b) => b.data.localeCompare(a.data));
        if (!storico.length) return null;
        const byMonth = {};
        storico.forEach(r => { const k=r.data.substring(0,7); if(!byMonth[k])byMonth[k]=[]; byMonth[k].push(r); });
        const sortedM = Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
        return (
          <div className="mt-8">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 flex items-center gap-2">
              <Icon name="clock" size={13} color="#94a3b8"/>Storico reperibilità
            </p>
            <div className="space-y-4">
              {sortedM.map(mk => {
                const [yy,mm] = mk.split('-');
                const turni = byMonth[mk];
                const pub = turni.filter(r=>r.pubblicata).length;
                return (
                  <div key={mk} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-100 flex items-center justify-between">
                      <p className="text-sm font-bold text-slate-700">{MONTHS[parseInt(mm)-1]} {yy}</p>
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-red-600 font-semibold bg-red-50 px-2 py-0.5 rounded-full">{turni.length} turni</span>
                        {pub>0 && <span className="text-xs text-emerald-600 font-semibold bg-emerald-50 px-2 py-0.5 rounded-full">{pub} pubblicati</span>}
                      </div>
                    </div>
                    <div className="divide-y divide-slate-50">
                      {turni.map(r => {
                        const emp = teamEmps.find(e=>e.id===r.employeeId);
                        const gArr = gestMap[`${r.employeeId}_${r.data}`];
                        return (
                          <div key={r.id} className="px-4 py-2.5 flex items-center gap-3">
                            {emp && <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-700 font-bold text-xs flex items-center justify-center shrink-0">{emp.nome[0]}{emp.cognome[0]}</div>}
                            <span className="text-xs text-slate-400 font-medium whitespace-nowrap">{fmtData(r.data)}</span>
                            <span className="font-semibold text-slate-700 text-sm">{emp ? `${emp.cognome} ${emp.nome}` : r.employeeId}</span>
                            <div className="ml-auto flex items-center gap-2">
                              {r.pubblicata
                                ? <span className="text-xs bg-red-100 text-red-700 font-semibold px-2 py-0.5 rounded-full">🔴 Pubb.</span>
                                : <span className="text-xs bg-amber-100 text-amber-700 font-semibold px-2 py-0.5 rounded-full">✏️ Bozza</span>}
                              {gArr && <span className="text-xs text-indigo-600 font-semibold bg-indigo-50 px-2 py-0.5 rounded-full flex items-center gap-1"><Icon name="phone" size={10} color="#6366f1"/>{gArr.length}</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App() {
  const [employees, setEmployees]   = useState(() => loadEmployees());
  const [timbrature, setTimbrature] = useState(() => loadData('timbrature', []));
  const [malattie, setMalattie]     = useState(() => loadData('malattie', []));
  const [permessi, setPermessi]     = useState(() => loadData('permessi', []));
  const [ferie,    setFerie]         = useState(() => loadData('ferie', []));
  const [notifiche, setNotifiche]   = useState(() => loadData('notifiche', []));
  const [userId, setUserId]         = useState(null);
  const [needsPassChange, setNeedsPassChange] = useState(false);
  const [view, setView]             = useState('dashboard');
  const [manSection, setManSection] = useState(null);
  const [selectedEmp, setSelectedEmp] = useState(null);
  const [showNotifiche, setShowNotifiche] = useState(false);
  const [settings, setSettings] = useState(() => loadData('hr_settings', { webhookUrl: '', calendarEmbedUrl: '', calendarEnabled: false }));
  const [reperibilita, setReperibilita] = useState(() => loadData('reperibilita', []));
  const [gestioniTelefoniche, setGestioniTelefoniche] = useState(() => loadData('gestioni_telefoniche', []));
  const [straordinari, setStraordinari] = useState(() => loadData('straordinari', []));
  const [noteSpese, setNoteSpese]         = useState(() => loadData('note_spese', []));
  const [noteSpeseVoci, setNoteSpeseVoci] = useState(() => loadData('note_spese_voci', []));
  const [news, setNews]                   = useState(() => loadData('news', []));
  const [dbLoading, setDbLoading] = useState(true);
  const [dbError,   setDbError]   = useState(null);
  const [forcedLogoutMsg, setForcedLogoutMsg] = useState(null);
  const [pendingOps, setPendingOps] = useState(() => loadData('hr_pending_ops', []));

  React.useEffect(() => {
    DB.loadAll()
      .then(d => {
        if (d.employees?.length) {
          const localEmps = (() => { try { const s = localStorage.getItem('hr_employees'); return s ? JSON.parse(s) : []; } catch { return []; } })();
          const supaIds = new Set(d.employees.map(e => e.id));
          const localOnly = localEmps.filter(e => !supaIds.has(e.id));
          const merged = localOnly.length > 0 ? [...d.employees, ...localOnly] : d.employees;
          setEmployees(merged);
          try { localStorage.setItem('hr_employees', JSON.stringify(merged)); } catch {}
          if (localOnly.length > 0) DB.sync('hr_employees', merged).catch(e => console.warn('[DB] re-sync locale:', e?.message));
        }
        if (d.timbrature?.length)           setTimbrature(d.timbrature);
        if (d.malattie?.length)             setMalattie(d.malattie);
        if (d.permessi?.length)             setPermessi(d.permessi);
        if (d.ferie?.length)                setFerie(d.ferie);
        if (d.reperibilita?.length)         setReperibilita(d.reperibilita);

    const invia = (webhookUrl, calendarId) => {
      try {
        const cbName = 'hrCal_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const params = new URLSearchParams({
          tipo, titolo,
          descrizione: descrizione || '',
          inizio: dataInizio,
          fine: dataFine || dataInizio,
          action: 'create',
          callback: cbName,
          ...(calendarId ? { calendarId } : {})
        });
        const url = webhookUrl + (webhookUrl.includes('?') ? '&' : '?') + params.toString();
        const script = document.createElement('script');
        window[cbName] = () => { delete window[cbName]; script.remove(); };
        script.onerror = () => { delete window[cbName]; script.remove(); };
        script.src = url;
        document.head.appendChild(script);
        setTimeout(() => { if (window[cbName]) { delete window[cbName]; script.remove(); } }, 15000);
      } catch(e) {}
    };

    if (cfg.calendarEnabled && cfg.webhookUrl)

          ...(emp.responsabileId ? [emp.responsabileId] : []),
          ...masterIds
        ])].filter(id=>id!==p.employeeId);
    const fmtOreP = `${p.oraInizio}–${p.oraFine} (${fmtDurata(p.orePermesso)})`;
    creaNotifica('permesso',
      `🕐 Richiesta permesso: ${emp.nome} ${emp.cognome} — ${fmtData(p.data)} ${fmtOreP} — "${p.motivo}"`,
      dest, emp.id
    );
  };

  const handlePermessoApprova = (p) => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp) return;
    creaNotifica('permesso',
      `✅ Permesso approvato: ${fmtData(p.data)} ${p.oraInizio}–${p.oraFine} (${fmtDurata(p.orePermesso)})`,
      [p.employeeId], emp.id
    );
    const adminIds = employees.filter(e=>e.ruolo===RUOLI.AMMINISTRATORE||e.ruolo===RUOLI.DIRETTORE).map(e=>e.id).filter(id=>id!==p.employeeId&&id!==user.id);
    if (adminIds.length > 0)
      creaNotifica('permesso',
        `🕐 Permesso di ${emp.nome} ${emp.cognome} approvato da ${user.nome} ${user.cognome}: ${fmtData(p.data)} ${p.oraInizio}–${p.oraFine} (${fmtDurata(p.orePermesso)})`,
        adminIds, emp.id
      );
    pubblicaCalendario('permesso',
      `🕐 Permesso – ${emp.nome} ${emp.cognome} (${p.oraInizio}–${p.oraFine}, ${fmtDurata(p.orePermesso)})`,
      `Motivo: ${p.motivo}`,
      p.data, p.data
    );
  };

  const handlePermessoRifiuta = (p) => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp) return;
    creaNotifica('permesso',
      `❌ Permesso rifiutato: ${fmtData(p.data)} ${p.oraInizio}–${p.oraFine} — Motivazione: "${p.noteRifiuto}"`,
      [p.employeeId], emp.id
    );
  };

  const handleFerieRichiesta = (f) => {
    const emp = employees.find(e=>e.id===f.employeeId);
    if (!emp) return;
    const periodoStr = `${fmtData(f.dataInizio)} – ${fmtData(f.dataFine)} (${f.giorniLavorativi} gg)`;
    if (f.status === SF.APPROVATO) return; // admin: già approvato, nessuna notifica necessaria
    const direttoriIds = employees.filter(e=>e.ruolo === RUOLI.DIRETTORE).map(e=>e.id);
    const adminFallbackIds = employees.filter(e=>e.ruolo === RUOLI.AMMINISTRATORE).map(e=>e.id);
    const step2Dest = direttoriIds.length > 0 ? direttoriIds : adminFallbackIds;
    let dest;
    if (f.status === SF.PENDING_DIR) {
      dest = step2Dest.filter(id=>id!==f.employeeId);
    } else {
      const hasResp = !!emp.responsabileId;
      dest = hasResp ? [emp.responsabileId] : step2Dest;
      dest = dest.filter(id=>id!==f.employeeId);
    }
    creaNotifica('ferie', `🏖️ Richiesta ferie: ${emp.nome} ${emp.cognome} — ${periodoStr}${f.motivo?' — "'+f.motivo+'"':''}`, dest, emp.id);
  };

  const handleFerieApprovaResp = (f) => {
    const emp = employees.find(e=>e.id===f.employeeId);
    if (!emp) return;
    const periodoStr = `${fmtData(f.dataInizio)} – ${fmtData(f.dataFine)} (${f.giorniLavorativi} gg)`;
    creaNotifica('ferie', `✅ Ferie: step 1 approvato. In attesa approvazione direttore — ${periodoStr}`, [f.employeeId], emp.id);
    const dir2Ids = employees.filter(e=>e.ruolo === RUOLI.DIRETTORE).map(e=>e.id);
    const adm2Ids = employees.filter(e=>e.ruolo === RUOLI.AMMINISTRATORE).map(e=>e.id);
    const step2Ids = (dir2Ids.length > 0 ? dir2Ids : adm2Ids).filter(id=>id!==f.employeeId);
    if (step2Ids.length > 0)
      creaNotifica('ferie', `🏖️ Ferie di ${emp.nome} ${emp.cognome} in attesa approvazione finale — ${periodoStr}`, step2Ids, emp.id);
  };

  const handleFerieApprovaDir = (f) => {
    const emp = employees.find(e=>e.id===f.employeeId);
    if (!emp) return;
    const periodoStr = `${fmtData(f.dataInizio)} – ${fmtData(f.dataFine)} (${f.giorniLavorativi} gg)`;
    creaNotifica('ferie', `🎉 Ferie approvate: ${periodoStr}`, [f.employeeId], emp.id);
    pubblicaCalendario('ferie',
      `🏖️ Ferie – ${emp.nome} ${emp.cognome}`,
      `Ferie approvate: ${periodoStr}${f.motivo ? '\nMotivo: '+f.motivo : ''}`,
      f.dataInizio, f.dataFine
    );
  };

  const handleFerieRifiuta = (f) => {
    const emp = employees.find(e=>e.id===f.employeeId);
    if (!emp) return;
    const periodoStr = `${fmtData(f.dataInizio)} – ${fmtData(f.dataFine)}`;
    if (f.status === SF.ANNULLATA) {
      const dest = [f.employeeId];
      if (emp.responsabileId && emp.responsabileId !== userId) dest.push(emp.responsabileId);
      creaNotifica('ferie', `🗑️ Ferie annullate: ${periodoStr} — Motivazione: "${f.noteAnnullamento}"`, dest, emp.id);
    } else {
      creaNotifica('ferie', `❌ Ferie rifiutate: ${periodoStr} — Motivazione: "${f.noteRifiuto}"`, [f.employeeId], emp.id);
    }
  };

  const handleCancellaPermesso = (p, nota) => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp) return;
    const fmtP = `${fmtData(p.data)} ${p.oraInizio}–${p.oraFine}`;
    const dest = [...new Set([
      ...(emp.responsabileId ? [emp.responsabileId] : []),
      ...masterIds,
    ])].filter(id=>id!==p.employeeId);
    creaNotifica('permesso', `🗑️ Permesso annullato da ${emp.nome} ${emp.cognome}: ${fmtP} — "${nota}"`, dest, emp.id);
  };

  const handleMarkRead = id => {
    setNotifiche(prev => {
      const upd = prev.map(n => {
        if (n.id !== id) return n;
        const letta = n.lette.includes(userId);
        return letta
          ? {...n, lette: n.lette.filter(u => u !== userId)}   // toggle → non letta
          : {...n, lette: [...n.lette, userId]};                // toggle → letta
      });
      saveData('notifiche', upd); return upd;
    });
  };

  const handleMarkAllRead = () => {
    setNotifiche(prev => {
      const upd = prev.map(n => n.lette.includes(userId) ? n : {...n, lette:[...n.lette, userId]});
      saveData('notifiche', upd); return upd;
    });
  };

  const goTo = v => { setShowNotifiche(false); setView(v); };

  const handleConfermaNotaSpese = (ns) => {
    const upd = noteSpese.map(x => x.id === ns.id ? {...x, status:'confermata', confirmedAt: Date.now()} : x);
    setNoteSpese(upd); saveData('note_spese', upd); DB.sync('note_spese', upd);
    const emp = employees.find(e => e.id === ns.employeeId);
    const nomeMese = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'][ns.mese-1];
    const respId = emp?.responsabileId;
    const dest = [...masterIds, ...(respId && !masterIds.includes(respId) ? [respId] : [])];
    creaNotifica('nota-spese', `${emp?.nome} ${emp?.cognome} ha confermato la nota spese di ${nomeMese} ${ns.anno}`, dest, ns.employeeId);
  };

  const handleSbloccaNotaSpese = (ns) => {
    const upd = noteSpese.map(x => x.id === ns.id ? {...x, status:'aperta', confirmedAt: null} : x);
    setNoteSpese(upd); saveData('note_spese', upd); DB.sync('note_spese', upd);
    const nomeMese = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'][ns.mese-1];
    creaNotifica('nota-spese', `La tua nota spese di ${nomeMese} ${ns.anno} è stata sbloccata. Puoi modificarla e riconfermarla.`, [ns.employeeId], ns.employeeId);
  };

  if (dbLoading) return (
    <div style={{minHeight:'100vh',background:'#0f1f3d',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <style>{`@keyframes _spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:48,height:48,border:'5px solid rgba(255,255,255,0.15)',borderTop:'5px solid #fff',borderRadius:'50%',animation:'_spin .8s linear infinite'}}/>
      <p style={{color:'#fff',fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,margin:0}}>HR Manager</p>
      <p style={{color:'rgba(255,255,255,0.45)',fontSize:13,margin:0}}>Connessione al database in corso…</p>
    </div>
  );
  if (dbError) return (
    <div style={{minHeight:'100vh',background:'#0f1f3d',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:24}}>
      <span style={{fontSize:40}}>⚠️</span>
      <p style={{color:'#fff',fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,margin:0}}>Connessione fallita</p>
      <p style={{color:'rgba(255,255,255,0.55)',fontSize:13,textAlign:'center',maxWidth:320,margin:0}}>{dbError}</p>
      <button onClick={()=>window.location.reload()} style={{background:'#2563eb',color:'#fff',border:'none',borderRadius:12,padding:'10px 28px',cursor:'pointer',fontWeight:600,fontSize:14,marginTop:4}}>🔄 Riprova</button>
    </div>
  );
  if (!user) return <Login employees={employees} onLogin={handleLogin} forcedLogoutMsg={forcedLogoutMsg} onClearMsg={()=>setForcedLogoutMsg(null)} />;
  if (needsPassChange) return <ChangePassword user={user} onSave={handleChangePassword} isFirstAccess={!!user.primoAccesso} />;

  const r = user.ruolo;

  const renderView = () => {
    switch (view) {
      case 'dashboard':
        return <Dashboard user={user} employees={employees} timbrature={timbrature} permessi={permessi} ferie={ferie} straordinari={straordinari} setView={goTo} setSelectedEmployee={setSelectedEmp} news={news} settings={settings}/>;
      case 'dipendenti':
        if (!canSeeAll(r) && !canSeeTeam(r)) return null;
        return <EmployeeList user={user} employees={employees} setView={goTo} setSelectedEmployee={setSelectedEmp}/>;
      case 'dipendente-detail':
        if (!selectedEmp) { goTo('dipendenti'); return null; }
        return <EmployeeDetail emp={selectedEmp} employees={employees} settings={settings} isOwnProfile={false}
          canEdit={canManage(r) || r===RUOLI.DIRETTORE} currentUserRole={r} onEdit={()=>goTo('dipendente-form')}
          onDelete={()=>{
            if (r === RUOLI.AMMINISTRATORE) {
              if(confirm(`Eliminare definitivamente ${selectedEmp.nome} ${selectedEmp.cognome}?`)) handleDeleteEmp(selectedEmp.id);
            } else {
              handleProposeDeletion(selectedEmp);
            }
          }}
          onToggleGps={handleToggleGps} onToggleAccesso={handleToggleAccesso} onToggleReperibile={handleToggleReperibile}
          onToggleNuovaPassword={handleToggleNuovaPassword} onToggleStraordinario={handleToggleStraordinario}
          onBack={()=>goTo('dipendenti')} />;
      case 'dipendente-form':
        if (!canManage(r)) return null;
        return <EmployeeForm emp={selectedEmp} employees={employees} settings={settings} onSave={handleSaveEmp} currentUserRole={r}
          onBack={()=>goTo(selectedEmp ? 'dipendente-detail' : 'dipendenti')} />;
      case 'mia-anagrafica':
        return <EmployeeDetail emp={user} employees={employees} settings={settings} isOwnProfile={true}
          canEdit={false} currentUserRole={r} onEdit={()=>{}} onDelete={()=>{}} onToggleGps={()=>{}} onToggleAccesso={()=>{}} onToggleReperibile={()=>{}} onToggleNuovaPassword={()=>{}} onToggleStraordinario={()=>{}}
          onBack={()=>goTo('dashboard')} />;
      case 'timbratura':
        return <Timbratura user={user} timbrature={timbrature} setTimbrature={setTimbrature} onTimbratura={handleTimbratura} onStraordinario={handleStraordinario} settings={settings} straordinari={straordinari} />;
      case 'malattia':
        return <Malattia user={user} employees={employees} malattie={malattie} setMalattie={setMalattie} onMalattia={handleMalattia} />;
      case 'mie-presenze':
        return <MiePresenze user={user} timbrature={timbrature} malattie={malattie} permessi={permessi} ferie={ferie} reperibilita={reperibilita} employees={employees} gestioniTelefoniche={gestioniTelefoniche} straordinari={straordinari} />;
      case 'miei-straordinari':
        if (!user.straordinario) { goTo('dashboard'); return null; }
        return <MieiStraordinari user={user} straordinari={straordinari} />;
      case 'report':
        if (!canSeeReport(r)) return null;
        return <Report employees={employees} timbrature={timbrature} malattie={malattie} permessi={permessi} ferie={ferie} reperibilita={reperibilita} gestioniTelefoniche={gestioniTelefoniche} straordinari={straordinari} userRole={r} settings={settings} />;
      case 'calendario-team':
        if (!['direttore','responsabile'].includes(r)) { goTo('dashboard'); return null; }
        return <CalendarioTeam user={user} employees={employees} timbrature={timbrature} malattie={malattie} permessi={permessi} ferie={ferie} reperibilita={reperibilita} gestioniTelefoniche={gestioniTelefoniche} straordinari={straordinari} />;
      case 'permessi':
        return <PermessiOrari user={user} employees={employees} permessi={permessi} setPermessi={setPermessi} onRichiesta={handlePermessoRichiesta} onCancella={handleCancellaPermesso} />;
      case 'ferie':
        return <Ferie user={user} employees={employees} ferie={ferie} setFerie={setFerie} onRichiesta={handleFerieRichiesta} />;
      case 'gestioni-tel':
        if (!user.reperibile) { goTo('dashboard'); return null; }
        return <GestioneTelefonica user={user} reperibilita={reperibilita}
          gestioniTelefoniche={gestioniTelefoniche} setGestioniTelefoniche={setGestioniTelefoniche}
          onNuovaGestione={handleNuovaGestione} />;
      case 'reperibilita':
        if (r !== RUOLI.RESPONSABILE) { goTo('dashboard'); return null; }
        return <Reperibilita user={user} employees={employees} reperibilita={reperibilita} setReperibilita={setReperibilita}
          malattie={malattie} ferie={ferie} gestioniTelefoniche={gestioniTelefoniche} onPubblica={handlePubblicoMese} onNotificaModifica={handleNotificaModificaRep} />;
      case 'approva-permessi':
        if (r !== RUOLI.AMMINISTRATORE && r !== RUOLI.RESPONSABILE && r !== RUOLI.DIRETTORE) { goTo('dashboard'); return null; }
        return <ApprovaPermessi user={user} employees={employees} permessi={permessi} setPermessi={setPermessi} onApprova={handlePermessoApprova} onRifiuta={handlePermessoRifiuta} />;
      case 'approva-ferie':
        if (r !== RUOLI.AMMINISTRATORE && r !== RUOLI.RESPONSABILE && r !== RUOLI.DIRETTORE) { goTo('dashboard'); return null; }
        return <ApprovaFerie user={user} employees={employees} ferie={ferie} setFerie={setFerie} onApprovaResp={handleFerieApprovaResp} onApprovaDir={handleFerieApprovaDir} onRifiuta={handleFerieRifiuta} />;
      case 'approva-straordinari':
        if (r !== RUOLI.RESPONSABILE && r !== RUOLI.DIRETTORE && r !== RUOLI.AMMINISTRATORE) { goTo('dashboard'); return null; }
        return <ApprovaStraordinari user={user} employees={employees} straordinari={straordinari} setStraordinari={setStraordinari} onApprovaResp={handleApprovaStrResp} onApprovaDir={handleApprovaStrDir} onRifiuta={handleRifiutaStr} />;
      case 'notifiche':
        if (!canSeeNotifiche(r)) { goTo('dashboard'); return null; }
        return <NotifichePage notifiche={notifiche} employees={employees} userId={userId} userRole={r} onMarkRead={handleMarkRead} onMarkAllRead={handleMarkAllRead} />;
      case 'manutenzione':
        if (!canManage(r)) { goTo('dashboard'); return null; }
        return <Manutenzione settings={settings} onSave={handleSaveSettings} onBack={()=>goTo('dashboard')} currentUserRole={r} employees={employees} setEmployees={setEmployees} saveData={saveData} timbrature={timbrature} permessi={permessi} ferie={ferie} malattie={malattie} manSection={manSection} onSetManSection={setManSection} setView={setView} pendingOps={pendingOps} onApproveDeletion={handleApproveDeletion} onRejectDeletion={handleRejectDeletion} />;
      case 'note-spese':
        return <NotaSpese user={user} noteSpese={noteSpese} noteSpeseVoci={noteSpeseVoci}
          setNoteSpese={setNoteSpese} setNoteSpeseVoci={setNoteSpeseVoci}
          settings={settings} onConferma={handleConfermaNotaSpese} />;
      case 'note-spese-master':
        if (!canManage(r)) { goTo('dashboard'); return null; }
        return <NotaSpeseListaMaster user={user} employees={employees} noteSpese={noteSpese}
          noteSpeseVoci={noteSpeseVoci} settings={settings} onSblocca={handleSbloccaNotaSpese} />;
      case 'news':
        return <News user={user} news={news} setNews={setNews} employees={employees} />;
      case 'news-editor':
        if (!canManage(r) && r !== RUOLI.DIRETTORE && r !== RUOLI.AMMINISTRATORE) { goTo('dashboard'); return null; }
        return <NewsEditor user={user} news={news} setNews={setNews} employees={employees} onCreaNotifica={creaNotifica} />;
      case 'calendario-chiusure':
        if (r !== RUOLI.DIRETTORE && !canManage(r)) { goTo('dashboard'); return null; }
        return <CalendarioChiusure settings={settings} onSave={handleSaveSettings} />;
      case 'chiusure-view':
        return <ChiusureView settings={settings} />;
      case 'reset-approva':
        if (!canManage(r) || !selectedEmp) { goTo('dashboard'); return null; }
        return <ResetApprova emp={selectedEmp} onApprova={handleResetApprova} onBack={()=>goTo('dashboard')} />;
      case 'versione':
        if (!canManage(r)) { goTo('dashboard'); return null; }
        setManSection('versione'); goTo('manutenzione'); return null;
      case 'crediti-licenze':
        if (!canManage(r)) { goTo('dashboard'); return null; }
        setManSection('crediti-licenze'); goTo('manutenzione'); return null;
      default:
        return <Dashboard user={user} employees={employees} timbrature={timbrature} permessi={permessi} ferie={ferie} straordinari={straordinari} setView={goTo} setSelectedEmployee={setSelectedEmp} news={news} settings={settings}/>;
    }
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar user={user} view={view} setView={goTo} setSelectedEmployee={setSelectedEmp}
        onLogout={handleLogout} resetRequests={resetRequests}
        notifiche={notifiche} userId={userId} onBell={()=>setShowNotifiche(p=>!p)}
        manSection={manSection} onSetManSection={setManSection}/>
      <div className="flex-1 flex flex-col min-h-screen">
        <MobileTopBar user={user} view={view} setView={goTo} onLogout={handleLogout}
          resetRequests={resetRequests} notifiche={notifiche} userId={userId} onBell={()=>setShowNotifiche(p=>!p)}/>
        <main className="flex-1 overflow-auto bg-slate-50">{renderView()}</main>
      </div>
      <MobileBottomNav user={user} view={view} setView={goTo}
        resetRequests={resetRequests} notifiche={notifiche} userId={userId} onBell={()=>setShowNotifiche(p=>!p)}/>
      {showNotifiche && (
        <NotifichePanel notifiche={notifiche} userId={userId} userRole={r} employees={employees}
          onMarkRead={handleMarkRead} onMarkAllRead={handleMarkAllRead}
          onClose={()=>setShowNotifiche(false)} setView={goTo} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
  }
</script>
</html>
