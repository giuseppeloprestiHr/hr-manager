  );
}

function ApprovaStraordinari({ user, employees, straordinari, setStraordinari, onApprovaResp, onApprovaDir, onRifiuta }) {
  const r = user.ruolo;
  const isResp   = r === RUOLI.RESPONSABILE;
  const isDir    = r === RUOLI.DIRETTORE;
  const isAdmin  = r === RUOLI.AMMINISTRATORE;
  const [noteRifiuto, setNoteRifiuto] = useState({});
  const [showRifiuto, setShowRifiuto] = useState({});

  const fmtMin = (m) => m >= 60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m} min`;
  const empName = id => { const e = employees.find(x=>x.id===id); return e ? `${e.nome} ${e.cognome}` : id; };

  const visibili = (straordinari||[]).filter(s => {
    if (isDir || isAdmin) return s.status === SS.PENDING_DIR;
    if (isResp) {
      const emp = employees.find(e=>e.id===s.employeeId);
      return s.status === SS.PENDING_RESP && emp?.responsabileId === user.id;
    }
    return false;
  }).sort((a,b) => b.timestamp - a.timestamp);

  const storico = (straordinari||[]).filter(s => {
    if (isDir || isAdmin) return s.status === SS.APPROVATO || (s.status === SS.RIFIUTATO && s.approvatoRespId != null);
    if (isResp) {
      const emp = employees.find(e=>e.id===s.employeeId);
      if (!emp || emp.responsabileId !== user.id) return false;
      return s.status === SS.PENDING_DIR || s.status === SS.APPROVATO || s.status === SS.RIFIUTATO;
    }
    return false;
  }).sort((a,b) => b.timestamp - a.timestamp).slice(0, 30);

  const handleApprova = (s) => {
    if (isResp) onApprovaResp(s.id);
    else onApprovaDir(s.id);
  };

  const handleRifiuta = (s) => {
    const nota = noteRifiuto[s.id]||'';
    if (!nota.trim()) return;
    const p = onRifiuta(s.id, nota.trim());
    Promise.resolve(p).finally(() => setShowRifiuto(prev=>({...prev,[s.id]:false})));
  };

  const TIPO_LABEL = { mattina:'🌅 Mattina', sera:'🌆 Sera' };
  const STATUS_LABEL = { pending_resp:'In attesa Responsabile', pending_dir:'In attesa Direttore', approvato:'Approvato', rifiutato:'Rifiutato' };

  return (
    <div className="p-4 lg:p-8">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>⏰ Approva straordinari</h2>
        <p className="text-slate-600 text-sm mt-1">
          {isResp ? 'Straordinari del tuo team in attesa di approvazione (step 1)' : isAdmin ? 'Straordinari in attesa di approvazione definitiva (step 2) — vista Amministratore' : 'Straordinari in attesa di approvazione definitiva (step 2)'}
        </p>
      </div>
      {visibili.length === 0 ? (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-12 text-center">
          <p className="text-4xl mb-3">✅</p>
          <p className="text-slate-500 font-medium">Nessuno straordinario in attesa di approvazione</p>
        </div>
      ) : (
        <div className="space-y-4 max-w-2xl">
          {visibili.map(s => (
            <div key={s.id} className="bg-white rounded-2xl shadow-sm border border-orange-100 p-5">
              <div className="flex items-start justify-between gap-3 mb-3">
                <div>
                  <p className="font-bold text-slate-800 text-sm">{empName(s.employeeId)}</p>
                  <p className="text-slate-500 text-xs mt-0.5">{fmtData(s.data)} · {TIPO_LABEL[s.tipo]||s.tipo} · <strong className="text-orange-600">{fmtMin(s.minuti)}</strong></p>
                </div>
                <span className="text-xs px-2 py-1 rounded-full bg-orange-100 text-orange-700 font-medium shrink-0">{STATUS_LABEL[s.status]||s.status}</span>
              </div>
              <div className="bg-slate-50 rounded-xl px-4 py-3 mb-3">
                <p className="text-xs text-slate-500 uppercase tracking-wide font-medium mb-1">Nota del dipendente</p>
                <p className="text-sm text-slate-700 italic">"{s.nota}"</p>
              </div>
              {!showRifiuto[s.id] ? (
                <div className="flex gap-2">
                  <button onClick={()=>handleApprova(s)}
                    className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-xl text-sm font-semibold transition-colors">
                    ✅ Approva
                  </button>
                  <button onClick={()=>setShowRifiuto(p=>({...p,[s.id]:true}))}
                    className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-xl text-sm font-semibold transition-colors">
                    ✗ Rifiuta
                  </button>
                </div>
              ) : (
                <div className="space-y-2">
                  <textarea rows={2} placeholder="Motivo del rifiuto (obbligatorio)…"
                    value={noteRifiuto[s.id]||''} onChange={e=>setNoteRifiuto(p=>({...p,[s.id]:e.target.value}))}
                    className="w-full border border-red-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none"/>
                  <div className="flex gap-2">
                    <button onClick={()=>handleRifiuta(s)} disabled={!(noteRifiuto[s.id]||'').trim()}
                      className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-slate-200 disabled:text-slate-400 text-white py-2 rounded-xl text-sm font-semibold transition-colors">
                      Conferma rifiuto
                    </button>
                    <button onClick={()=>setShowRifiuto(p=>({...p,[s.id]:false}))}
                      className="px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 rounded-xl text-sm font-semibold transition-colors">
                      Annulla
                    </button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {storico.length > 0 && (
        <div className="mt-10 max-w-2xl">
          <h3 className="text-base font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2">📋 Storico richieste gestite</h3>
          <div className="space-y-3">
            {storico.map(s => {
              const statusCfg = {
                [SS.PENDING_DIR]: { cls:'bg-blue-100 text-blue-700', label:'Inviato al Direttore' },
                [SS.APPROVATO]:   { cls:'bg-emerald-100 text-emerald-700', label:'Approvato ✅' },
                [SS.RIFIUTATO]:   { cls:'bg-red-100 text-red-700', label:'Rifiutato ❌' },
              }[s.status] || { cls:'bg-slate-100 text-slate-600', label:s.status };
              return (
                <div key={s.id} className="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-start gap-4">
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-slate-800 text-sm">{empName(s.employeeId)}</p>
                    <p className="text-slate-500 text-xs mt-0.5">{fmtData(s.data)} · {TIPO_LABEL[s.tipo]||s.tipo} · <strong className="text-orange-600">{fmtMin(s.minuti)}</strong></p>
                    <p className="text-slate-400 text-xs mt-1 italic truncate">"{s.nota}"</p>
                    {s.status === SS.RIFIUTATO && s.noteRifiuto && (
                      <p className="text-red-500 text-xs mt-1">Motivo rifiuto: {s.noteRifiuto}</p>
                    )}
                  </div>
                  <span className={`text-xs px-2 py-1 rounded-full font-medium shrink-0 ${statusCfg.cls}`}>{statusCfg.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function ApprovaPermessi({ user, employees, permessi, setPermessi, onApprova, onRifiuta }) {
  const r = user.ruolo;
  const [rifiutoId,   setRifiutoId]   = useState(null);
  const [noteRifiuto, setNoteRifiuto] = useState('');
  const [errNote,     setErrNote]     = useState('');

  const gestibili = permessi.filter(p => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp) return false;
    if (r === RUOLI.AMMINISTRATORE) return ![RUOLI.MASTER, RUOLI.AMMINISTRATORE].includes(emp.ruolo) && p.status === SP.PENDING;
    if (r === RUOLI.DIRETTORE) return emp.ruolo === RUOLI.RESPONSABILE && p.status === 'pending_dir';
    if (r === RUOLI.RESPONSABILE) return emp.responsabileId===user.id && emp.id!==user.id && p.status === SP.PENDING;
    return false;
  });

  const pending   = gestibili.sort((a,b)=>a.timestamp-b.timestamp);
  const processed = permessi.filter(p => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp) return false;
    if (r === RUOLI.AMMINISTRATORE) return ![RUOLI.MASTER, RUOLI.AMMINISTRATORE].includes(emp.ruolo) && p.status !== SP.PENDING;
    if (r === RUOLI.DIRETTORE) return emp.ruolo === RUOLI.RESPONSABILE && p.status !== 'pending_dir' && p.status !== SP.PENDING;
    if (r === RUOLI.RESPONSABILE) return emp.responsabileId===user.id && emp.id!==user.id && p.status !== SP.PENDING;
    return false;
  }).sort((a,b)=>b.approvatoTimestamp-a.approvatoTimestamp);

  const getEmp = id => employees.find(e=>e.id===id);

  const handleApprova = (p) => {
    const upd = permessi.map(x => x.id===p.id
      ? {...x, status:'approvato', approvatoDa:user.id, approvatoTimestamp:Date.now()}
      : x);
    setPermessi(upd); saveData('permessi',upd);
    if (onApprova) onApprova({...p, status:'approvato'});
  };

  const handleRifiutaConferma = () => {
    if (!noteRifiuto.trim()) { setErrNote('La nota di rifiuto è obbligatoria.'); return; }
    const p = permessi.find(x=>x.id===rifiutoId);
    const upd = permessi.map(x => x.id===rifiutoId
      ? {...x, status:'rifiutato', noteRifiuto:noteRifiuto.trim(), approvatoDa:user.id, approvatoTimestamp:Date.now()}
      : x);
    setPermessi(upd); saveData('permessi',upd);
    if (onRifiuta && p) onRifiuta({...p, noteRifiuto:noteRifiuto.trim()});
    setRifiutoId(null); setNoteRifiuto(''); setErrNote('');
  };

  const STATUS_BADGE = { approvato:'bg-emerald-100 text-emerald-700', rifiutato:'bg-red-100 text-red-600' };

  return (
    <div className="p-4 lg:p-8 max-w-3xl">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>✅ Approva permessi</h2>
        <p className="text-slate-600 text-sm mt-1">Gestisci le richieste di permesso del tuo team</p>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <p className="font-bold text-slate-800">In attesa di approvazione</p>
          {pending.length > 0 && (
            <span className="bg-amber-100 text-amber-700 text-xs font-bold px-2.5 py-1 rounded-full">{pending.length}</span>
          )}
        </div>
        {pending.length === 0 ? (
          <p className="px-6 py-8 text-center text-slate-400 text-sm">Nessuna richiesta in attesa.</p>
        ) : (
          <div className="divide-y divide-slate-100">
            {pending.map(p => {
              const emp = getEmp(p.employeeId);
              if (!emp) return null;
              return (
                <div key={p.id} className="px-6 py-4">
                  <div className="flex items-start gap-4">
                    <div className="w-9 h-9 rounded-full bg-violet-100 flex items-center justify-center text-violet-700 font-bold text-sm shrink-0">
                      {emp.nome[0]}{emp.cognome[0]}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <p className="font-semibold text-slate-800 text-sm">{emp.nome} {emp.cognome}</p>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${ROLE_COLORS[emp.ruolo]}`}>{ROLE_LABELS[emp.ruolo]}</span>
                      </div>
                      <div className="flex items-center gap-2 mt-1 flex-wrap">
                        <p className="text-sm text-slate-600 font-medium">{fmtData(p.data)}</p>
                        <p className="text-sm text-slate-500">{p.oraInizio} – {p.oraFine}</p>
                        <span className="text-xs font-bold text-violet-600 bg-violet-50 px-2 py-0.5 rounded-full">{fmtDurata(p.orePermesso)}</span>
                      </div>
                      <p className="text-xs text-slate-500 mt-1">{p.motivo}</p>
                      {[RUOLI.MASTER, RUOLI.AMMINISTRATORE].includes(r) && p.tipologia && (
                        <p className="text-xs font-semibold text-violet-600 mt-0.5 bg-violet-50 px-2 py-0.5 rounded-md inline-block">
                          {TIPOLOGIA_LABEL[p.tipologia]||p.tipologia}
                        </p>
                      )}
                      <p className="text-xs text-slate-300 mt-1">Richiesta il {new Date(p.timestamp).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})}</p>
                    </div>
                    <div className="flex flex-col gap-2 shrink-0">
                      <button onClick={()=>handleApprova(p)}
                        className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-xl transition-colors">
                        ✅ Approva
                      </button>
                      <button onClick={()=>{setRifiutoId(p.id);setNoteRifiuto('');setErrNote('');}}
                        className="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-semibold px-4 py-2 rounded-xl transition-colors border border-red-200">
                        ❌ Rifiuta
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      {processed.length > 0 && (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="px-6 py-4 border-b border-slate-100">
            <p className="font-bold text-slate-800">Storico gestite</p>
          </div>
          <div className="divide-y divide-slate-100">
            {processed.map(p => {
              const emp = getEmp(p.employeeId);
              if (!emp) return null;
              return (
                <div key={p.id} className="px-6 py-4">
                  <div className="flex items-center justify-between gap-3">
                    <div className="min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <p className="font-semibold text-slate-700 text-sm">{emp.nome} {emp.cognome}</p>
                        <p className="text-slate-500 text-sm">{fmtData(p.data)}</p>
                        <p className="text-slate-400 text-sm">{p.oraInizio}–{p.oraFine}</p>
                        <span className="text-xs font-bold text-violet-600">{fmtDurata(p.orePermesso)}</span>
                      </div>
                      <p className="text-xs text-slate-400 mt-0.5">{p.motivo}</p>
                      {p.noteRifiuto && <p className="text-xs text-red-500 mt-1">Motivo rifiuto: {p.noteRifiuto}</p>}
                      {[RUOLI.MASTER, RUOLI.AMMINISTRATORE].includes(r) && p.tipologia && (
                        <p className="text-xs text-violet-500 font-medium mt-0.5">{TIPOLOGIA_LABEL[p.tipologia]||p.tipologia}</p>
                      )}
                    </div>
                    <span className={`shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full ${STATUS_BADGE[p.status]}`}>
                      {p.status=== SF.APPROVATO?'Approvato':'Rifiutato'}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {rifiutoId && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
            <h3 className="font-bold text-slate-800 text-lg mb-1">Rifiuta permesso</h3>
            <p className="text-slate-500 text-sm mb-4">Inserisci la motivazione del rifiuto. Il dipendente la riceverà nella notifica.</p>
            <textarea value={noteRifiuto} onChange={e=>{setNoteRifiuto(e.target.value);setErrNote('');}}
              placeholder="Motivazione obbligatoria..."
              rows={4}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-red-400 resize-none mb-2"/>
            {errNote && <p className="text-xs text-red-500 mb-3">{errNote}</p>}
            <div className="flex gap-3 justify-end">
              <button onClick={()=>setRifiutoId(null)}
                className="px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
                Annulla
              </button>
              <button onClick={handleRifiutaConferma}
                className="px-5 py-2.5 rounded-xl text-sm font-semibold bg-red-600 text-white hover:bg-red-700 transition-colors">
                Conferma rifiuto
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Report({ employees, timbrature, malattie, permessi, ferie, reperibilita, gestioniTelefoniche, straordinari, userRole, settings }) {
  const n = new Date();
  const [month, setMonth] = useState(n.getMonth()+1);
  const [year,  setYear]  = useState(n.getFullYear());
  const [tooltip, setTooltip] = useState(null);
  const MONTHS    = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS_SHORT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const showGps   = canSeeAll(userRole);
  const today     = todayStr();
  const mapsUrl   = gps => `https://www.google.com/maps?q=${gps.lat},${gps.lon}`;

  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length: daysInMonth}, (_,i) => {
    const d   = String(i+1).padStart(2,'0');
    const m   = String(month).padStart(2,'0');
    const str = `${year}-${m}-${d}`;
    const dow = new Date(year, month-1, i+1).getDay();
    return { num: i+1, str, dow, isWeekend: dow===0||dow===6, isFuture: str > today };
  });

  const presenceMap = {};
  timbrature.forEach(t => {
    if (t.data.startsWith(`${year}-${String(month).padStart(2,'0')}`))
      presenceMap[`${t.employeeId}_${t.data}`] = t;
  });

  const malattiaMap = {};
  (malattie||[]).forEach(m => {
    const fine = m.dataFine || m.dataInizio;
    let cur = new Date(m.dataInizio + 'T00:00:00');
    const end = new Date(fine + 'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      malattiaMap[`${m.employeeId}_${str}`] = true;
      cur.setDate(cur.getDate()+1);
    }
  });

  const permessiMap = {};
  (permessi||[]).filter(p=>p.status=== SF.APPROVATO).forEach(p => {
    const k = `${p.employeeId}_${p.data}`;
    if (!permessiMap[k]) permessiMap[k] = [];
    permessiMap[k].push(p);
  });

  const ferieMap = {};
  (ferie||[]).filter(f=>f.status=== SF.APPROVATO).forEach(f => {
    let cur = new Date(f.dataInizio+'T00:00:00');
    const end = new Date(f.dataFine+'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      ferieMap[`${f.employeeId}_${str}`] = f;
      cur.setDate(cur.getDate()+1);
    }
  });

  const mStr = `${year}-${String(month).padStart(2,'0')}`;
  const repMap = {};
  (reperibilita||[]).filter(r=>r.pubblicata).forEach(r => { repMap[`${r.employeeId}_${r.data}`] = true; });

  const gestMap = {};
  (gestioniTelefoniche||[]).forEach(g => {
    const k = `${g.employeeId}_${g.data}`;
    if (!gestMap[k]) gestMap[k] = [];
    gestMap[k].push(g);
  });

  const straMap = {};
  (straordinari||[]).filter(s=>s.status===SS.APPROVATO).forEach(s => {
    const k = `${s.employeeId}_${s.data}`;
    if (!straMap[k]) straMap[k] = [];
    straMap[k].push(s);
  });

  const orePermessiMese = {};
  (permessi||[]).filter(p=>p.status=== SF.APPROVATO&&p.data.startsWith(mStr)).forEach(p=>{
    orePermessiMese[p.employeeId] = (orePermessiMese[p.employeeId]||0) + p.orePermesso;
  });

  const ferieMese = {};
  (ferie||[]).filter(f=>f.status=== SF.APPROVATO).forEach(f=>{
    days.forEach(d=>{
      if (ferieMap[`${f.employeeId}_${d.str}`]) {
        ferieMese[f.employeeId] = (ferieMese[f.employeeId]||0) + 1;
      }
    });
  });

  const straMese = {};
  if (canSeeAll(userRole)) {
    (straordinari||[]).filter(s=>s.status===SS.APPROVATO&&s.data.startsWith(mStr)).forEach(s=>{
      straMese[s.employeeId] = (straMese[s.employeeId]||0) + s.minuti;
    });
  }

  const empTotals = employees.map(emp => {
    const presenze = days.filter(d => !d.isFuture && presenceMap[`${emp.id}_${d.str}`]).length;
    const malattiaGiorni = days.filter(d => !d.isFuture && !presenceMap[`${emp.id}_${d.str}`] && malattiaMap[`${emp.id}_${d.str}`]).length;
    const ferieDays = days.filter(d => ferieMap[`${emp.id}_${d.str}`]).length;
    const assenze = days.filter(d => !d.isWeekend && !d.isFuture && !presenceMap[`${emp.id}_${d.str}`] && !malattiaMap[`${emp.id}_${d.str}`] && !ferieMap[`${emp.id}_${d.str}`]).length;
    const nPermessi = (permessi||[]).filter(p=>p.employeeId===emp.id&&p.status=== SF.APPROVATO&&p.data.startsWith(mStr)).length;
    const oreP = orePermessiMese[emp.id]||0;
    const repDays = days.filter(d=>(reperibilita||[]).some(r=>r.employeeId===emp.id&&r.data===d.str&&r.pubblicata)).length;
    const gestMese = (gestioniTelefoniche||[]).filter(g=>g.employeeId===emp.id&&g.data.startsWith(mStr)).length;
    const straMinuti = straMese[emp.id]||0;
    return { emp, count: presenze, malattiaGiorni, assenze, nPermessi, oreP, ferieDays, repDays, gestMese, straMinuti };
  });

  const handleCell = (e, emp, day) => {
    const t = presenceMap[`${emp.id}_${day.str}`];
    if (!t) return;
    const rect = e.currentTarget.getBoundingClientRect();
    setTooltip({ t, empName:`${emp.nome} ${emp.cognome}`, x: rect.left + rect.width/2, y: rect.top });
  };

  const handleStampa = () => {
    const allTimbrature = timbrature || [];
    const allMalattie   = malattie   || [];
    const allPermessi   = permessi   || [];
    const allFerie      = ferie      || [];
    const mStr0 = String(month).padStart(2,'0');

    const freshMap = {};
    allTimbrature.forEach(t => {
      const k = `${String(t.employeeId)}_${String(t.data)}`;
      if (t.data && String(t.data).startsWith(`${year}-${mStr0}`))
        freshMap[k] = t;
    });

    const freshMalattiaMap = {};
    allMalattie.forEach(m => {
      const fine = m.dataFine || m.dataInizio;
      let cur = new Date(m.dataInizio + 'T00:00:00');
      const end = new Date(fine + 'T00:00:00');
      while (cur <= end) {
        const str = localDateStr(cur);
        freshMalattiaMap[`${m.employeeId}_${str}`] = true;
        cur.setDate(cur.getDate()+1);
      }
    });

    const freshFerieMap = {};
    allFerie.filter(f => f.status === SF.APPROVATO).forEach(f => {
      let cur = new Date(f.dataInizio + 'T00:00:00');
      const end = new Date(f.dataFine + 'T00:00:00');
      while (cur <= end) {
        const str = localDateStr(cur);
        freshFerieMap[`${f.employeeId}_${str}`] = true;
        cur.setDate(cur.getDate()+1);
      }
    });

    const freshPermessiMap = {};
    const mStrPdf = `${year}-${String(month).padStart(2,'0')}`;
    allPermessi.filter(p=>p.status=== SF.APPROVATO&&p.data.startsWith(mStrPdf)).forEach(p=>{
      const k = `${p.employeeId}_${p.data}`;
      if (!freshPermessiMap[k]) freshPermessiMap[k] = [];
      freshPermessiMap[k].push(p);
    });
    const orePermessiEmp = {};
    allPermessi.filter(p=>p.status=== SF.APPROVATO&&p.data.startsWith(mStrPdf)).forEach(p=>{
      orePermessiEmp[p.employeeId] = (orePermessiEmp[p.employeeId]||0)+p.orePermesso;
    });

    const allReperibilita      = reperibilita        || [];
    const allGestioniTel       = gestioniTelefoniche || [];
    const allStraordinariPdf   = straordinari        || [];

    const totalePresenze = Object.keys(freshMap).length;
    const printToday = todayStr();
    const _n0 = new Date();
    const isCurrentMonthPrint = (year === _n0.getFullYear() && month === _n0.getMonth()+1);
    const daysInMonthPrint = new Date(year, month, 0).getDate();
    const printDays = Array.from({length: daysInMonthPrint}, (_,i) => {
      const d   = String(i+1).padStart(2,'0');
      const m   = String(month).padStart(2,'0');
      const str = `${year}-${m}-${d}`;
      const dow = new Date(year, month-1, i+1).getDay();
      return { num: i+1, str, dow, isWeekend: dow===0||dow===6, isFuture: isCurrentMonthPrint && str>printToday };
    });
    const giorniLavorativi = printDays.filter(d => !d.isWeekend && !d.isFuture).length;
    const GIORNI_HEADER = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

    const fmtOra = ora => {
      if (!ora) return '';
      const [h, m] = ora.split(':');
      return `H. ${parseInt(h)},${m}`;
    };

    const firstDay = new Date(year, month-1, 1);
    const firstDow = firstDay.getDay(); // 0=dom, 1=lun...
    const offsetToMonday = firstDow === 0 ? -6 : 1 - firstDow;
    const weekStart = new Date(firstDay);
    weekStart.setDate(weekStart.getDate() + offsetToMonday);

    const weeks = [];
    let cur = new Date(weekStart);
    while (cur.getFullYear() < year || (cur.getFullYear() === year && cur.getMonth() < month)) {
      const week = [];
      for (let i=0; i<7; i++) {
        const d = new Date(cur);
        d.setDate(d.getDate() + i);
        const dStr = String(d.getDate()).padStart(2,'0');
        const mStr = String(d.getMonth()+1).padStart(2,'0');
        const str  = `${d.getFullYear()}-${mStr}-${dStr}`;
        week.push({ num: d.getDate(), str, dow: d.getDay(), isWeekend: d.getDay()===0||d.getDay()===6, isFuture: isCurrentMonthPrint && str>printToday, inMonth: d.getMonth()+1===month && d.getFullYear()===year });
      }
      weeks.push(week);
      cur.setDate(cur.getDate() + 7);
      if (week.every(d => !d.inMonth)) break;
    }

    const blocchi = weeks.filter(w => w.some(d => d.inMonth)).map(week => {
      const thGiorni = GIORNI_HEADER.map((g, i) => {
        const d = week[i];
        const cls = d.isWeekend ? 'th-we' : 'th-lav';
        return `<th class="${cls}">${g}</th>`;
      }).join('');

      const thNumeri = week.map(d => {
        const cls = d.isWeekend ? 'th-we' : 'th-lav';
        const txt = d.inMonth ? d.num : '';
        return `<th class="${cls}" style="font-size:11px">${txt}</th>`;
      }).join('');

      const righe = employees.map(emp => {
        const celle = week.map(d => {
          if (!d.inMonth) return `<td class="fuori">&nbsp;</td>`;
          const t    = freshMap[`${String(emp.id)}_${d.str}`];
          const isM  = !t && freshMalattiaMap[`${emp.id}_${d.str}`];
          const isF  = !t && !isM && freshFerieMap[`${emp.id}_${d.str}`];
          const pArr = freshPermessiMap[`${emp.id}_${d.str}`];
          const pTag = pArr ? `<span style="display:block;font-size:6.5px;color:#7c3aed;font-weight:bold;line-height:1.3">${pArr.map(p=>`<span style="display:block;font-size:5.5px;text-transform:uppercase;letter-spacing:.03em;opacity:.7">perm.</span>${p.oraInizio}-${p.oraFine}`).join(' ')}</span>` : '';
          if (t)   return `<td class="presente">P&nbsp;${fmtOra(t.ora)}${pTag}</td>`;
          if (isM) return `<td class="malattia">M${pTag}</td>`;
          if (isF) return `<td class="ferie">F</td>`;
          if (d.isFuture) return `<td class="futuro">&nbsp;</td>`;
          if (d.isWeekend) return `<td class="weekend">A</td>`;
          return `<td class="assente">A${pTag}</td>`;
        }).join('');
        const _t = getTurnoEmp(emp, settings); const _tNome = _t.nome || 'Turno Standard';
        return `<tr><td class="nome">${emp.cognome} ${emp.nome}<br><small>${ROLE_LABELS[emp.ruolo]}</small><small style="color:#0369a1;font-size:6.5px;display:block">${_tNome}</small></td>${celle}</tr>`;
      }).join('');

      return `
<table>
  <thead>
    <tr><th class="th-nome">&nbsp;</th>${thGiorni}</tr>
    <tr><th class="th-nome">&nbsp;</th>${thNumeri}</tr>
  </thead>
  <tbody>${righe}</tbody>
</table>
<div style="height:14px"></div>`;
    }).join('');

    const righe_totali = employees.map(emp => {
      const count    = printDays.filter(d => !d.isFuture && freshMap[`${emp.id}_${d.str}`]).length;
      const malCount = printDays.filter(d => !d.isFuture && !freshMap[`${emp.id}_${d.str}`] && freshMalattiaMap[`${emp.id}_${d.str}`]).length;
      const ferCount = printDays.filter(d => !d.isFuture && !freshMap[`${emp.id}_${d.str}`] && freshFerieMap[`${emp.id}_${d.str}`]).length;
      const assenze  = printDays.filter(d => !d.isWeekend && !d.isFuture && !freshMap[`${emp.id}_${d.str}`] && !freshMalattiaMap[`${emp.id}_${d.str}`] && !freshFerieMap[`${emp.id}_${d.str}`]).length;
      const oreP     = orePermessiEmp[emp.id] || 0;
      const repC     = allReperibilita.filter(r=>r.employeeId===emp.id&&r.pubblicata&&r.data.startsWith(mStrPdf)).length;
      const gestC    = allGestioniTel.filter(g=>g.employeeId===emp.id&&g.data.startsWith(mStrPdf)).length;
      const straMin  = allStraordinariPdf.filter(s=>s.status===SS.APPROVATO&&s.employeeId===emp.id&&s.data.startsWith(mStrPdf)).reduce((a,s)=>a+s.minuti,0);
      const fmtStra  = m => m>=60?`${Math.floor(m/60)}h${m%60>0?` ${m%60}m`:''}`:m>0?`${m}m`:'—';
      const _tEmp = getTurnoEmp(emp, settings); const _tEmpNome = _tEmp.nome || 'Turno Standard';
      return `<tr><td class="nome">${emp.cognome} ${emp.nome}</td><td class="nome" style="font-size:7.5px;color:#0369a1;font-weight:normal;padding-left:5px">${_tEmpNome}</td><td class="tot-num">${count}</td><td class="tot-num mal-num">${malCount||'—'}</td><td class="tot-num" style="background:#e0f2fe;color:#075985">${ferCount||'—'}</td><td class="tot-num">${assenze||'—'}</td><td class="tot-num" style="color:#7c3aed;font-weight:bold">${oreP > 0 ? fmtDurata(oreP) : '—'}</td><td class="tot-num" style="color:#7e22ce">${repC||'—'}</td><td class="tot-num" style="color:#4338ca">${gestC||'—'}</td><td class="tot-num" style="color:#c2410c">${fmtStra(straMin)}</td><td class="tot-num">${giorniLavorativi > 0 ? Math.round(count/giorniLavorativi*100) : 0}%</td></tr>`;
    }).join('');

    const totPres  = employees.reduce((a,emp)=>a+printDays.filter(d=>!d.isFuture&&freshMap[`${emp.id}_${d.str}`]).length,0);
    const totMal   = employees.reduce((a,emp)=>a+printDays.filter(d=>!d.isFuture&&!freshMap[`${emp.id}_${d.str}`]&&freshMalattiaMap[`${emp.id}_${d.str}`]).length,0);
    const totFer   = employees.reduce((a,emp)=>a+printDays.filter(d=>!d.isFuture&&!freshMap[`${emp.id}_${d.str}`]&&freshFerieMap[`${emp.id}_${d.str}`]).length,0);
    const totAss   = employees.reduce((a,emp)=>a+printDays.filter(d=>!d.isWeekend&&!d.isFuture&&!freshMap[`${emp.id}_${d.str}`]&&!freshMalattiaMap[`${emp.id}_${d.str}`]&&!freshFerieMap[`${emp.id}_${d.str}`]).length,0);
    const totRep   = allReperibilita.filter(r=>r.pubblicata&&r.data.startsWith(mStrPdf)).length;
    const totGest  = allGestioniTel.filter(g=>g.data.startsWith(mStrPdf)).length;
    const totStra  = allStraordinariPdf.filter(s=>s.status===SS.APPROVATO&&s.data.startsWith(mStrPdf)).reduce((a,s)=>a+s.minuti,0);
    const fmtStraT = m => m>=60?`${Math.floor(m/60)}h${m%60>0?` ${m%60}m`:''}`:m>0?`${m}m`:'—';
    const riga_totali = `<tr style="background:#1e3a6e;color:#fff;font-weight:bold"><td class="nome" style="background:#1e3a6e;color:#fff">TOTALI</td><td class="tot-num" style="color:#fff">—</td><td class="tot-num" style="color:#fff">${totPres}</td><td class="tot-num" style="color:#fde047">${totMal||'—'}</td><td class="tot-num" style="color:#7dd3fc">${totFer||'—'}</td><td class="tot-num" style="color:#fca5a5">${totAss||'—'}</td><td class="tot-num" style="color:#c4b5fd">—</td><td class="tot-num" style="color:#d8b4fe">${totRep||'—'}</td><td class="tot-num" style="color:#a5b4fc">${totGest||'—'}</td><td class="tot-num" style="color:#fdba74">${fmtStraT(totStra)}</td><td class="tot-num" style="color:#fff">—</td></tr>`;

    const html = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Report Presenze – ${MONTHS[month-1]} ${year}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; font-size: 9px; color: #000; background: #fff; padding: 15px; }
  h1 { font-size: 15px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .03em; }
  .subtitle { font-size: 9px; color: #666; margin-bottom: 14px; }

  .riepilogo .lbl { font-size:7.5px; color:#666; }
  table { border-collapse:collapse; width:100%; table-layout:fixed; }
  th, td { border:1px solid #bbb; text-align:center; padding:3px 2px; vertical-align:middle; }
  th.th-nome { text-align:left; padding-left:5px; background:#1e3a6e; color:#fff; width:130px; font-size:8px; }
  th.th-lav { background:#334155; color:#fff; font-size:8px; font-weight:bold; line-height:1.3; }
  th.th-we  { background:#94a3b8; color:#fff; font-size:8px; font-weight:bold; line-height:1.3; }
  td.nome   { text-align:left; padding:3px 5px; font-weight:bold; font-size:8px; background:#f5f5f5; }
  td.nome small { font-weight:normal; color:#777; font-size:7px; display:block; }
  td.presente { font-size:9px; font-weight:bold; background:#dcfce7; color:#000; text-align:center; padding:2px; white-space:nowrap; }
  td.assente  { font-size:8.5px; color:#000; font-weight:bold; background:#fff1f2; }

  const r = user.ruolo;
  const n = new Date();
  const [month, setMonth] = useState(n.getMonth()+1);
  const [year,  setYear]  = useState(n.getFullYear());
  const [tooltip, setTooltip] = useState(null);

  const MONTHS     = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS_SHORT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const today      = todayStr();

  const teamEmployees = r === RUOLI.DIRETTORE
    ? employees
    : [user, ...employees.filter(e => e.responsabileId === user.id && e.id !== user.id)];

  const prevMonth = () => { if (month === 1) { setMonth(12); setYear(y => y-1); } else setMonth(m => m-1); };
  const nextMonth = () => { if (month === 12) { setMonth(1); setYear(y => y+1); } else setMonth(m => m+1); };

  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length: daysInMonth}, (_,i) => {
    const d   = String(i+1).padStart(2,'0');
    const m   = String(month).padStart(2,'0');
    const str = `${year}-${m}-${d}`;
    const dow = new Date(year, month-1, i+1).getDay();
    return { num: i+1, str, dow, isWeekend: dow===0||dow===6, isFuture: str > today };
  });

  const mStr = `${year}-${String(month).padStart(2,'0')}`;

  const presenceMap = {};
  timbrature.forEach(t => {
    if (t.data.startsWith(mStr))
      presenceMap[`${t.employeeId}_${t.data}`] = t;
  });

  const malattiaMap = {};
  (malattie||[]).forEach(m => {
    const fine = m.dataFine || m.dataInizio;
    let cur = new Date(m.dataInizio + 'T00:00:00');
    const end = new Date(fine + 'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      malattiaMap[`${m.employeeId}_${str}`] = true;
      cur.setDate(cur.getDate()+1);
    }
  });

  const permessiMap = {};
  (permessi||[]).filter(p=>p.status=== SF.APPROVATO).forEach(p => {
    const k = `${p.employeeId}_${p.data}`;
    if (!permessiMap[k]) permessiMap[k] = [];
    permessiMap[k].push(p);
  });

  const ferieMap = {};
  (ferie||[]).filter(f=>f.status=== SF.APPROVATO).forEach(f => {
    let cur = new Date(f.dataInizio+'T00:00:00');
    const end = new Date(f.dataFine+'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      ferieMap[`${f.employeeId}_${str}`] = f;
      cur.setDate(cur.getDate()+1);
    }
  });

  const feriePendingRespMap = {};
  (ferie||[]).filter(f=>f.status=== SF.PENDING_RESP).forEach(f => {
    let cur = new Date(f.dataInizio+'T00:00:00');
    const end = new Date(f.dataFine+'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      feriePendingRespMap[`${f.employeeId}_${str}`] = f;
      cur.setDate(cur.getDate()+1);
    }
  });

  const feriePendingDirMap = {};
  (ferie||[]).filter(f=>f.status=== SF.PENDING_DIR).forEach(f => {
    let cur = new Date(f.dataInizio+'T00:00:00');
    const end = new Date(f.dataFine+'T00:00:00');
    while (cur <= end) {
      const str = localDateStr(cur);
      feriePendingDirMap[`${f.employeeId}_${str}`] = f;
      cur.setDate(cur.getDate()+1);
    }
  });

  const repMap = {};
  (reperibilita||[]).filter(r=>r.pubblicata).forEach(r => { repMap[`${r.employeeId}_${r.data}`] = true; });

  const orePermessiMese = {};
  (permessi||[]).filter(p=>p.status=== SF.APPROVATO&&p.data.startsWith(mStr)).forEach(p=>{
    orePermessiMese[p.employeeId] = (orePermessiMese[p.employeeId]||0) + p.orePermesso;
  });

  const gestMapTeam = {};
  (gestioniTelefoniche||[]).forEach(g=>{
    const k=`${g.employeeId}_${g.data}`; if(!gestMapTeam[k]) gestMapTeam[k]=[]; gestMapTeam[k].push(g);
  });
  const straMapTeam = {};
  (straordinari||[]).filter(s=>s.status===SS.APPROVATO).forEach(s=>{
    const k=`${s.employeeId}_${s.data}`; if(!straMapTeam[k]) straMapTeam[k]=[]; straMapTeam[k].push(s);
  });

  const handleCell = (e, emp, day) => {
    const t = presenceMap[`${emp.id}_${day.str}`];
    if (!t) return;
    const rect = e.currentTarget.getBoundingClientRect();
    setTooltip({ t, empName:`${emp.nome} ${emp.cognome}`, x: rect.left + rect.width/2, y: rect.top });
  };

  const titolo = r === RUOLI.DIRETTORE ? 'Calendario presenze aziendale' : 'Calendario presenze team';
  const sottotitolo = r === RUOLI.DIRETTORE
    ? `Tutti i dipendenti · ${employees.length} persone`
    : `Il mio team · ${teamEmployees.length} ${teamEmployees.length===1?'persona':'persone'}`;

  return (
    <div className="p-4 lg:p-8" onClick={() => setTooltip(null)}>
      {}
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>
          📅 {titolo}
        </h2>
        <p className="text-slate-600 text-sm mt-1">{sottotitolo}</p>
      </div>

      {teamEmployees.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm px-8 py-16 text-center">
          <p className="text-4xl mb-3">👥</p>
          <p className="text-slate-500 font-medium">Nessun dipendente nel team</p>
          <p className="text-slate-600 text-sm mt-1">I dipendenti assegnati a te appariranno qui.</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          {}
          <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <button onClick={prevMonth}
              className="w-9 h-9 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold transition-colors text-lg">
              ‹
            </button>
            <div className="text-center">
              <p className="font-bold text-slate-800 text-lg" style={{fontFamily:'Syne,sans-serif'}}>
                {MONTHS[month-1]} {year}
              </p>
              <p className="text-xs text-slate-400">{teamEmployees.length} {teamEmployees.length===1?'dipendente':'dipendenti'}</p>
            </div>
            <button onClick={nextMonth}
              className="w-9 h-9 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold transition-colors text-lg">
              ›
            </button>
          </div>

          {}
          <div className="overflow-x-auto">
            <table className="border-collapse" style={{minWidth: Math.max(teamEmployees.length > 0 ? 900 : 400, 200)}}>
              <thead>
                <tr className="bg-slate-50 border-b border-slate-100">
                  <th className="sticky left-0 bg-slate-50 z-10 px-4 py-2.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide border-r border-slate-100 min-w-[160px]">
                    Dipendente
                  </th>
                  {days.map(d => (
                    <th key={d.str}
                      className={`py-2 px-0 text-center border-b border-slate-100 min-w-[36px] w-[36px]
                        ${d.isWeekend ? 'bg-slate-200' : 'bg-slate-50'}
                        ${d.str===today ? 'bg-blue-50' : ''}`}>
                      <div className={`text-xs font-medium ${d.isWeekend?'text-slate-400':'text-slate-500'} ${d.str===today?'text-blue-600':''}`}>
                        {DAYS_SHORT[d.dow][0]}
                      </div>
                      <div className={`text-sm font-bold ${d.isWeekend?'text-slate-400':'text-slate-700'} ${d.str===today?'text-blue-700':''}`}>
                        {d.num}
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {teamEmployees.map(emp => {
                  const total = days.filter(d => !d.isFuture && presenceMap[`${emp.id}_${d.str}`]).length;
                  const oreP  = orePermessiMese[emp.id]||0;
                  return (
                    <tr key={emp.id} className="hover:bg-slate-50/50 transition-colors">
                      {}
                      <td className="sticky left-0 bg-white z-10 px-4 py-2 border-r border-slate-100">
                        <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-full bg-emerald-100 text-emerald-700 font-bold text-xs flex items-center justify-center shrink-0">
                            {emp.nome[0]}{emp.cognome[0]}
                          </div>
                          <div className="min-w-0">
                            <p className="text-sm font-medium text-slate-800 truncate">{emp.nome} {emp.cognome}</p>
                            <span className={`text-xs px-1.5 py-0 rounded-full ${ROLE_COLORS[emp.ruolo]}`}>{ROLE_LABELS[emp.ruolo]}</span>
                          </div>
                        </div>
                      </td>
                      {}
                      {days.map(d => {
                        const t         = presenceMap[`${emp.id}_${d.str}`];
                        const isM       = !t && malattiaMap[`${emp.id}_${d.str}`];
                        const isF       = !t && !isM && ferieMap[`${emp.id}_${d.str}`];
                        const isPendResp = !t && !isM && !isF && feriePendingRespMap[`${emp.id}_${d.str}`];
                        const isPendDir  = !t && !isM && !isF && !isPendResp && feriePendingDirMap[`${emp.id}_${d.str}`];
                        const pArr      = permessiMap[`${emp.id}_${d.str}`];
                        const bg        = isF         ? 'bg-sky-500 hover:bg-sky-600'
                                        : isPendResp  ? 'bg-sky-100 border-2 border-sky-400 border-dashed'
                                        : isPendDir   ? 'bg-sky-200 border border-sky-500'
                                        : t           ? 'bg-emerald-500 hover:bg-emerald-600 cursor-pointer'
                                        : isM         ? 'bg-amber-400'
                                        : d.isFuture  ? 'bg-slate-100'
                                        : d.isWeekend ? 'bg-slate-300'
                                        :               'bg-red-400';
                        const pulseClass = isPendResp ? 'animate-pulse' : '';
                        return (
                          <td key={d.str}
                            className={`px-0.5 py-1.5 text-center ${d.isWeekend?'bg-slate-200/70':''} ${d.str===today?'bg-blue-50/40':''}`}>
                            <div
                              onClick={e => { e.stopPropagation(); if(!isF && !isPendResp && !isPendDir) handleCell(e, emp, d); }}
                              title={
                                isF       ? `${emp.nome}: ferie approvate` :
                                isPendResp? `${emp.nome}: ferie in attesa approv. responsabile (${fmtData(feriePendingRespMap[`${emp.id}_${d.str}`].dataInizio)}–${fmtData(feriePendingRespMap[`${emp.id}_${d.str}`].dataFine)})` :
                                isPendDir ? `${emp.nome}: ferie approvate responsabile, in attesa admin` :
                                t         ? `${emp.nome}: entrata ${t.ora}${pArr?' · Permesso '+pArr.map(p=>p.oraInizio+'–'+p.oraFine).join(', '):''}` :
                                isM       ? `${emp.nome}: malattia` :
                                pArr      ? `${emp.nome}: permesso ${pArr.map(p=>p.oraInizio+'–'+p.oraFine).join(', ')}` :
                                d.isFuture ? '' : d.isWeekend ? '' : `${emp.nome}: assente`
                              }
                              className={`relative mx-auto rounded-md transition-colors ${bg} ${pulseClass} ${d.isFuture&&!isM&&!pArr&&!isF&&!isPendResp&&!isPendDir?'opacity-40':''}`}
                              style={{width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center'}}>
                              {isF       && <span className="text-white font-bold leading-none" style={{fontSize:10}}>F</span>}
                              {isPendResp && <span className="text-sky-600 font-bold leading-none" style={{fontSize:9}}>F?</span>}
                              {isPendDir  && <span className="text-sky-700 font-bold leading-none" style={{fontSize:9}}>F~</span>}
                              {!isF && !isPendResp && !isPendDir && t   && <span className="text-white text-xs font-bold leading-none" style={{fontSize:9}}>{t.ora}</span>}
                              {!isF && !isPendResp && !isPendDir && isM && <span className="text-white text-xs font-bold leading-none" style={{fontSize:10}}>M</span>}
                              {!isF && !isPendResp && !isPendDir && pArr && (
                                <span className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-violet-500 border-2 border-white flex items-center justify-center" style={{fontSize:7, color:'white', fontWeight:'bold'}}>P</span>
                              )}
                            </div>
                            {!isF && !isPendResp && !isPendDir && pArr && (
                              <div className="mt-0.5">
                                {pArr.map((p,i) => (
                                  <div key={i} style={{fontSize:7, lineHeight:1.2}} className="text-violet-600 font-bold leading-none">
                                    <span style={{fontSize:6}} className="opacity-60 uppercase tracking-wide">perm.</span>
                                    <br/>{p.oraInizio}-{p.oraFine}
                                  </div>
                                ))}
                              </div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {}
          <div className="px-5 py-3 border-t border-slate-100 bg-slate-50 flex items-center gap-5 text-xs text-slate-500 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-emerald-500 inline-block"></span>Presente</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-sky-500 inline-block"></span>Ferie approvate (F)</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-sky-200 border border-sky-400 border-dashed inline-block animate-pulse"></span>Ferie in attesa resp. (F?)</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-sky-300 border border-sky-500 inline-block"></span>Ferie approvate resp., att. dir.</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-amber-400 inline-block"></span>Malattia</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-red-400 inline-block"></span>Assente</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-slate-200 inline-block"></span>Weekend</span>
            <span className="text-violet-600 font-medium flex items-center gap-1">🕐 P = permesso orario approvato</span>
          </div>
        </div>
      )}

      {}
        {teamEmployees.length > 0 && (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 mt-6 overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-100">
              <p className="font-bold text-slate-800 text-sm">📊 Riepilogo mensile — {MONTHS[month-1]} {year}</p>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className="bg-slate-800 text-white">
                    <th className="px-4 py-2.5 text-left font-semibold">Dipendente</th>
                    <th className="px-3 py-2.5 text-center font-semibold">✅ Presenze</th>
                    <th className="px-3 py-2.5 text-center font-semibold">🏥 Malattia</th>
                    <th className="px-3 py-2.5 text-center font-semibold">❌ Assenze</th>
                    <th className="px-3 py-2.5 text-center font-semibold">✈️ Ferie</th>
                    <th className="px-3 py-2.5 text-center font-semibold">📋 Ore perm.</th>
                    <th className="px-3 py-2.5 text-center font-semibold">📡 Rep.</th>
                    <th className="px-3 py-2.5 text-center font-semibold">☎️ Gest.</th>
                    <th className="px-3 py-2.5 text-center font-semibold">⌚ Straord.</th>
                    <th className="px-3 py-2.5 text-center font-semibold">% Pres.</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {teamEmployees.map(emp => {
                    const presenze = days.filter(d => !d.isFuture && presenceMap[`${emp.id}_${d.str}`]).length;
                    const malDays  = days.filter(d => !d.isFuture && !presenceMap[`${emp.id}_${d.str}`] && malattiaMap[`${emp.id}_${d.str}`]).length;
                    const ferDays  = days.filter(d => ferieMap[`${emp.id}_${d.str}`]).length;
                    const assenze  = days.filter(d => !d.isWeekend && !d.isFuture && !presenceMap[`${emp.id}_${d.str}`] && !malattiaMap[`${emp.id}_${d.str}`] && !ferieMap[`${emp.id}_${d.str}`]).length;
                    const oreP2    = orePermessiMese[emp.id]||0;
                    const gestCnt  = (gestioniTelefoniche||[]).filter(g=>g.employeeId===emp.id&&g.data.startsWith(mStr)).length;
                    const straMin  = (straordinari||[]).filter(s=>s.status===SS.APPROVATO&&s.employeeId===emp.id&&s.data.startsWith(mStr)).reduce((a,s)=>a+s.minuti,0);
                    const fmtM     = m => m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
                    const giorniLav = days.filter(d=>!d.isWeekend&&!d.isFuture).length;
                    const pct = giorniLav > 0 ? Math.round(presenze/giorniLav*100) : 0;
                    return (
                      <tr key={emp.id} className="hover:bg-slate-50 transition-colors">
                        <td className="px-4 py-2.5">
                          <div className="flex items-center gap-2">
                            <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-700 font-bold text-xs flex items-center justify-center shrink-0">{emp.nome[0]}{emp.cognome[0]}</div>
                            <span className="font-medium text-slate-800">{emp.cognome} {emp.nome}</span>
                          </div>
                        </td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold px-2 py-0.5 rounded-lg ${presenze>0?'text-emerald-700 bg-emerald-50':'text-slate-400 bg-slate-50'}`}>{presenze}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold px-2 py-0.5 rounded-lg ${malDays>0?'text-amber-700 bg-amber-50':'text-slate-400 bg-slate-50'}`}>{malDays||'—'}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold px-2 py-0.5 rounded-lg ${assenze>0?'text-red-600 bg-red-50':'text-slate-400 bg-slate-50'}`}>{assenze||'—'}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold px-2 py-0.5 rounded-lg ${ferDays>0?'text-sky-700 bg-sky-50':'text-slate-400 bg-slate-50'}`}>{ferDays||'—'}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-semibold ${oreP2>0?'text-violet-600':'text-slate-300'}`}>{oreP2>0?fmtDurata(oreP2):'—'}</span></td>
                        <td className="px-3 py-2.5 text-center">{(() => { const rd=(reperibilita||[]).filter(r=>r.employeeId===emp.id&&r.pubblicata&&r.data.startsWith(mStr)).length; return <span className={`font-bold px-2 py-0.5 rounded-lg ${rd>0?'text-purple-700 bg-purple-50':'text-slate-300 bg-slate-50'}`}>{rd||'—'}</span>; })()}</td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold px-2 py-0.5 rounded-lg ${gestCnt>0?'text-indigo-600 bg-indigo-50':'text-slate-300 bg-slate-50'}`}>{gestCnt||'—'}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`text-xs font-bold px-2 py-0.5 rounded-lg ${straMin>0?'text-orange-600 bg-orange-50':'text-slate-300 bg-slate-50'}`}>{straMin>0?fmtM(straMin):'—'}</span></td>
                        <td className="px-3 py-2.5 text-center"><span className={`font-bold ${pct>=80?'text-emerald-600':pct>=50?'text-amber-600':'text-red-500'}`}>{pct}%</span></td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr className="bg-slate-800 text-white text-xs font-bold">
                    <td className="px-4 py-2.5 text-left">Totali</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+days.filter(d=>!d.isFuture&&presenceMap[`${emp.id}_${d.str}`]).length,0)}</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+days.filter(d=>!d.isFuture&&!presenceMap[`${emp.id}_${d.str}`]&&malattiaMap[`${emp.id}_${d.str}`]).length,0)||'—'}</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+days.filter(d=>!d.isWeekend&&!d.isFuture&&!presenceMap[`${emp.id}_${d.str}`]&&!malattiaMap[`${emp.id}_${d.str}`]&&!ferieMap[`${emp.id}_${d.str}`]).length,0)||'—'}</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+days.filter(d=>ferieMap[`${emp.id}_${d.str}`]).length,0)||'—'}</td>
                    <td className="px-3 py-2.5 text-center">—</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+(reperibilita||[]).filter(r=>r.employeeId===emp.id&&r.pubblicata&&r.data.startsWith(mStr)).length,0)||'—'}</td>
                    <td className="px-3 py-2.5 text-center">{teamEmployees.reduce((a,emp)=>a+(gestioniTelefoniche||[]).filter(g=>g.employeeId===emp.id&&g.data.startsWith(mStr)).length,0)||'—'}</td>
                    <td className="px-3 py-2.5 text-center">{(() => { const m=teamEmployees.reduce((a,emp)=>a+(straordinari||[]).filter(s=>s.status===SS.APPROVATO&&s.employeeId===emp.id&&s.data.startsWith(mStr)).reduce((b,s)=>b+s.minuti,0),0); return m>=60?`${Math.floor(m/60)}h ${m%60>0?`${m%60}m`:''}`:m>0?`${m}m`:'—'; })()}</td>
                    <td className="px-3 py-2.5 text-center">—</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}

      {}
      {tooltip && (
        <div className="fixed z-50 bg-slate-900 text-white text-xs rounded-xl px-4 py-3 shadow-xl pointer-events-none"
          style={{left: Math.min(tooltip.x - 100, window.innerWidth - 220), top: tooltip.y - 90, maxWidth:220}}>
          <p className="font-bold mb-1">{tooltip.empName}</p>
          <p>⏱️ Entrata: <strong>{tooltip.t.ora}</strong></p>
          {tooltip.t.gps && (
            <p className="mt-1 text-slate-300 text-xs">📍 GPS disponibile</p>
          )}
        </div>
      )}
    </div>
  );
}

function BellButton({ notifiche, userId, userRole, onOpen }) {

function NotifTesto({ testo, className }) {
  const parti = testo.split(' | ');
  return (
    <span className={className}>
      {parti.map((p, i) => {
        const urlMatch = p.match(/(https?:\/\/[^\s]+)/);
        if (urlMatch) {
          const pre = p.slice(0, p.indexOf(urlMatch[1]));
          return (
            <span key={i}>
              {i > 0 && <br/>}
              {pre}
              <a href={urlMatch[1]} target="_blank" rel="noopener noreferrer"
                onClick={e => e.stopPropagation()}
                className="text-blue-500 hover:underline font-medium">
                🗺️ Apri su Google Maps →
              </a>
            </span>
          );
        }
        return <span key={i}>{i > 0 && <br/>}{p}</span>;
      })}
    </span>
  );
}

  const empName = id => { const e = employees.find(x=>x.id===id); return e ? `${e.nome} ${e.cognome}` : ''; };
  const fmtTime = ts => {
    const d = new Date(ts), now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1)  return 'Ora';
    if (diff < 60) return `${diff} min fa`;
    if (diff < 1440) return `${Math.floor(diff/60)}h fa`;
    return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});

    <div className="fixed inset-0 z-50" onClick={onClose}>

const APPS_SCRIPT_CODE = `// ============================================================

function autorizza() {
  var cal = CalendarApp.getDefaultCalendar();
  Logger.log('Autorizzazione OK. Calendario: ' + cal.getName());
}

function getCalendario(calendarId) {
  if (calendarId) {
    var cal = CalendarApp.getCalendarById(calendarId);
    if (cal) return cal;
  }
  return CalendarApp.getDefaultCalendar();
}

function creaEvento(params) {
  var cal    = getCalendario(params.calendarId);
  var titolo = params.titolo || '(senza titolo)';
  var descr  = params.descrizione || '';
  var inizio = params.inizio;
  var fine   = params.fine || inizio;

  var startDate = new Date(inizio + 'T00:00:00');
  var endDate   = new Date(fine   + 'T00:00:00');
  var opts      = { description: descr };

  if (startDate.toDateString() === endDate.toDateString()) {
    cal.createAllDayEvent(titolo, startDate, opts);
  } else {
    cal.createAllDayEvent(titolo, startDate, endDate, opts);
  }
}

function rispondi(data, callback) {
  var json = JSON.stringify(data);
  if (callback) {
    return ContentService
      .createTextOutput(callback + '(' + json + ');')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ContentService
    .createTextOutput(json)
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e) {
  var p  = (e && e.parameter) ? e.parameter : {};
  var cb = p.callback || null;
  try {
    if (p.action === 'create') {
      creaEvento(p);
      return rispondi({ success: true }, cb);
    }
    return rispondi({ status: 'ok', message: 'HR Manager Calendar Webhook attivo' }, cb);
  } catch(err) {
    return rispondi({ success: false, error: err.toString() }, cb);
  }
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    creaEvento(data);
    return ContentService
      .createTextOutput(JSON.stringify({ success: true }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ success: false, error: err.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Importo (€)</label>
            <div className="relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-semibold text-sm">€</span>
              <input type="number" min="0" step="0.01" placeholder="0,00" value={form.importo}
                onChange={e => setForm(f => ({...f, importo:e.target.value}))}
                className={`w-full border rounded-xl pl-9 pr-4 py-3 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 ${err.importo?'border-red-400':'border-slate-200'}`} />
            </div>
            {err.importo && <p className="text-red-400 text-xs mt-1">{err.importo}</p>}
          </div>
          {}
          <div>
            <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
              Note <span className="text-slate-300 font-normal normal-case">(facoltative)</span>
            </label>
            <textarea rows={2} placeholder="Descrizione, fornitore, riferimento..." value={form.note}
              onChange={e => setForm(f => ({...f, note:e.target.value}))}
              className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" />
          </div>
        </div>
        <div className="px-4 pb-5 flex gap-3">
          <button onClick={onCancel} className="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 text-sm font-semibold">Annulla</button>
          <button onClick={handleSave} className="flex-1 py-3 rounded-xl text-white text-sm font-semibold transition-colors flex items-center justify-center gap-2" style={{background:'#1e3a6e'}}><Icon name="add" size={15} color="white"/> Aggiungi</button>
        </div>
      </div>
    </div>
  );
}

function NotaSpese({ user, noteSpese, noteSpeseVoci, setNoteSpese, setNoteSpeseVoci, settings, onConferma }) {
  const now = new Date();
  const [anno, setAnno] = useState(now.getFullYear());
  const [mese, setMese] = useState(now.getMonth() + 1);
  const [showForm, setShowForm] = useState(false);
  const [confirmDialog, setConfirmDialog] = useState(false);
  const [expandedDay, setExpandedDay] = useState(null);

  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const mStr = `${anno}-${String(mese).padStart(2,'0')}`;

  const notaCorrente = noteSpese.find(ns => ns.employeeId === user.id && ns.anno === anno && ns.mese === mese);
  const isConfermata = notaCorrente?.status === 'confermata';
  const vociMese = noteSpeseVoci.filter(v => v.employeeId === user.id && v.data.startsWith(mStr));
  const daysInMonth = new Date(anno, mese, 0).getDate();

  const cdc = (settings?.centriDiCosto||[]).find(c => c.id === user.centroDiCostoId);
  const auto = (settings?.autoList||[]).find(a => a.id === user.autoId);

  const getVociGiorno = g => {
    const ds = `${anno}-${String(mese).padStart(2,'0')}-${String(g).padStart(2,'0')}`;
    return vociMese.filter(v => v.data === ds);
  };
  const totCol = n => vociMese.filter(v => v.natura === n).reduce((s,v) => s + v.importo, 0);
  const totVA = totCol('vitto') + totCol('alloggio') + totCol('rappresentanza');
  const totVg = totCol('carburante') + totCol('pedaggio') + totCol('parcheggio') + totCol('altri acquisti');
  const totGen = totVA + totVg;
  const fn = v => v > 0 ? `€${v.toFixed(2)}` : '';
  const fnT = v => v === 0 ? '—' : `€${v.toFixed(2)}`;

  const handleAddVoce = (voce) => {
    let nsId;
    if (!notaCorrente) {
      const ns = { id: String(Date.now())+Math.random(), employeeId: user.id, anno, mese, status: 'aperta', confirmedAt: null, timestamp: Date.now() };
      const newNS = [...noteSpese, ns];
      setNoteSpese(newNS); saveData('note_spese', newNS); DB.sync('note_spese', newNS);
      nsId = ns.id;
    } else { nsId = notaCorrente.id; }
    const v = { id: String(Date.now())+Math.random(), notaSpeseId: nsId, employeeId: user.id, ...voce, timestamp: Date.now() };
    const newV = [...noteSpeseVoci, v];
    setNoteSpeseVoci(newV); saveData('note_spese_voci', newV); DB.sync('note_spese_voci', newV);
    setShowForm(false);
  };

  const handleDeleteVoce = (id) => {
    if (!confirm('Eliminare questa spesa?')) return;
    const upd = noteSpeseVoci.filter(v => v.id !== id);
    setNoteSpeseVoci(upd); saveData('note_spese_voci', upd); _deleteFromTable('note_spese_voci', id);
  };

  const handleConferma = () => {
    const ns = notaCorrente || { id: String(Date.now())+Math.random(), employeeId: user.id, anno, mese, status: 'aperta', confirmedAt: null, timestamp: Date.now() };
    onConferma(ns, totGen);
    setConfirmDialog(false);
  };

  const handleStampa = () => {
    const cdcLabel = cdc ? `${cdc.numero} - ${cdc.testo}` : '—';
    const autoLabel = auto ? `${auto.modello} / ${auto.targa}` : '—';
    let righe = '';
    for (let g = 1; g <= daysInMonth; g++) {
      const voci = getVociGiorno(g);
      const dow = new Date(anno, mese-1, g).getDay();
      const isWE = dow===0||dow===6;
      if (voci.length === 0) {
        righe += `<tr class="${isWE?'we':''}"><td class="day">${g}</td><td></td><td></td><td></td><td></td><td></td><td class="tot"></td><td></td><td></td><td></td><td></td><td class="tot"></td></tr>`;
      } else {
        const byN = {}; voci.forEach(v => { byN[v.natura] = (byN[v.natura]||0) + v.importo; });
        const luogo = [...new Set(voci.map(v => v.luogo))].join(', ');
        const natL = Object.keys(byN).map(n => NATURA_LABELS_NS[n]).join(', ');
        const g_all = byN['alloggio']||0, g_vit = byN['vitto']||0, g_rap = byN['rappresentanza']||0;
        const g_car = byN['carburante']||0, g_ped = byN['pedaggio']||0, g_par = byN['parcheggio']||0, g_alt = byN['altri acquisti']||0;
        const tVA2 = g_all+g_vit+g_rap, tVg2 = g_car+g_ped+g_par+g_alt;
        const f2 = v => v>0?v.toFixed(2):'';
        righe += `<tr><td class="day">${g}</td><td>${luogo}</td><td>${natL}</td><td class="num">${f2(g_all)}</td><td class="num">${f2(g_vit)}</td><td class="num">${f2(g_rap)}</td><td class="tot num">${f2(tVA2)}</td><td class="num">${f2(g_car)}</td><td class="num">${f2(g_ped)}</td><td class="num">${f2(g_par)}</td><td class="num">${f2(g_alt)}</td><td class="tot num">${f2(tVg2)}</td></tr>`;
      }
    }
    const fN2 = v => v.toFixed(2);
    const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Nota Spese — ${user.nome} ${user.cognome} — ${MONTHS_IT[mese-1]} ${anno}</title>
<style>body{font-family:Arial,sans-serif;font-size:7.5pt;margin:6mm}h1{text-align:center;font-size:11pt;margin:4px 0}
.hdr{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px}.hc{border:1px solid #ccc;padding:2px 5px;font-size:7pt}.hl{color:#666;font-size:6pt}
table{width:100%;border-collapse:collapse;font-size:6.5pt}th,td{border:1px solid #bbb;padding:1.5px 3px}th{background:#e8f0fe;font-weight:bold;text-align:center}
td.day{text-align:center;font-weight:bold;width:18px}td.num{text-align:right}td.tot{background:#dbeafe;color:#1d4ed8;font-weight:bold;text-align:right}
.tr-tot td{font-weight:bold;background:#e8f0fe}.tr-grand td{font-weight:bold;font-size:8pt}
.we{background:#f8f8f8;color:#aaa}
.fsec{margin-top:8px;font-size:7pt}.srow{display:flex;gap:16px;margin-top:12px}.sbox{flex:1}.sline{border-top:1px solid #666;margin-top:18px}
@media print{@page{margin:6mm;size:A4 landscape}}</style></head><body>
<h1>NOTA SPESE</h1>
<div class="hdr"><div class="hc"><div class="hl">Dipendente</div><strong>${user.nome} ${user.cognome}</strong></div><div class="hc"><div class="hl">Centro di costo</div><strong>${cdcLabel}</strong></div><div class="hc"><div class="hl">Mese / Anno</div><strong>${MONTHS_IT[mese-1]} ${anno}</strong></div><div class="hc"><div class="hl">Auto (Modello / Targa)</div><strong>${autoLabel}</strong></div></div>
<table><thead><tr><th rowspan="2">G</th><th rowspan="2">Luogo</th><th rowspan="2">Natura</th><th colspan="4">Vitto e alloggio</th><th colspan="5">Spese viaggio</th></tr>
<tr><th>Alloggio</th><th>Vitto</th><th>Rapp.</th><th>TOT</th><th>Carburante</th><th>Pedaggi</th><th>Parcheggi</th><th>Altri</th><th>TOT</th></tr></thead>
<tbody>${righe}</tbody>
<tfoot><tr class="tr-tot"><td colspan="3" style="text-align:right">Totali</td><td class="num">${fN2(totCol('alloggio'))}</td><td class="num">${fN2(totCol('vitto'))}</td><td class="num">${fN2(totCol('rappresentanza'))}</td><td class="tot num">${fN2(totVA)}</td><td class="num">${fN2(totCol('carburante'))}</td><td class="num">${fN2(totCol('pedaggio'))}</td><td class="num">${fN2(totCol('parcheggio'))}</td><td class="num">${fN2(totCol('altri acquisti'))}</td><td class="tot num">${fN2(totVg)}</td></tr>
<tr class="tr-grand"><td colspan="11" style="text-align:right">Totale nota spese (€)</td><td class="tot num">€ ${fN2(totGen)}</td></tr></tfoot></table>
<div class="fsec"><div class="srow"><div class="sbox"><div>Città di lavoro: <strong>${user.cittaDiLavoro||'—'}</strong></div><div class="sline"></div><div style="font-size:7pt;color:#666">Firma del dipendente</div></div><div class="sbox"><div>Data: <strong>${new Date().toLocaleDateString('it-IT')}</strong></div></div></div></div>
<script>window.onload=function(){window.print();}<\/script></body></html>`;
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  };

  const prevMese = () => { if(mese===1){setMese(12);setAnno(a=>a-1);}else setMese(m=>m-1); };
  const nextMese = () => {
    const nm = mese===12?1:mese+1, na = mese===12?anno+1:anno;
    if(na>now.getFullYear()||(na===now.getFullYear()&&nm>now.getMonth()+1)) return;
    setMese(nm); if(mese===12) setAnno(a=>a+1);
  };
  const isCurrentMonth = anno===now.getFullYear()&&mese===now.getMonth()+1;

  return (
    <div className="p-4 lg:p-6">
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-5 gap-3">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Note Spese</h2>
        <div className="flex items-center gap-2 flex-wrap">
          {isConfermata ? (

            <>

              {vociMese.length > 0 && (
                <button onClick={() => setConfirmDialog(true)} className="text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors flex items-center gap-2" style={{background:'#1e3a6e'}}><Icon name="check" size={14} color="white"/> Conferma nota</button>

      {}
      <div className="flex items-center gap-4 mb-5">
        <button onClick={prevMese} className="w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-lg">‹</button>
        <span className="font-bold text-slate-700 text-base min-w-[160px] text-center">{MONTHS_IT[mese-1]} {anno}</span>
        <button onClick={nextMese} disabled={isCurrentMonth} className="w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 font-bold text-lg disabled:opacity-30">›</button>
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          {label:'Dipendente', value:`${user.nome} ${user.cognome}`},
          {label:'Centro di costo', value: cdc ? `${cdc.numero} - ${cdc.testo}` : '—'},
          {label:'Mese / Anno', value:`${MONTHS_IT[mese-1]} ${anno}`},
          {label:'Auto', value: auto ? `${auto.modello} / ${auto.targa}` : '—'},
        ].map(f => (
          <div key={f.label} className="bg-slate-50 rounded-xl p-3 border border-slate-200">
            <p className="text-xs text-slate-400 mb-0.5">{f.label}</p>
            <p className="font-semibold text-slate-700 text-sm">{f.value}</p>
          </div>
        ))}
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto mb-4">
        <table className="w-full text-xs" style={{minWidth:700}}>
          <thead>
            <tr className="bg-slate-50 border-b border-slate-200">

              <th className="px-2 py-1 text-left text-slate-600 font-semibold" rowSpan={2}>Luogo</th>
              <th className="px-2 py-1 text-left text-slate-600 font-semibold" rowSpan={2}>Natura</th>
              <th className="px-2 py-1 text-center text-blue-700 font-semibold border-l border-blue-100" colSpan={4}>Vitto e alloggio</th>
              <th className="px-2 py-1 text-center text-emerald-700 font-semibold border-l border-emerald-100" colSpan={5}>Spese viaggio</th>
              {!isConfermata && <th rowSpan={2}></th>}
            </tr>
            <tr className="bg-slate-50 border-b border-slate-200 text-right">
              <th className="px-2 py-1 text-slate-500 font-medium border-l border-blue-100">Alloggio</th>
              <th className="px-2 py-1 text-slate-500 font-medium">Vitto</th>

              <th className="px-2 py-1 text-blue-700 font-bold bg-blue-50">TOT</th>
              <th className="px-2 py-1 text-slate-500 font-medium border-l border-emerald-100">Carb.</th>
              <th className="px-2 py-1 text-slate-500 font-medium">Ped.</th>

          <tbody>
            {Array.from({length:daysInMonth},(_,i)=>i+1).map(g => {

              if (voci.length === 0) {

        </div>
      )}

}

function NotaSpeseListaMaster({ user, employees, noteSpese, noteSpeseVoci, settings, onSblocca }) {

  const [anno, setAnno] = useState(now.getFullYear());
  const [mese, setMese] = useState(now.getMonth() + 1);

  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

    noteSpeseVoci.some(v => v.notaSpeseId === ns.id));

  const totaleNS = (ns) => {
    const voci = noteSpeseVoci.filter(v => v.notaSpeseId === ns.id);
    return voci.reduce((s,v) => s+v.importo, 0);
  };

  const prevMese = () => { if(mese===1){setMese(12);setAnno(a=>a-1);}else setMese(m=>m-1); };

    const nm=mese===12?1:mese+1, na=mese===12?anno+1:anno;

    setMese(nm); if(mese===12) setAnno(a=>a+1);
  };
  const isCurrentMonth = anno===now.getFullYear()&&mese===now.getMonth()+1;

function News({ user, news, setNews, employees }) {
  const userId = user.id;
  const fmtTs = ts => { const d=new Date(ts); return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); };
  const empName = id => { const e=employees.find(x=>x.id===id); return e?`${e.nome} ${e.cognome}`:'—'; };
  const sorted = [...news].sort((a,b)=>b.timestamp-a.timestamp);
  const unread = sorted.filter(n=>!n.lette.includes(userId)).length;

  const markRead = (id) => {
    setNews(prev => {
      const upd = prev.map(n => n.id===id && !n.lette.includes(userId) ? {...n, lette:[...n.lette,userId]} : n);
      saveData('news', upd); DB.sync('news', upd);
      return upd;
    });
  };

  return (
    <div className="p-4 lg:p-8">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>News</h2>
          <p className="text-slate-600 text-sm mt-1">Comunicazioni interne aziendali</p>
        </div>
        {unread > 0 && <span className="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-full">{unread} non lette</span>}
      </div>
      {sorted.length === 0 ? (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-10 text-center">
          <p className="text-4xl mb-3">📭</p>
          <p className="text-slate-400">Nessuna comunicazione al momento</p>
        </div>
      ) : (
        <div className="space-y-4">
          {sorted.map(n => {
            const letta = n.lette.includes(userId);
            return (
              <div key={n.id} onClick={()=>markRead(n.id)}
                className={`bg-white rounded-2xl shadow-sm border cursor-pointer transition-all hover:shadow-md ${letta?'border-slate-100 opacity-70':'border-blue-200 shadow-blue-50'}`}>
                <div className="p-5">
                  <div className="flex items-start justify-between gap-3 mb-2">
                    <div className="flex items-center gap-2">
                      {!letta && <span className="w-2.5 h-2.5 rounded-full bg-blue-500 shrink-0 mt-1"></span>}
                      <h3 className={`font-bold text-slate-800 text-base leading-snug ${!letta?'':'text-slate-600'}`}>{n.titolo}</h3>
                    </div>
                    <span className="text-xs text-slate-400 shrink-0 whitespace-nowrap">{fmtTs(n.timestamp)}</span>
                  </div>
                  <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">{n.testo}</p>
                  <p className="text-xs text-slate-400 mt-3">Da: {empName(n.authorId)}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

    if (!titolo.trim() || !testo.trim()) return;
    const newItem = { id: String(Date.now()), titolo: titolo.trim(), testo: testo.trim(), authorId: user.id, lette: [], timestamp: Date.now() };

function calcolaEaster(y) {
  const a = y % 19, b = Math.floor(y/100), c = y % 100;
  const d = Math.floor(b/4), e = b % 4;
  const f = Math.floor((b+8)/25), g = Math.floor((b-f+1)/3);
  const h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31); // 1-based
  const day   = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(y, month-1, day);
}

function getFestivitaNazionali(y) {
  const easter = calcolaEaster(y);
  const luneAngelo = new Date(easter); luneAngelo.setDate(easter.getDate()+1);
  const fmt = (d) => `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return [
    { data: `${y}-01-01`, nome: 'Capodanno' },
    { data: `${y}-01-06`, nome: 'Epifania' },
    { data: fmt(easter),    nome: 'Pasqua' },
    { data: fmt(luneAngelo),nome: 'Lunedì dell\'Angelo' },
    { data: `${y}-04-25`, nome: 'Festa della Liberazione' },
    { data: `${y}-05-01`, nome: 'Festa del Lavoro' },
    { data: `${y}-06-02`, nome: 'Festa della Repubblica' },
    { data: `${y}-08-15`, nome: 'Ferragosto' },
    { data: `${y}-11-01`, nome: 'Ognissanti' },
    { data: `${y}-12-08`, nome: 'Immacolata Concezione' },
    { data: `${y}-12-25`, nome: 'Natale' },
    { data: `${y}-12-26`, nome: 'Santo Stefano' },
  ];
}
