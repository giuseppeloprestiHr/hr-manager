function Ferie({ user, employees, ferie, setFerie, onRichiesta }) {
  const r = user.ruolo;
  const [dataInizio, setDataInizio] = useState('');
  const [dataFine,   setDataFine]   = useState('');
  const [motivo,     setMotivo]     = useState('');
  const [err,        setErr]        = useState('');
  const [ok,         setOk]         = useState(false);

  const giorniCalcolati = dataInizio && dataFine && dataFine >= dataInizio
    ? calcGiorniLavorativi(dataInizio, dataFine) : 0;

  const handleInvia = () => {
    setErr('');
    if (!dataInizio) { setErr('Inserisci la data di inizio.'); return; }
    if (!dataFine)   { setErr('Inserisci la data di fine.'); return; }
    if (dataFine < dataInizio) { setErr('La data fine non può essere precedente alla data inizio.'); return; }
    if (giorniCalcolati === 0) { setErr('Periodo errato: il periodo selezionato non contiene giorni lavorativi.'); return; }
    if (dataInizio < todayStr()) {
      if (!window.confirm(`Attenzione: la data di inizio (${fmtData(dataInizio)}) è precedente a oggi. Vuoi procedere comunque?`)) return;
    }
    const initStatus  = ferieStepIniziale(r);  // ← regola centralizzata
    const skipStep1   = initStatus !== SF.PENDING_RESP;
    const isImmediate = initStatus === SF.APPROVATO;
    const nuova = {
      id: String(Date.now()) + Math.random(),
      employeeId: user.id,
      dataInizio, dataFine,
      giorniLavorativi: giorniCalcolati,
      motivo: motivo.trim(),
      status: initStatus,
      approvatoRespId: skipStep1 ? user.id : null,
      approvatoRespTimestamp: skipStep1 ? Date.now() : null,
      approvatoDirId: isImmediate ? user.id : null,
      approvatoDirTimestamp: isImmediate ? Date.now() : null,
      rifiutatoDaId: null, noteRifiuto: null,
      timestamp: Date.now(),
    };
    setFerie(prev => { const upd=[...prev, nuova]; saveData('ferie', upd); return upd; });
    onRichiesta(nuova);
    setDataInizio(''); setDataFine(''); setMotivo(''); setOk(true);
    setTimeout(()=>setOk(false), 4000);
  };

  const mioStorico = (ferie||[]).filter(f=>f.employeeId===user.id).sort((a,b)=>b.timestamp-a.timestamp);
  const annoCorr = String(new Date().getFullYear());
  const giorniAnno = mioStorico.filter(f=>f.status=== SF.APPROVATO&&f.dataInizio.startsWith(annoCorr)).reduce((s,f)=>s+f.giorniLavorativi,0);

  const STATUS_LABEL = {
    pending_resp: { label:'In attesa del responsabile', cls:'bg-amber-100 text-amber-700' },
    pending_dir:  { label:'Approvata dal resp. – att. direttore', cls:'bg-blue-100 text-blue-700' },
    approvato:    { label:'Approvate', cls:'bg-emerald-100 text-emerald-700' },
    rifiutato:    { label:'Rifiutate', cls:'bg-red-100 text-red-700' },
    annullata:    { label:'Annullata', cls:'bg-slate-100 text-slate-500' },
  };

  const handleDocumento = (f) => {
    const emp     = employees.find(e=>e.id===f.employeeId);
    const respEmp = employees.find(e=>e.id===f.approvatoRespId);
    const dirEmp  = employees.find(e=>e.id===f.approvatoDirId);
    const html = generaDocumentoFerie(f, emp, respEmp, dirEmp);
    const blob = new Blob([html], {type:'text/html'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `ferie-${emp.cognome.toLowerCase()}-${f.dataInizio}.html`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  };

  const handleEmail = (f) => {
    const emp = employees.find(e=>e.id===f.employeeId);
    const sogg = encodeURIComponent(`Ferie approvate – ${emp.nome} ${emp.cognome} (${fmtData(f.dataInizio)} – ${fmtData(f.dataFine)})`);
    const corpo = encodeURIComponent(
      `Gentile ${emp.nome},\n\nLe comunichiamo che la sua richiesta di ferie dal ${fmtData(f.dataInizio)} al ${fmtData(f.dataFine)} (${f.giorniLavorativi} giorni lavorativi) è stata approvata.\n\nCordiali saluti,\nHR Manager`
    );
    window.location.href = `mailto:${emp.email||''}?subject=${sogg}&body=${corpo}`;
  };

  return (
    <div className="p-4 lg:p-8 max-w-3xl">
      <h2 className="text-2xl font-bold text-slate-800 mb-1" style={{fontFamily:'Syne,sans-serif'}}>Ferie</h2>
      <p className="text-slate-400 text-sm mb-6">{user.nome} {user.cognome} · Ferie approvate {annoCorr}: <strong className="text-emerald-600">{giorniAnno} {giorniAnno===1?'giorno':'giorni'}</strong></p>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
        <h3 className="font-bold text-slate-700 mb-4 text-base">Nuova richiesta ferie</h3>
        <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-start gap-2 mb-4">
          <span className="text-base leading-none mt-0.5">ℹ️</span>
          <p className="text-xs text-amber-800 leading-relaxed">Per favorire l'organizzazione aziendale, le ferie vanno richieste preferibilmente entro 10 giorni dalla data richiesta. Grazie</p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <DateInput label="Data inizio" value={dataInizio}
            onChange={e=>{ setDataInizio(e.target.value); setErr(''); }} required />
          <div>
            <DateInput label="Data fine" value={dataFine}
              onChange={e=>{ setDataFine(e.target.value); setErr(''); }} required />
          </div>
        </div>
        {dataInizio && dataFine && dataFine >= dataInizio && (
          <div className="mb-4 px-4 py-2.5 bg-teal-50 border border-teal-200 rounded-xl text-sm text-teal-800 font-medium">
            📅 Giorni lavorativi calcolati: <strong>{giorniCalcolati}</strong>
            {giorniCalcolati === 0 && <span className="text-red-500 ml-2">⚠️ Nessun giorno lavorativo nel periodo</span>}
          </div>
        )}
        <div className="mb-4">
          <label className="block text-xs font-semibold text-slate-500 mb-1">Motivazione (facoltativa)</label>
          <textarea value={motivo} onChange={e=>setMotivo(e.target.value)} rows={2}
            placeholder="Es. vacanza estiva, riposo..."
            className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none" />
        </div>
        {err && <div className="mb-3 px-4 py-2.5 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">{err}</div>}
        {ok  && <div className="mb-3 px-4 py-2.5 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-700">✅ Richiesta inviata correttamente!</div>}
        <button onClick={handleInvia}
          className="text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition-colors" style={{background:'#1e3a6e'}}>
          Invia richiesta
        </button>
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 className="font-bold text-slate-700 mb-4 text-base">Storico</h3>
        {mioStorico.length === 0
          ? <p className="text-slate-400 text-sm">Nessuna richiesta ferie presente.</p>
          : (
            <div className="space-y-3">
              {mioStorico.map(f => {
                const st = STATUS_LABEL[f.status] || STATUS_LABEL.pending_resp;
                return (
                  <div key={f.id} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
                    <div className="flex items-start justify-between gap-2 flex-wrap">
                      <div>
                        <p className="font-semibold text-slate-800 text-sm">
                          {fmtData(f.dataInizio)} → {fmtData(f.dataFine)}
                          <span className="ml-2 text-slate-500 font-normal">({f.giorniLavorativi} gg lav.)</span>
                        </p>
                        {f.motivo && <p className="text-xs text-slate-500 mt-0.5">"{f.motivo}"</p>}
                        {f.status=== SF.RIFIUTATO && f.noteRifiuto && (
                          <p className="text-xs text-red-600 mt-1">Motivazione rifiuto: "{f.noteRifiuto}"</p>
                        )}
                        {f.status=== SF.ANNULLATA && f.noteAnnullamento && (
                          <p className="text-xs text-slate-500 mt-1">Annullata: "{f.noteAnnullamento}"</p>
                        )}
                      </div>
                      <span className={`text-xs font-semibold px-3 py-1 rounded-full shrink-0 ${st.cls}`}>{st.label}</span>
                    </div>
                    {f.status === SF.APPROVATO && (
                      <div className="flex gap-2 mt-2">
                        <button onClick={()=>handleDocumento(f)}
                          className="text-xs bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1.5 rounded-lg font-medium transition-colors">
                          Scarica documento
                        </button>
                        <button onClick={()=>handleEmail(f)}
                          className="text-xs bg-white hover:bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1.5 rounded-lg font-medium transition-colors">
                          Invia email
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )
        }
      </div>
    </div>
  );
}

function ApprovaFerie({ user, employees, ferie, setFerie, onApprovaResp, onApprovaDir, onRifiuta }) {
  const r  = user.ruolo;
  const uid= user.id;
  const isAmministratore = r === RUOLI.AMMINISTRATORE;
  const isDirettore      = r === RUOLI.DIRETTORE;
  const isResponsabile   = r === RUOLI.RESPONSABILE;

  const [noteRifiuto, setNoteRifiuto] = useState('');
  const [rifiutoId,   setRifiutoId]   = useState(null);
  const [noteErr,     setNoteErr]     = useState('');

  const gestibili = (ferie||[]).filter(f => puoApprovare(f, uid, r, employees));

  const pending  = gestibili.filter(f => f.status === SF.PENDING_RESP || f.status === SF.PENDING_DIR);
  const storico = (ferie||[])
    .filter(f => feriaInStorico(f, uid, r, employees))
    .sort((a,b) => b.timestamp - a.timestamp)
    .slice(0, 50);

  const STATUS_LABEL = {
    pending_resp: { label:'In attesa del responsabile', cls:'bg-amber-100 text-amber-700' },
    pending_dir:  { label:'Approvata dal resp. – att. direttore', cls:'bg-blue-100 text-blue-700' },
    approvato:    { label:'Approvate', cls:'bg-emerald-100 text-emerald-700' },
    rifiutato:    { label:'Rifiutate', cls:'bg-red-100 text-red-700' },
    annullata:    { label:'Annullata', cls:'bg-slate-100 text-slate-500' },
  };

  const [cancelFerieId,   setCancelFerieId]   = useState(null);
  const [cancelFerieNote, setCancelFerieNote] = useState('');
  const [cancelFerieErr,  setCancelFerieErr]  = useState('');

  const handleCancellaFerie = () => {
    if (!cancelFerieNote.trim()) { setCancelFerieErr('La motivazione è obbligatoria.'); return; }
    const f = (ferie||[]).find(x=>x.id===cancelFerieId);
    if (!f) return;
    const upd = {...f, status:'annullata', noteAnnullamento: cancelFerieNote.trim(), annullataDaId: uid, annullataTimestamp: Date.now()};
    setFerie(prev=>{ const a=prev.map(x=>x.id===upd.id?upd:x); saveData('ferie', a); return a; });
    onRifiuta(upd); // riusa la callback per notifica — il chiamante gestisce il tipo
    setCancelFerieId(null); setCancelFerieNote(''); setCancelFerieErr('');
  };

  const handleApprova = (f) => {
    let upd;
    if (f.status === SF.PENDING_RESP) {
      upd = {...f, status:'pending_dir', approvatoRespId:uid, approvatoRespTimestamp:Date.now()};
      onApprovaResp(upd);
    } else {
      upd = {...f, status:'approvato', approvatoDirId:uid, approvatoDirTimestamp:Date.now()};
      onApprovaDir(upd);
    }
    setFerie(prev=>{ const a=prev.map(x=>x.id===upd.id?upd:x); saveData('ferie', a); return a; });
  };

  const handleRifiutaClick = (id) => {
    setRifiutoId(id); setNoteRifiuto(''); setNoteErr('');
  };

  const handleRifiutaConferma = (f) => {
    if (!noteRifiuto.trim()) { setNoteErr('La motivazione del rifiuto è obbligatoria.'); return; }
    const upd = {...f, status:'rifiutato', rifiutatoDaId:uid, noteRifiuto:noteRifiuto.trim(), timestamp: f.timestamp};
    setFerie(prev=>{ const a=prev.map(x=>x.id===upd.id?upd:x); saveData('ferie', a); return a; });
    onRifiuta(upd);
    setRifiutoId(null); setNoteRifiuto('');
  };

  const getName = id => { const e=employees.find(x=>x.id===id); return e?`${e.nome} ${e.cognome}`:'—'; };

  const handleDocumento = (f) => {
    const emp     = employees.find(e=>e.id===f.employeeId);
    const respEmp = employees.find(e=>e.id===f.approvatoRespId);
    const dirEmp  = employees.find(e=>e.id===f.approvatoDirId);
    const html = generaDocumentoFerie(f, emp, respEmp, dirEmp);
    const blob = new Blob([html], {type:'text/html'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `ferie-${emp.cognome.toLowerCase()}-${f.dataInizio}.html`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  };

  return (
    <div className="p-4 lg:p-8 max-w-4xl">
      <h2 className="text-2xl font-bold text-slate-800 mb-1" style={{fontFamily:'Syne,sans-serif'}}>✅ Approva ferie</h2>
      <p className="text-slate-400 text-sm mb-6">
        {isAmministratore ? 'Tutte le richieste in attesa' : isDirettore ? 'Step 2 – approvazione finale' : 'Il tuo team – step 1'}
      </p>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
        <h3 className="font-bold text-slate-700 mb-4 text-base">
          🕐 Richieste da gestire
          {pending.length > 0 && <span className="ml-2 bg-amber-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">{pending.length}</span>}
        </h3>
        {pending.length === 0
          ? <p className="text-slate-400 text-sm">Nessuna richiesta in attesa.</p>
          : (
            <div className="space-y-4">
              {pending.map(f => {
                const emp = employees.find(e=>e.id===f.employeeId);
                if (!emp) return null;
                const isRifiutoOpen = rifiutoId === f.id;
                const stepLabel = f.status=== SF.PENDING_RESP ? '1° step – approvazione responsabile' : '2° step – approvazione finale';
                return (
                  <div key={f.id} className="border border-slate-200 rounded-xl p-4">
                    <div className="flex items-start justify-between gap-2 flex-wrap mb-2">
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <div className="w-7 h-7 rounded-full bg-teal-100 text-teal-700 font-bold text-xs flex items-center justify-center shrink-0">
                            {emp.nome[0]}{emp.cognome[0]}
                          </div>
                          <span className="font-semibold text-slate-800 text-sm">{emp.nome} {emp.cognome}</span>
                          <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${ROLE_COLORS[emp.ruolo]}`}>{ROLE_LABELS[emp.ruolo]}</span>
                        </div>
                        <p className="text-sm font-medium text-slate-700">
                          📅 {fmtData(f.dataInizio)} → {fmtData(f.dataFine)}
                          <span className="ml-2 text-teal-600 font-bold">{f.giorniLavorativi} gg lav.</span>
                        </p>
                        {f.motivo && <p className="text-xs text-slate-500 mt-0.5">Motivo: "{f.motivo}"</p>}
                        <p className="text-xs text-slate-400 mt-1">Richiesta il {new Date(f.timestamp).toLocaleDateString('it-IT')} · {stepLabel}</p>
                        {f.status=== SF.PENDING_DIR && f.approvatoRespId && (
                          <p className="text-xs text-emerald-600 mt-0.5">✅ Step 1 approvato da {getName(f.approvatoRespId)}</p>
                        )}
                      </div>
                    </div>
                    {!isRifiutoOpen ? (
                      <div className="flex gap-2 mt-2 flex-wrap">
                        <button onClick={()=>handleApprova(f)}
                          className="text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl font-semibold transition-colors">
                          ✅ Approva
                        </button>
                        <button onClick={()=>handleRifiutaClick(f.id)}
                          className="text-sm bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-semibold transition-colors border border-red-200">
                          ❌ Rifiuta
                        </button>
                      </div>
                    ) : (
                      <div className="mt-3 p-3 bg-red-50 rounded-xl border border-red-200">
                        <label className="block text-xs font-semibold text-red-700 mb-1">Motivazione rifiuto <span className="text-red-500">*</span></label>
                        <textarea value={noteRifiuto} onChange={e=>{setNoteRifiuto(e.target.value);setNoteErr('');}} rows={2}
                          placeholder="Inserisci la motivazione del rifiuto..."
                          className="w-full border border-red-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 bg-white resize-none mb-2" />
                        {noteErr && <p className="text-xs text-red-600 mb-2">{noteErr}</p>}
                        <p className="text-xs text-red-400 mb-2"><span className="font-semibold">*</span> campo obbligatorio</p>
                        <div className="flex gap-2">
                          <button onClick={()=>handleRifiutaConferma(f)}
                            className="text-sm bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg font-semibold transition-colors">
                            Conferma rifiuto
                          </button>
                          <button onClick={()=>setRifiutoId(null)}
                            className="text-sm bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-lg font-medium border border-slate-200 transition-colors">
                            Annulla
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )
        }
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 className="font-bold text-slate-700 mb-4 text-base">📂 Storico richieste gestite</h3>
        {storico.length === 0
          ? <p className="text-slate-400 text-sm">Nessuna richiesta ancora gestita.</p>
          : (
            <div className="space-y-3">
              {storico.map(f => {
                const emp = employees.find(e=>e.id===f.employeeId);
                if (!emp) return null;
                const st = STATUS_LABEL[f.status] || STATUS_LABEL.approvato;
                return (
                  <div key={f.id} className="border border-slate-100 rounded-xl px-4 py-3">
                    <div className="flex items-start justify-between gap-2 flex-wrap">
                      <div>
                        <div className="flex items-center gap-2 mb-0.5">
                          <span className="font-semibold text-slate-800 text-sm">{emp.nome} {emp.cognome}</span>
                          <span className={`text-xs px-2 py-0 rounded-full font-medium ${ROLE_COLORS[emp.ruolo]}`}>{ROLE_LABELS[emp.ruolo]}</span>
                        </div>
                        <p className="text-sm text-slate-600">
                          {fmtData(f.dataInizio)} → {fmtData(f.dataFine)}
                          <span className="ml-1 text-sky-600 font-semibold">({f.giorniLavorativi} gg)</span>
                        </p>
                        {f.status=== SF.RIFIUTATO && f.noteRifiuto && (
                          <p className="text-xs text-red-600 mt-0.5">Motivo rifiuto: "{f.noteRifiuto}"</p>
                        )}
                        {f.status=== SF.ANNULLATA && f.noteAnnullamento && (
                          <p className="text-xs text-slate-500 mt-0.5">Annullata da {getName(f.annullataDaId)}: "{f.noteAnnullamento}"</p>
                        )}
                        {f.status=== SF.APPROVATO && (
                          <p className="text-xs text-slate-400 mt-0.5">
                            Step 1: {getName(f.approvatoRespId)} · Step 2: {getName(f.approvatoDirId)}
                          </p>
                        )}
                        {f.status=== SF.PENDING_DIR && (
                          <p className="text-xs text-slate-400 mt-0.5">Step 1 approvato da {getName(f.approvatoRespId)} · In attesa approvazione finale</p>
                        )}
                      </div>
                      <div className="flex items-center gap-2">
                        <span className={`text-xs font-semibold px-3 py-1 rounded-full shrink-0 ${st.cls}`}>{st.label}</span>
                        {f.status=== SF.APPROVATO && (
                          <button onClick={()=>handleDocumento(f)}
                            className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 py-1 rounded-lg font-medium transition-colors">
                            🖨️
                          </button>
                        )}
                        {}
                        {f.status=== SF.APPROVATO && (isAmministratore || isDirettore) && (
                          <button onClick={()=>{ setCancelFerieId(f.id); setCancelFerieNote(''); setCancelFerieErr(''); }}
                            className="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded-lg font-medium transition-colors border border-red-200">
                            🗑️
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        }
      </div>

      {}
      {cancelFerieId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
          <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 className="font-bold text-slate-800 text-base mb-1">🗑️ Annulla ferie approvate</h3>
            <p className="text-slate-500 text-sm mb-4">Le ferie verranno annullate. Il dipendente e il responsabile riceveranno una notifica.</p>
            <label className="block text-xs font-semibold text-slate-600 mb-1">Motivazione <span className="text-red-500">*</span></label>
            <textarea value={cancelFerieNote} onChange={e=>{setCancelFerieNote(e.target.value);setCancelFerieErr('');}} rows={3}
              placeholder="Indica il motivo dell'annullamento..."
              className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none mb-2" />
            {cancelFerieErr && <p className="text-xs text-red-500 mb-2">{cancelFerieErr}</p>}
            <p className="text-xs text-red-400 mb-2"><span className="font-semibold">*</span> campo obbligatorio</p>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>{ setCancelFerieId(null); setCancelFerieNote(''); setCancelFerieErr(''); }}
                className="px-4 py-2 rounded-xl text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors">
                Indietro
              </button>
              <button onClick={handleCancellaFerie}
                className="px-4 py-2 rounded-xl text-sm font-semibold bg-red-600 hover:bg-red-700 text-white transition-colors">
                Conferma annullamento
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Malattia({ user, employees, malattie, setMalattie, onMalattia }) {
  const isMaster = user.ruolo === RUOLI.MASTER;
  const [empId,        setEmpId]        = useState(user.id);
  const [dataInizio,   setDataInizio]   = useState('');
  const [dataFine,     setDataFine]     = useState('');
  const [protocollo,   setProtocollo]   = useState('');
  const [note,         setNote]         = useState('');
  const [malattieFiglio, setMalattieFiglio] = useState(false);
  const [cfFiglio,     setCfFiglio]     = useState('');
  const [err,          setErr]          = useState('');
  const [ok,           setOk]           = useState(false);

  const handleSalva = () => {
    if (!dataInizio) { setErr('Inserisci la data di inizio malattia.'); return; }
    if (!dataFine) { setErr('La data di fine malattia è obbligatoria.'); return; }
    if (dataFine < dataInizio) { setErr('La data fine non può essere precedente alla data inizio.'); return; }
    if (!malattieFiglio && !protocollo.trim()) { setErr('Il numero di certificato INPS è obbligatorio.'); return; }
    if (malattieFiglio && !cfFiglio.trim()) { setErr('Il codice fiscale del figlio/figlia è obbligatorio.'); return; }
    if (dataInizio < todayStr()) {
      const conferma = window.confirm(`Attenzione: la data di inizio (${fmtData(dataInizio)}) è precedente a oggi. Vuoi procedere comunque?`);
      if (!conferma) return;
    }
    const record = {
      id: String(Date.now()),
      employeeId: empId,
      dataInizio,
      dataFine:        dataFine        || null,
      protocollo:      protocollo      || null,
      note:            note            || null,
      malattieFiglio:  malattieFiglio  || false,
      cfFiglio:        malattieFiglio ? cfFiglio.trim().toUpperCase() : null,
      timestamp:       Date.now(),
      inseritoDa:      user.id,
    };
    const upd = [...malattie, record];
    setMalattie(upd);
    saveData('malattie', upd);
    if (onMalattia) {
      const emp = employees.find(e=>e.id===empId) || user;
      onMalattia(emp, dataInizio, dataFine||null, protocollo.trim(), malattieFiglio);
    }
    setDataInizio(''); setDataFine(''); setProtocollo(''); setNote(''); setMalattieFiglio(false); setCfFiglio(''); setErr('');
    setOk(true); setTimeout(()=>setOk(false), 3000);
  };

  const handleElimina = id => {
    if (!confirm('Eliminare questa comunicazione di malattia?')) return;
    const upd = malattie.filter(m => m.id !== id);
    setMalattie(upd);
    saveData('malattie', upd);
  };

  const visibili = isMaster
    ? [...malattie].sort((a,b) => b.timestamp - a.timestamp)
    : malattie.filter(m => m.employeeId === user.id).sort((a,b) => b.timestamp - a.timestamp);

  const empName = id => { const e = employees.find(x=>x.id===id); return e ? `${e.nome} ${e.cognome}` : id; };

  return (
    <div className="p-4 lg:p-8">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Invia comunicazione malattia</h2>
        <p className="text-slate-600 text-sm mt-1">Inserisci o consulta le comunicazioni di malattia</p>
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6 max-w-xl">
        <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase tracking-wide">Nuova comunicazione</h3>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
          <DateInput label="Data inizio" value={dataInizio}
            onChange={e=>{setDataInizio(e.target.value);setErr('');}} required />
          <div>
            <DateInput label="Fino alla data compresa" value={dataFine}
              onChange={e=>{setDataFine(e.target.value);setErr('');}} required />
            <p className="text-xs text-slate-500 mt-1.5 leading-relaxed">Nel caso di continuazione della malattia, si prega di effettuare una nuova comunicazione inserendo nella data di inizio malattia il primo giorno lavorativo che avreste dovuto fare.</p>
          </div>
        </div>

        {}
        <div className="mb-3">
          <label className="flex items-center gap-3 cursor-pointer select-none group">
            <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-colors shrink-0
              ${malattieFiglio ? 'bg-rose-600 border-rose-600' : 'border-slate-300 group-hover:border-rose-400'}`}
              onClick={()=>{setMalattieFiglio(p=>!p);setErr('');}}>
              {malattieFiglio && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>}
            </div>
            <span className="text-sm font-medium text-slate-700" onClick={()=>{setMalattieFiglio(p=>!p);setErr('');}}>
              Malattia del figlio/figlia
            </span>
          </label>
          {malattieFiglio && (
            <div className="mt-2 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-start gap-2">
              <span className="text-amber-500 text-base shrink-0 mt-0.5">⚠️</span>
              <p className="text-xs text-amber-800 font-medium leading-relaxed">
                Ricordarsi di consegnare all'Amministrazione il certificato medico del Pediatra.
              </p>
            </div>
          )}
          {malattieFiglio && (
            <div className="mt-2">
              <label className="block text-xs font-medium text-slate-500 mb-1">
                Codice fiscale figlio/figlia <span className="text-red-500">*</span>
              </label>
              <input type="text" placeholder="es. RSSMRA10A01H501Z" value={cfFiglio}
                onChange={e=>{setCfFiglio(e.target.value.toUpperCase());setErr('');}}
                maxLength={16}
                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 uppercase"/>
            </div>
          )}
        </div>

        <div className="mb-3">
          <label className="block text-xs font-medium text-slate-500 mb-1">
            N° protocollo certificato medico INPS
            {malattieFiglio
              ? <span className="text-slate-400 ml-1">(opzionale)</span>
              : <span className="text-red-500 ml-1">*</span>
            }
          </label>
          <input type="text" placeholder="es. INPS-2026-XXXXXXXX" value={protocollo}
            onChange={e=>{setProtocollo(e.target.value);setErr('');}}
            className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          {malattieFiglio && (
            <p className="text-xs text-slate-400 mt-1">Per la malattia del figlio/figlia il protocollo INPS non è obbligatorio.</p>
          )}
        </div>

        <div className="mb-4">
          <label className="block text-xs font-medium text-slate-500 mb-1">Note <span className="text-slate-400">(opzionale)</span></label>
          <textarea rows={2} placeholder="Informazioni aggiuntive…" value={note}
            onChange={e=>{setNote(e.target.value);setErr('');}}
            className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"/>
        </div>

        {err && <p className="text-red-500 text-xs mb-3">{err}</p>}
        {ok  && <p className="text-emerald-600 text-xs mb-3 font-semibold">✅ Comunicazione salvata correttamente.</p>}
        <p className="text-xs text-red-400 mb-3"><span className="font-semibold">*</span> campo obbligatorio</p>
        <button onClick={handleSalva}
          className="w-full text-white font-semibold py-2.5 rounded-xl text-sm transition-colors" style={{background:'#1e3a6e'}}>
          Invia comunicazione
        </button>
      </div>

      {}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 max-w-3xl">
        <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase tracking-wide">
          Storico
        </h3>
        {visibili.length === 0 ? (
          <p className="text-slate-400 text-sm">Nessuna comunicazione registrata.</p>
        ) : (
          <div className="space-y-3">
            {visibili.map(m => {
              const giorni = m.dataFine
                ? Math.round((new Date(m.dataFine)-new Date(m.dataInizio))/(1000*60*60*24))+1
                : null;
              return (
                <div key={m.id} className="flex items-start justify-between gap-4 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
                  <div className="min-w-0">
                    {isMaster && (
                      <p className="font-semibold text-slate-700 text-sm">{empName(m.employeeId)}</p>
                    )}
                    <p className="text-sm text-slate-600 mt-0.5">
                      <span className="font-semibold">{fmtData(m.dataInizio)}</span>
                      {m.dataFine ? <> → <span className="font-semibold">{fmtData(m.dataFine)}</span>
                        <span className="text-slate-400 ml-1">({giorni} {giorni===1?'giorno':'giorni'})</span>
                      </> : <span className="text-slate-400 ml-1">(data fine non specificata)</span>}
                    </p>
                    {m.protocollo && <p className="text-xs text-slate-500 mt-0.5">Protocollo: <span className="font-mono">{m.protocollo}</span></p>}
                    {m.malattieFiglio && <p className="text-xs text-amber-600 mt-0.5 font-medium">Malattia del figlio/figlia</p>}
                    {m.note && <p className="text-xs text-slate-400 mt-0.5 italic">"{m.note}"</p>}
                    {isMaster && m.inseritoDa !== m.employeeId && (
                      <p className="text-xs text-blue-400 mt-0.5">Inserito da: {empName(m.inseritoDa)}</p>
                    )}
                  </div>
                  {(isMaster || m.employeeId === user.id) && (
                    <button onClick={()=>handleElimina(m.id)}
                      className="shrink-0 text-slate-300 hover:text-red-500 transition-colors text-lg leading-none">×</button>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

    onApprova(emp.id, tempPass);

  const handleInviaEmail = () => {
    const oggetto = encodeURIComponent('HR Manager – Nuova password temporanea');

              <button onClick={onBack} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-sm font-semibold transition-colors">

            <button onClick={handleApprova} disabled={!tempPass.trim()}

function PermessiOrari({ user, employees, permessi, setPermessi, onRichiesta, onCancella }) {
  const [empId,      setEmpId]      = useState(user.id);
  const [data,       setData]       = useState('');
  const [oraInizio,  setOraInizio]  = useState('');
  const [oraFine,    setOraFine]    = useState('');
  const [motivo,     setMotivo]     = useState('');
  const [tipologia,  setTipologia]  = useState('');
  const [err,        setErr]        = useState('');
  const [ok,         setOk]         = useState(false);
  const [cancelId,   setCancelId]   = useState(null);
  const [cancelNote, setCancelNote] = useState('');
  const [cancelErr,  setCancelErr]  = useState('');

  const calcOre = (ini, fin) => {
    if (!ini || !fin) return 0;
    const [h1,m1] = ini.split(':').map(Number);
    const [h2,m2] = fin.split(':').map(Number);
    const totalMin = (h2*60+m2) - (h1*60+m1);
    if (totalMin <= 0) return 0;
    return Math.round(totalMin / 15) * 15 / 60; // arrotonda al quarto d'ora, salva come decimale ore
  };
  const orePreview = calcOre(oraInizio, oraFine);

  const handleSalva = () => {
    if (!data)          { setErr('Inserisci la data del permesso.'); return; }
    const dowPerm = new Date(data+'T00:00:00').getDay();
    if (dowPerm === 0 || dowPerm === 6) { setErr('Data errata: il permesso non può essere richiesto per sabato o domenica.'); return; }
    if (!oraInizio)     { setErr("Inserisci l'ora di inizio."); return; }
    if (!oraFine)       { setErr("Inserisci l'ora di fine."); return; }
    if (oraFine <= oraInizio) { setErr("L'ora di fine deve essere successiva all'ora di inizio."); return; }
    if (!motivo.trim()) { setErr('Inserisci il motivo del permesso.'); return; }
    if (!tipologia)     { setErr('Seleziona la tipologia di permesso.'); return; }
    if (data < todayStr()) {
      const conferma = window.confirm(`Attenzione: la data inserita (${fmtData(data)}) è precedente a oggi. Vuoi procedere comunque?`);
      if (!conferma) return;
    }
    const empRuolo = (employees.find(e=>e.id===empId)?.ruolo) || user.ruolo;
    const permStatus = permessoStepIniziale(empRuolo); // ← regola centralizzata, basata sul ruolo dell'employee
    const record = {
      id: String(Date.now())+Math.random().toString(36).slice(2),
      employeeId: empId,
      data, oraInizio, oraFine,
      orePermesso: calcOre(oraInizio, oraFine),
      motivo: motivo.trim(),
      tipologia: tipologia || null,
      status: permStatus,
      noteRifiuto: null,
      approvatoDa: permStatus === SP.APPROVATO ? user.id : null,
      approvatoTimestamp: permStatus === SP.APPROVATO ? Date.now() : null,
      timestamp: Date.now(),
    };
    const upd = [...permessi, record];
    setPermessi(upd);
    saveData('permessi', upd);
    if (onRichiesta) onRichiesta(record);
    setData(''); setOraInizio(''); setOraFine(''); setMotivo(''); setTipologia(''); setErr('');
    setOk(true); setTimeout(()=>setOk(false), 3000);
  };

  const handleScaricaDoc = (p) => {
    const emp = employees.find(e=>e.id===p.employeeId);
    const approvatoDaEmp = p.approvatoDa ? employees.find(e=>e.id===p.approvatoDa) : null;
    if (!emp) return;
    const html = generaDocumentoPermesso(p, emp, approvatoDaEmp);
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `permesso-${emp.cognome.toLowerCase()}-${p.data}.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 8000);
  };

  const handleInviaEmail = (p) => {
    const emp = employees.find(e=>e.id===p.employeeId);
    if (!emp || !emp.email) { alert('Nessuna email in anagrafica per questo dipendente.'); return; }
    const tipologiaStr = p.tipologia ? TIPOLOGIA_LABEL[p.tipologia] || p.tipologia : 'Permesso lavorativo generico';
    const approvatoDaEmp = p.approvatoDa ? employees.find(e=>e.id===p.approvatoDa) : null;
    const dataAutor = p.approvatoTimestamp ? new Date(p.approvatoTimestamp).toLocaleDateString('it-IT') : fmtData(p.data);
    const oraAutor  = p.approvatoTimestamp ? new Date(p.approvatoTimestamp).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) : '';
    const subject = encodeURIComponent(`Permesso orario del ${fmtData(p.data)} – ${emp.nome} ${emp.cognome}`);
    const body = encodeURIComponent(
`c.a. Azienda

Oggetto: Richiesta di permesso lavorativo

Il/La sottoscritto/a ${emp.nome} ${emp.cognome}, dipendente presso la vostra azienda, richiede la fruizione di un permesso lavorativo:

- Giorno: ${fmtData(p.data)}

Responsabile ${approvatoDaEmp ? approvatoDaEmp.nome+' '+approvatoDaEmp.cognome : ''}
in data ${dataAutor}${oraAutor ? ' e ora '+oraAutor : ''}
`);
    window.location.href = `mailto:${emp.email}?subject=${subject}&body=${body}`;
  };

  const handleCancellaPermesso = () => {
    if (!cancelNote.trim()) { setCancelErr('La motivazione è obbligatoria.'); return; }

      ? { ...p, status: 'annullato', noteAnnullamento: cancelNote.trim(), annullatoDa: user.id, annullatoTimestamp: Date.now() }

  const STATUS_BADGE = {

  return (
    <div className="p-4 lg:p-8 max-w-3xl">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-800" style={{fontFamily:'Syne,sans-serif'}}>Permessi orari</h2>
        <p className="text-slate-600 text-sm mt-1">Richiedi o visualizza i permessi orari</p>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <p className="font-bold text-slate-800">Nuova richiesta permesso</p>
        </div>
        <div className="px-6 pt-3 pb-0">
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-start gap-2">
            <span className="text-base leading-none mt-0.5">ℹ️</span>
            <p className="text-xs text-amber-800 leading-relaxed">Per favorire l'organizzazione aziendale, i permessi orari vanno richiesti preferibilmente entro 24 ore dall'orario richiesto. Grazie</p>
          </div>
        </div>
        <div className="px-6 py-5 space-y-4">
          {selectableEmps.length > 1 && (
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Dipendente</label>
              <select value={empId} onChange={e=>setEmpId(e.target.value)}
                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-violet-400">
                {selectableEmps.map(e=>(
                  <option key={e.id} value={e.id}>{e.nome} {e.cognome}</option>
                ))}
              </select>

          <DateInput label="Data permesso" value={data}

              <input type="time" value={oraInizio} onChange={e=>{setOraInizio(e.target.value);setErr('');}}
                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-violet-400"/>
            </div>
            <div>
              <label className="block text-xs font-medium text-slate-500 mb-1">Ora fine <span className="text-red-400">*</span></label>

                      <span className="text-xs font-bold text-violet-600">{fmtDurata(p.orePermesso)}</span>
                    </div>
                    <p className="text-xs text-slate-500 mt-1">{p.motivo}</p>
                    {p.tipologia && (
                      <p className="text-xs text-violet-600 mt-1 font-semibold bg-violet-50 rounded-lg px-2 py-0.5 inline-block">{TIPOLOGIA_LABEL[p.tipologia]||p.tipologia}</p>
                    )}

                        <strong>Motivazione rifiuto:</strong> {p.noteRifiuto}

                    )}

                    {p.status === SF.APPROVATO && empDati && (
                      <div className="flex items-center gap-2 mt-2 flex-wrap">

                          Scarica documento
                        </button>
                        {empDati.email ? (
                          <button onClick={()=>handleInviaEmail(p)}
                            className="flex items-center gap-1.5 text-xs font-semibold text-slate-700 bg-white hover:bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg transition-colors">
                            Invia via email
                          </button>
                        ) : (
                          <span className="text-xs text-slate-400">Nessuna email in anagrafica</span>
                        )}
                        {}
                        {p.employeeId === user.id && (

                            className="flex items-center gap-1.5 text-xs font-semibold text-red-600 bg-white hover:bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg transition-colors"
                            title="Cancella questo permesso">
                            Cancella
                          </button>
                        )}
                      </div>
                    )}
                    {}
                    {p.status === SP.ANNULLATO && p.noteAnnullamento && (
                      <p className="text-xs text-slate-500 mt-1.5 rounded-lg px-2 py-1">
                        <strong>Annullato:</strong> {p.noteAnnullamento}
                      </p>
                    )}
                  </div>
                  <span className={`shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full ${STATUS_BADGE[p.status]}`}>
                    {STATUS_LABEL[p.status]}
                  </span>
                </div>
              </div>
            );})}

      {}
      {cancelId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
          <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
            <h3 className="font-bold text-slate-800 text-base mb-1">🗑️ Cancella permesso</h3>
            <p className="text-slate-500 text-sm mb-4">Il permesso verrà annullato. Lo storico terrà traccia dell'annullamento.</p>
            <label className="block text-xs font-semibold text-slate-600 mb-1">Motivazione <span className="text-red-500">*</span></label>
            <textarea value={cancelNote} onChange={e=>{setCancelNote(e.target.value);setCancelErr('');}} rows={3}
              placeholder="Indica il motivo della cancellazione..."
              className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none mb-2" />
            {cancelErr && <p className="text-xs text-red-500 mb-2">{cancelErr}</p>}
            <p className="text-xs text-red-400 mb-2"><span className="font-semibold">*</span> campo obbligatorio</p>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>{ setCancelId(null); setCancelNote(''); setCancelErr(''); }}
                className="px-4 py-2 rounded-xl text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors">
                Annulla
              </button>
              <button onClick={handleCancellaPermesso}
                className="px-4 py-2 rounded-xl text-sm font-semibold bg-red-600 hover:bg-red-700 text-white transition-colors">
                Conferma cancellazione
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MieiStraordinari({ user, straordinari }) {
  const n = new Date();
  const [month, setMonth] = useState(n.getMonth()+1);
  const [year,  setYear]  = useState(n.getFullYear());
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  const mStr = `${year}-${String(month).padStart(2,'0')}`;
  const myStr = (straordinari||[])
    .filter(s => s.employeeId===user.id && s.data.startsWith(mStr))
    .sort((a,b) => a.data.localeCompare(b.data) || a.tipo.localeCompare(b.tipo));

  const allMy = (straordinari||[]).filter(s => s.employeeId===user.id);

  const fmtMin = m => m>=60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m}min`;

  const statusCfg = {
    pending_resp: { label:'In attesa Responsabile', cls:'bg-amber-100 text-amber-700' },
    pending_dir:  { label:'In attesa Direttore',    cls:'bg-blue-100 text-blue-700' },
    approvato:    { label:'Approvato ✅',            cls:'bg-emerald-100 text-emerald-700' },
    rifiutato:    { label:'Rifiutato ❌',            cls:'bg-red-100 text-red-700' },
  };

  const totAppr  = myStr.filter(s=>s.status===SS.APPROVATO).reduce((a,s)=>a+s.minuti,0);
  const totPend  = myStr.filter(s=>s.status===SS.PENDING_RESP||s.status===SS.PENDING_DIR).length;

  return (
    <div className="p-4 lg:p-8">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
        <div>
          <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2" style={{fontFamily:'Syne,sans-serif'}}><Icon name="trending" size={22} color="#f97316" /> I miei straordinari</h2>
          <p className="text-slate-600 text-sm mt-1">{user.nome} {user.cognome}</p>
        </div>
        <div className="flex items-center gap-1 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <button onClick={()=>{ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }}
            className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">‹</button>
          <span className="px-3 text-sm font-semibold text-slate-700 whitespace-nowrap">{MONTHS[month-1]} {year}</span>
          <button onClick={()=>{ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }}
            className="px-3 py-2 hover:bg-slate-50 text-slate-500 font-bold">›</button>
        </div>
      </div>

      {}
      {myStr.length > 0 && (
        <div className="grid grid-cols-2 gap-4 mb-6">
          <div className="bg-white rounded-2xl p-5 border border-orange-100 shadow-sm">
            <p className="text-slate-400 text-xs font-medium mb-1">Totale approvato</p>
            <p className="text-2xl font-bold text-orange-600" style={{fontFamily:'Syne,sans-serif'}}>{totAppr>0?fmtMin(totAppr):'—'}</p>
          </div>
          <div className="bg-white rounded-2xl p-5 border border-amber-100 shadow-sm">
            <p className="text-slate-400 text-xs font-medium mb-1">In attesa di approvazione</p>
            <p className="text-2xl font-bold text-amber-600" style={{fontFamily:'Syne,sans-serif'}}>{totPend>0?totPend:'—'}</p>
          </div>
        </div>
      )}

      {}
      {myStr.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-10 text-center">
          <div className="flex justify-center mb-2"><Icon name="trending" size={36} color="#f97316" /></div>
          <p className="text-slate-500 font-medium">Nessuno straordinario registrato in {MONTHS[month-1]} {year}</p>
          {allMy.length === 0 && <p className="text-slate-600 text-sm mt-1">Non hai ancora registrato straordinari</p>}
        </div>
      ) : (
        <div className="space-y-3 max-w-2xl">
          {myStr.map(s => {
            const sc = statusCfg[s.status] || { label:s.status, cls:'bg-slate-100 text-slate-600' };
            return (
              <div key={s.id} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div>
                    <p className="font-bold text-slate-800">{fmtData(s.data)} · {s.tipo==='mattina'?'🌅 Mattina':'🌆 Sera'}</p>
                    <p className="text-orange-600 font-semibold text-sm mt-0.5">{fmtMin(s.minuti)}</p>
                  </div>
                  <span className={`text-xs px-2.5 py-1 rounded-full font-semibold shrink-0 ${sc.cls}`}>{sc.label}</span>
                </div>
                <div className="bg-slate-50 rounded-xl px-4 py-2.5">
                  <p className="text-xs text-slate-500 mb-0.5">Nota</p>
                  <p className="text-sm text-slate-700 italic">"{s.nota}"</p>

                  <div className="mt-2 bg-red-50 rounded-xl px-4 py-2.5">
                    <p className="text-xs text-slate-500 mb-0.5">Motivo rifiuto</p>
                    <p className="text-sm text-red-700">{s.noteRifiuto}</p>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
